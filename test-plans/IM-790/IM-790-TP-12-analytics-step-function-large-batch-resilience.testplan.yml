title: "IM-790 QA validation - analytics Step Function large-batch resilience (154 subscriber orgs)"
description: |
  Plan de pruebas QA de IM-790 (sub-tarea de IM-766 - Fix analytics Step
  Function error handling after extraction Map output) bajo el epic IM-506
  KPI automation phase 2 scale and expansion. Valida end-to-end que el
  pipeline manual de Account Metrics resiste un batch de 154 subscriber
  orgs en una sola execution, deja Marketing_Metrics__c poblado por cuenta
  para Metric_Period_Key__c '2026-02' y no enmascara errores reales con
  States.ReferencePathConflict ni con RangeError: Maximum call stack size
  exceeded.

  La evidencia se construye en tres capas: (1) request en Postman contra
  POST /analytics/manual-runs, (2) execution en Step Functions
  MonthlyKpiExtractionStateMachine en us-east-1 (account 287043460717),
  (3) verificacion en Salesforce sobre Marketing_Metrics__c usando el
  comparador en tmp/marketing-metrics-comparator que cruza los 154
  Org_ID_18__c contra LastModifiedDate y Metric_Period_Key__c.

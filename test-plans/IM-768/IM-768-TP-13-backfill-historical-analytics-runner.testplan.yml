title: "IM-768 QA validation - backfill historical analytics runner (PR 26)"
description: |
  Plan de pruebas QA de IM-768 (Backfill historical analytics
  progressively) bajo el epic IM-505 KPI Automation. Valida el PR 26 en
  VeevartAnalytics: un script operacional CommonJS que orquesta llamadas
  progresivas a POST /prod/analytics/manual-runs para backfill historico
  de ~10 anios de metrics mensuales sobre 154 subscriber orgs, sin
  sobrecargar Salesforce ni AWS.

  El plan combina 3 capas de validacion:
  (1) Side-by-side + scope-fit del PR contra los 7 ACs (estatico).
  (2) Behavioral en Node local: dry-run + dedupe + invalid args +
      secret safety, sin tocar API ni AWS.
  (3) Sequential execution + resume + progress recording, cubierto por
      los 16 unit tests del propio PR (node --test).

  El Scenario 4 (real backfill end-to-end contra /prod/analytics/
  manual-runs) queda pendiente de un run operator-approved con
  credenciales (MANUAL_EXTRACTION_API_KEY + AWS profile con
  states:DescribeExecution). Es operacional, no un defecto del PR.

  Dry-run reconfirmado en la maquina objetivo (veevart-analytics local,
  Node 25.4.0, @aws-sdk/client-sfn resuelto): dedupe 2 org IDs, 1 periodo
  mensual, 1 llamada planeada, cero llamadas API/AWS.

id: "0ceac2c1-2025-4e23-8019-a306655aa1d7"
key: "TP-14"
title: "Deliverable 1 — T6 implementation case end-to-end (AWS dev · real Step Functions)"
description: |
  Plan de pruebas para el Deliverable 1 del epic IM-735
  (DataMigration AppFrontend / Implementation Cases Automation).

  Cubre el slice completo "Implementation Executive connects a
  Salesforce org → previews and selects cases → optionally saves /
  updates a template → starts a run → watches it execute end-to-end
  via real Step Functions (Run-SM → SingleShot-SM → T6 Apex) on AWS
  dev, with per-step result verification." Scope limitado a T6 (Apex
  Anonymous) cases sin cross-case dependencies. Reference cases 3.12
  y 5.04.

  Fuente Gherkin: Notion · QA Deliverables (37302267648e81808620e072114f9a67)
  https://app.notion.com/p/QA-Deliverables-37302267648e81808620e072114f9a67

  Cobertura:
  - TC-45 Connect a Salesforce org (5 escenarios)
  - TC-46 Plan Preview catalog & case selection (3 escenarios)
  - TC-47 Plan Templates save & update (3 escenarios)
  - TC-48 Start a Plan Run real Step Functions (2 escenarios)
  - TC-49 Run Dashboard & Step Detail (3 escenarios)
  - TC-50 Per-step result verification (3 escenarios)
  Total: 19 escenarios Gherkin sobre 6 features funcionales.

  Tickets del epic IM-735 en QA Review esta semana W23 (2026-06-01..05)
  cubiertos por este plan:
  - IM-738 W1-3 Step Functions skeleton + SAM resources (TC-48)
  - IM-739 W1-4 Frontend entry + Plan preview skeleton (TC-46, TC-47)
  - IM-740 W2-1 Auth broker integration T9 mintSession (TC-45)
  - IM-742 W2-3 StartRun use case + first end-to-end run case 3.02 (TC-48)
  - IM-743 W3-1 MetadataDeploy-SM + T2/T3 start/check Lambdas
    (Noop stubs en este deliverable, validacion limitada)
  - IM-746 W3-4 Run dashboard MVP + Step Detail Drawer (TC-49)
  - IM-748 W4-2 T6 Apex Anonymous Lambda + Tooling REST adapter (TC-48, TC-50)
  - IM-804 W3-1 AuthBroker SSM params + dev/prod env preflight (TC-45)
  - IM-805 W3-2 Deploy to AWS dev + run 3.12 via real Step Functions smoke (TC-48)
  - IM-808 W3-4 Per-step result verification gate on Apex success +
    self-verify 3.12 (TC-50)

  Out of scope para este deliverable (no levantar como bugs):
  - Solo T6 (Apex Anonymous) cases corren. T1-T5, T7, T8, T10, T13
    no estan construidos; MetadataDeploy-SM y HybridCase-SM son Noop stubs
  - MANUAL / handoff steps no implementados
  - Multi-case templates con cross-case dependsOn bloqueados al spawn
  - Run Dashboard no auto-update (no WebSocket/polling)
  - Run Pause / Cancel: frontend stubs only
  - Handoff resume modes (webhook / attestation) y customer-org polling
    no wired
  - Case create/edit y master-template creation CLI-only (no UI)
  - Audit log: pagina renderiza pero no surfaces events
status: "draft"

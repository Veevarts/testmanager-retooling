  then:
  - los active Lead Status values son exactamente y en orden Contacted, Open, Qualified, Unqualified
  - Open es el default único
  - los stock values (Open - Not Contacted, Working - Contacted, Closed - Converted, Closed - Not Converted) quedan deactivated
  - el end state se confirma por read-back

key: TC-84
title: IC 5.22 — Update Leads Page Layout (delivery hybrid v2, 2 automated + 2 manual handoffs)
description: |
  Cobertura QA de IM-931 (5.22 Update Leads Page Layout — deliver to
  Implementations, high-confidence). Junio delivery del Implementation Case
  `ic-5-22-leads-page-layout` v2 (HYBRID). Confianza alta por reporte IM-735
  (2026-06-12): verificado en ambas orgs. Delivered en PR #197 (squash a main).

  Los steps de Lightning Record Page quedan manuales porque Salesforce no expone
  Metadata API reliable para FlexiPage org-default assignment ni component-tree
  edits.

  Validar que el IC:
  1) asigna el Veevart Lead page layout seleccionado como active en TODOS los
     profiles (verificado por read-back per profile),
  2) selección org-agnóstica: no hardcoded name, layouts discovered from live org,
  3) reconfigura Lead Status values: exactamente Contacted, Open, Qualified,
     Unqualified (en ese orden) con Open como default; los stock values (Open -
     Not Contacted, Working - Contacted, Closed - Converted, Closed - Not
     Converted) quedan deactivated,
  4) idempotente,
  5) verified-or-fail (no silent success),
  6) parquea con 2 manual handoffs (Veevart Lead Record Page as Org Default;
     Path component + rename Campaigns → Campaign History + Files → News + Twitter),
  7) release DoD.

  QA Sub-task asociada: IM-991
  Riesgos abiertos: AC6 handoffs manuales (Lightning Record Page + component-tree
  edits) requieren attestation del operator.
type: functional
priority: high
status: active
preconditions:
- Implementation Case `ic-5-22-leads-page-layout` v2 deployado en prod
- Org target con el Veevart Lead page layout instalado (Auctifera package)
- Permisos para modificar Lead page layout assignments across all profiles
- Permisos para modificar Lead Status value set
- Acceso a Setup para los 2 manual handoffs (Lightning Record Page Assignment + Lightning App Builder)
- Acceso al catálogo prod para seedear v2
format: gherkin
scenarios:

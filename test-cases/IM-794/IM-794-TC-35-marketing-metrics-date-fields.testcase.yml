schemaVersion: "1.0"

id: "d8fbb5c2-61bc-4a4a-b27e-d9f8f87d36ed"
key: "TC-35"
title: "Marketing Metrics date/name field alignment (Date_Entered__c, Date__c, Name = Metric_Period_Key__c)"
description: |
  Cobertura QA de IM-794 (PR 28 en VeevartAnalytics) bajo el epic IM-506
  KPI Automation. Valida el alineamiento de los campos de fecha/nombre del
  Marketing_Metrics__c (Account Metrics) en VeevartHub.

  Comportamiento esperado por AC (ejemplo run 2026-05-27, periodo 2026-03):
  - Date_Entered__c (label "Date Entered") = fecha de registro/publish (2026-05-27)
  - Date__c (label "Date") = ultimo dia del mes del periodo (2026-03-31)
  - Metric_Period_Key__c (label "Metric Period Key") = sin cambios (2026-03)
  - Name = igual a Metric_Period_Key__c (2026-03)
  - Caso leap-year: periodo 2024-02 -> Date 2024-02-29

  Mecanica confirmada (code review PR 28 head f9039045 + schema VeevartHub prod):

  - `marketing-metrics-publish.service.ts`: buildMarketingMetricsUpsertCommand
    setea Name: args.metricPeriodKey (Name === Metric_Period_Key__c).
  - `publish-marketing-metrics.handler.ts`: upsertMarketingMetricsRecord
    setea Date_Entered__c = formatSalesforceDate(new Date()) (fecha de
    publish). Se elimino el viejo Date_Entered__c = args.targetPeriod.periodEnd.
  - `Date__c` (label "Date") es un **formula field en Salesforce VeevartHub**
    (no se setea desde el payload TypeScript). La formula deriva el ultimo
    dia del mes desde Metric_Period_Key__c:
      DATE(year[+1 si dic], month+1, 1) - 1  => ultimo dia del mes del periodo
    Maneja el rollover de diciembre y es leap-year-safe por construccion
    (DATE(2024,3,1)-1 = 2024-02-29). La formula YA esta desplegada en prod.

  IMPORTANTE (correccion 2026-05-28): la revisión inicial juzgó solo el PR
  28 (TypeScript-only, sin metadata XML) y concluyó erróneamente que
  faltaba Date__c + la formula. Al verificar el record real en VeevartHub
  (Casa del Herrero, periodo 2026-01) se confirmó que Date__c = 2026-01-31
  (ultimo dia de enero) — la formula Salesforce SI esta desplegada y
  funciona. El split es: payload TS (Name + Date_Entered__c) + formula
  Salesforce (Date__c). Los 5 ACs se cumplen.

  Nota menor (no bloqueante): no hay unit test del caso leap-year en el
  repo de analytics; la cobertura de bisiesto descansa en la formula
  Salesforce, no en TypeScript.

  Referencias:
  - PR: https://github.com/Veevarts/VeevartAnalytics/pull/28
  - Issue: https://veevart.atlassian.net/browse/IM-794
  - Epic: https://veevart.atlassian.net/browse/IM-506

type: integration
priority: medium
status: active

preconditions:
  - "Repo VeevartAnalytics en main (incluye PR 28 mergeado, head f9039045)"
  - "Node + pnpm para unit tests"
  - "Acceso de lectura a Marketing_Metrics__c (Account Metrics) en VeevartHub prod (https://veevart.lightning.force.com/) para verificar Date__c en records reales"

format: gherkin
scenarios:
  - title: "Side-by-side y scope-fit del PR 28 (payload TS + formula Salesforce para Date__c)"
    tags:
      - data-review
      - side-by-side
      - scope-fit
    given:
      - "PR 28 mergeado, 4 archivos (+139/-39): 2 production TS + 2 specs. La formula de Date__c vive en Salesforce VeevartHub (config declarativa), no en el PR"
    when:
      - "QA descarga del head f9039045 el publish handler + publish service + specs, y consulta el schema de Marketing_Metrics__c en VeevartHub (sf sobject describe)"
    then:
      - "Name = args.metricPeriodKey confirmado (Name === Metric_Period_Key__c) — AC de Name CUMPLIDO"
      - "Date_Entered__c = formatSalesforceDate(new Date()) (publish date) confirmado; el viejo Date_Entered__c = periodEnd se elimino — AC de Date_Entered__c CUMPLIDO"
      - "Date__c (label 'Date') es un formula field en VeevartHub que deriva el ultimo dia del mes desde Metric_Period_Key__c: DATE(year[+1 si dic], month+1, 1) - 1. La formula YA esta desplegada en prod — AC de Date__c CUMPLIDO (lado Salesforce, no TypeScript)"
      - "la formula es leap-year-safe: para 2024-02 calcula DATE(2024,3,1)-1 = 2024-02-29 — AC de leap-year CUMPLIDO por construccion"
      - "split de implementacion: payload TS aporta Name + Date_Entered__c; formula Salesforce aporta Date__c. Los 5 ACs quedan cubiertos entre ambos sistemas"

  - title: "Unit test coverage del payload (Name + Date_Entered__c)"
    tags:
      - regression
      - unit-tests
    given:
      - "los specs cubren la porcion TS (Name + Date_Entered__c). La logica de Date__c esta en la formula Salesforce, fuera del repo"
    when:
      - "QA corre `pnpm --dir veevart-analytics test` y revisa los tests de date/name"
    then:
      - "test 'uses the metric period key as the Salesforce record name' (asserta Name:'2025-12') — valida el AC de Name"
      - "test 'overwrites Date_Entered__c when an existing record already has it' (2026-04-15 -> 2026-05-27 con setSystemTime) — valida Date_Entered__c=publish date"
      - "nota menor: no hay unit test del caso leap-year en el repo (la cobertura de Date__c/bisiesto recae en la formula Salesforce). Sugerencia no bloqueante: agregar un test Apex/formula o documentar la validacion de bisiesto"

  - title: "Functional UI: campos de fecha/nombre del Account Metrics en VeevartHub"
    tags:
      - functional
      - ui-evidence
      - screenshots
      - salesforce
    given:
      - "un Marketing_Metrics__c (Account Metrics) generado por un run (ej. Casa del Herrero, periodo 2026-01)"
      - "QA tiene acceso de lectura en VeevartHub prod (https://veevart.lightning.force.com/)"
    when:
      - "QA abre el record Account Metrics en Lightning y captura screenshot de los campos Date Entered, Date, Metric Period Key y el Name (header)"
    then:
      - "Name == Metric_Period_Key__c (ej. ambos '2026-01', visible en el header 'Account Metrics 2026-01'). [SCREENSHOT: im794-record-name-periodkey.png]"
      - "Date Entered (Date_Entered__c) == la fecha del run/publish (ej. 5/28/2026). [SCREENSHOT incluido]"
      - "Date (Date__c) == ultimo dia del mes del periodo (periodo 2026-01 -> 1/31/2026). [SCREENSHOT: im794-record-date-lastday.png]"
      - "para un periodo de febrero bisiesto (2024-02) el campo Date muestra 2024-02-29 (validacion de leap-year, si hay un record de ese periodo disponible)"
      - "evidencia confirmada 2026-05-28: record Casa del Herrero 2026-01 muestra Date Entered 5/28/2026, Date 1/31/2026, Metric Period Key 2026-01, Name 2026-01 — los 5 ACs OK"


schemaVersion: "1.0"

id: "a103e1ce-1bf6-483d-bbf9-5ab36fdc2e66"
key: "TC-49"
title: "Run Dashboard & Step Detail — Inbox-first grouping, drawer with compile/exception detail, manual refresh limitation"
description: |
  Cobertura QA de Feature 5 del Deliverable 1 (Notion QA Deliverables —
  T6 implementation case end-to-end / AWS dev real Step Functions),
  bajo el epic IM-735 (DataMigration AppFrontend).

  Vista read-only del progreso de un run, agrupado por estado
  (Needs attention / In flight / Done / In queue), con drawer por step
  que muestra estado + (en failure) compile problem / exception message.

  Limitacion actual documentada: dashboard NO auto-update; el IE refresca
  manualmente para ver nuevo estado. No es bug.

  Tickets relacionados del epic IM-735:
  - IM-746 W3-4 Run dashboard MVP (Inbox-first) + Step Detail Drawer

  Fuente Gherkin: Notion · QA Deliverables · Deliverable 1 · Feature 5
  https://app.notion.com/p/37302267648e81808620e072114f9a67

  Out of scope (no levantar como bug):
  - WebSocket/polling para auto-refresh
  - Run "Pause" / "Cancel" (frontend stubs solamente, no backed)
  - Audit log / timeline (`/runs/:runId/audit` renderiza pero sin events)

type: functional
priority: high
status: active

preconditions:
  - "Un PlanRun existente (creado via TC-48)"
  - "Acceso IE a la Run Dashboard"

format: gherkin
scenarios:
  - title: "Dashboard shows the run and its steps by state"
    tags:
      - happy-path
      - ac-1
      - dashboard
    given:
      - "a PlanRun"
    when:
      - "the IE opens the Run Dashboard"
    then:
      - "cases and steps are grouped (Needs attention / In flight / Done / In queue) with progress"

  - title: "Step detail drawer"
    tags:
      - happy-path
      - ac-2
      - drawer
    given:
      - "the Run Dashboard with at least one step (success or failure)"
    when:
      - "the IE clicks a step"
    then:
      - "a read-only drawer shows the step state, and on failure the compile problem / exception message"

  - title: "Updates require a manual refresh (current limitation)"
    tags:
      - edge-case
      - ac-3
      - known-limitation
      - missing-doc
    given:
      - "a run in progress"
    when:
      - "the IE expects to see new step state without interaction"
    then:
      - "the dashboard does NOT auto-update"
      - "the IE refreshes to see new state (out-of-scope, not a bug)"

tags:
  - im-735
  - im-746
  - datamigration-appfrontend
  - notion-qa-deliverables
  - deliverable-1
  - dashboard
  - step-detail

estimatedDuration: 20


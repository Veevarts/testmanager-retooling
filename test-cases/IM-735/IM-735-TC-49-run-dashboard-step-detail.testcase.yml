schemaVersion: "1.0"

id: "a103e1ce-1bf6-483d-bbf9-5ab36fdc2e66"
key: "TC-49"
title: "Run Dashboard y Step Detail — agrupación Inbox-first, drawer con detalle de compile/exception, limitación de refresh manual"
description: |
  Cobertura QA de Feature 5 del Deliverable 1 (Notion QA Deliverables —
  T6 implementation case end-to-end / AWS dev real Step Functions),
  bajo el epic IM-735 (DataMigration AppFrontend).

  Vista read-only del progreso de un run, agrupado por estado
  (Needs attention / In flight / Done / In queue), con drawer por step
  que muestra estado + (en failure) compile problem / exception message.

  Limitación actual documentada: el dashboard NO se auto-actualiza; el
  IE refresca manualmente para ver el nuevo estado. No es bug.

  Tickets relacionados del epic IM-735:
  - IM-746 W3-4 Run dashboard MVP (Inbox-first) + Step Detail Drawer

  Fuente Gherkin: Notion · QA Deliverables · Deliverable 1 · Feature 5
  https://app.notion.com/p/37302267648e81808620e072114f9a67

  Out of scope (no levantar como bug):
  - WebSocket/polling para auto-refresh
  - Run "Pause" / "Cancel" (solo frontend stubs, sin backing)
  - Audit log / timeline (`/runs/:runId/audit` renderiza pero sin events)

type: functional
priority: high
status: active

preconditions:
  - "Un PlanRun existente (creado vía TC-48)"
  - "Acceso IE al Run Dashboard"

format: gherkin
scenarios:
  - title: "El dashboard muestra el run y sus steps por estado"
    tags:
      - happy-path
      - ac-1
      - dashboard
    given:
      - "un PlanRun"
    when:
      - "el IE abre el Run Dashboard"
    then:
      - "los cases y steps se agrupan (Needs attention / In flight / Done / In queue) con progreso"

  - title: "Drawer de detalle del step"
    tags:
      - happy-path
      - ac-2
      - drawer
    given:
      - "el Run Dashboard con al menos un step (éxito o fallo)"
    when:
      - "el IE hace clic en un step"
    then:
      - "un drawer read-only muestra el estado del step, y en fallo el compile problem / exception message"

  - title: "Las actualizaciones requieren refresh manual (limitación actual)"
    tags:
      - edge-case
      - ac-3
      - known-limitation
      - missing-doc
    given:
      - "un run en progreso"
    when:
      - "el IE espera ver el nuevo estado del step sin interacción"
    then:
      - "el dashboard NO se auto-actualiza"
      - "el IE refresca para ver el nuevo estado (out-of-scope, no es un bug)"


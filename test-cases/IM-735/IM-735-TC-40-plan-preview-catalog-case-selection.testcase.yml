schemaVersion: "1.0"

id: "91e4240b-84a7-4851-8042-08b44a314aa4"
key: "TC-40"
title: "Plan Preview — catalog browsing & case selection (T6 single-case / no-dependsOn only)"
description: |
  Cobertura QA de Feature 2 del Deliverable 1 (Notion QA Deliverables —
  T6 implementation case end-to-end / AWS dev real Step Functions),
  bajo el epic IM-735 (DataMigration AppFrontend).

  El Implementation Executive navega el catalogo seeded y ensambla el
  plan para un run. Caso/tool/feasibility visibles.

  Tickets relacionados del epic IM-735:
  - IM-739 W1-4 Frontend entry + Plan preview skeleton

  Fuente Gherkin: Notion · QA Deliverables · Deliverable 1 · Feature 2
  https://app.notion.com/p/37302267648e81808620e072114f9a67

  Limites importantes (no levantar como bugs):
  - Solo single-case / no-dependsOn selections pueden spawnear hoy
  - MetadataDeploy-SM y HybridCase-SM son Noop stubs
  - MANUAL / handoff steps no implementados

type: functional
priority: high
status: active

preconditions:
  - "Catalogo + templates seeded en la tabla dev via `publish-plan-template.cli.ts`"
  - "Reference cases 3.12 (v3) y 5.04 (v2) seeded"
  - "IE logueado con acceso al Catalog / Plan Preview"

format: gherkin
scenarios:
  - title: "Catalog lists the seeded cases"
    tags:
      - happy-path
      - ac-1
      - catalog
    given:
      - "the catalog is seeded"
    when:
      - "the IE opens the Catalog / Plan Preview"
    then:
      - "implementation cases are listed grouped by category, each showing its tool and feasibility"

  - title: "Inspect a case version"
    tags:
      - happy-path
      - ac-2
      - case-detail
    given:
      - "the catalog is seeded with at least one published case version"
    when:
      - "the IE opens a case version"
    then:
      - "its steps are shown with kind (AUTOMATED/MANUAL) and toolName"

  - title: "Assemble an ad-hoc selection"
    tags:
      - happy-path
      - ac-3
      - selection
    given:
      - "the Plan Preview"
    when:
      - "the IE selects one or more cases"
    then:
      - "the selection is reflected and can be started or saved as a template"
      - "only single-case / no-dependsOn selections can actually be spawned today (out-of-scope warning, not a bug)"

tags:
  - im-735
  - im-739
  - datamigration-appfrontend
  - notion-qa-deliverables
  - deliverable-1
  - catalog
  - plan-preview

estimatedDuration: 20


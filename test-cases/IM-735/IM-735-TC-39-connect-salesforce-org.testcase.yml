schemaVersion: "1.0"

id: "8585db25-aec3-4859-a706-c6acf3664208"
key: "TC-39"
title: "Connect a Salesforce org (AuthBroker mint session, healthy/expired chips, malformed validation)"
description: |
  Cobertura QA de Feature 1 del Deliverable 1 (Notion QA Deliverables —
  T6 implementation case end-to-end / AWS dev real Step Functions),
  bajo el epic IM-735 (DataMigration AppFrontend).

  El Implementation Executive vincula un cliente a una org Salesforce;
  la salud de la org la decide el AuthBroker y solo orgs healthy pueden
  correr un run.

  Tickets relacionados del epic IM-735:
  - IM-740 W2-1 Auth broker integration (T9 mintSession)
  - IM-804 W3-1 AuthBroker SSM params + dev/prod env preflight

  Fuente Gherkin: Notion · QA Deliverables · Deliverable 1 · Feature 1
  https://app.notion.com/p/37302267648e81808620e072114f9a67

type: functional
priority: high
status: active

preconditions:
  - "AuthBroker SSM params provisionados: `/dev/auth-broker/base-url`, `/dev/auth-broker/api-key-secret-arn`"
  - "Target Salesforce org autorizada en el AuthBroker service"
  - "Cliente de prueba existe en la app y el tester tiene acceso Cognito"
  - "Implementations feature deployed a AWS dev"
  - "IE logueado y posicionado en la pagina Connect Org"

format: gherkin
scenarios:
  - title: "Connect an authorized org"
    tags:
      - happy-path
      - ac-1
      - authbroker
    given:
      - "a client on the Connect Org page"
    when:
      - "the IE enters a valid 15- or 18-character orgId and submits"
    then:
      - "the backend mints a session through the AuthBroker"
      - "the org is saved with state \"active\" (instanceUrl and apiVersion captured)"
      - "the org shows a \"healthy\" chip and is selectable for a run"

  - title: "Org not found shows an error"
    tags:
      - negative
      - ac-2
      - authbroker
    given:
      - "the IE enters an orgId that cannot be found"
    when:
      - "the IE submits it"
    then:
      - "an error message is shown stating the org was not found"
      - "no org is connected and nothing becomes selectable for a run"

  - title: "Expired or invalid credential"
    tags:
      - negative
      - ac-3
      - authbroker
    given:
      - "an orgId whose AuthBroker token is invalid or unauthorized"
    when:
      - "the IE connects it"
    then:
      - "the org is saved with state \"expired\""
      - "the UI shows an \"auth expired\" chip"
      - "the org is NOT selectable for a run"

  - title: "Malformed orgId is rejected"
    tags:
      - negative
      - edge-case
      - ac-4
      - validation
    given:
      - "the IE is on the Connect Org page"
    when:
      - "the IE submits an orgId that is not 15 or 18 alphanumeric characters"
    then:
      - "the submission is rejected and no org is saved"

  - title: "Re-verify an existing org"
    tags:
      - happy-path
      - ac-5
      - authbroker
    given:
      - "an already-connected org"
    when:
      - "the IE re-verifies it"
    then:
      - "connectedAt is preserved and state + lastVerifiedAt are refreshed"

tags:
  - im-735
  - im-740
  - im-804
  - datamigration-appfrontend
  - notion-qa-deliverables
  - deliverable-1
  - authbroker
  - salesforce
  - aws-dev

estimatedDuration: 30


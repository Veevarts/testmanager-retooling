id: "91e4240b-84a7-4851-8042-08b44a314aa4"
key: "TC-46"
title: "Plan Preview — navegación del catálogo y selección de cases (solo T6 single-case / sin dependsOn)"
description: |
  Cobertura QA de Feature 2 del Deliverable 1 (Notion QA Deliverables —
  T6 implementation case end-to-end / AWS dev real Step Functions),
  bajo el epic IM-735 (DataMigration AppFrontend).

  El Implementation Executive navega el catálogo seeded y ensambla el
  plan para un run. Caso/tool/feasibility visibles.

  Tickets relacionados del epic IM-735:
  - IM-739 W1-4 Frontend entry + Plan preview skeleton

  Fuente Gherkin: Notion · QA Deliverables · Deliverable 1 · Feature 2
  https://app.notion.com/p/37302267648e81808620e072114f9a67

  Limites importantes (no levantar como bugs):
  - Solo selecciones single-case / sin dependsOn pueden spawnear hoy
  - MetadataDeploy-SM y HybridCase-SM son Noop stubs
  - Steps MANUAL / handoff no implementados

type: functional
priority: high
status: active

preconditions:
  - "Catálogo + templates seeded en la tabla dev vía `publish-plan-template.cli.ts`"
  - "Reference cases 3.12 (v3) y 5.04 (v2) seeded"
  - "IE logueado con acceso al Catalog / Plan Preview"

format: gherkin
scenarios:
  - title: "El catálogo lista los cases sembrados"
    tags:
      - happy-path
      - ac-1
      - catalog
    given:
      - "el catálogo está sembrado"
    when:
      - "el IE abre el Catalog / Plan Preview"
    then:
      - "los implementation cases se listan agrupados por categoría, cada uno mostrando su tool y feasibility"

  - title: "Inspeccionar una versión de case"
    tags:
      - happy-path
      - ac-2
      - case-detail
    given:
      - "el catálogo está sembrado con al menos una versión de case publicada"
    when:
      - "el IE abre una versión de case"
    then:
      - "sus steps se muestran con kind (AUTOMATED/MANUAL) y toolName"

  - title: "Ensamblar una selección ad-hoc"
    tags:
      - happy-path
      - ac-3
      - selection
    given:
      - "el Plan Preview"
    when:
      - "el IE selecciona uno o más cases"
    then:
      - "la selección se refleja y puede iniciarse o guardarse como template"
      - "solo selecciones single-case / sin dependsOn pueden spawnearse hoy (advertencia out-of-scope, no es un bug)"


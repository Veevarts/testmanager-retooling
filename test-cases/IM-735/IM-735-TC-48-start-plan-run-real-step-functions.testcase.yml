schemaVersion: "1.0"

id: "67f66c7f-568d-4fa5-bd41-fee03d672e60"
key: "TC-48"
title: "Iniciar un Plan Run — spawn async vía outbox, execution de Run-SM, dispatch de step T6 vía SingleShot-SM"
description: |
  Cobertura QA de Feature 4 del Deliverable 1 (Notion QA Deliverables —
  T6 implementation case end-to-end / AWS dev real Step Functions),
  bajo el epic IM-735 (DataMigration AppFrontend).

  El spawn es async vía outbox; orchestration corre en Step Functions
  reales (`Run-SM → SingleShot-SM → T6 Apex`) en AWS dev. Reference
  case 3.12 (T6 happy path con self-verify).

  Tickets relacionados del epic IM-735:
  - IM-738 W1-3 Step Functions skeleton + SAM resources
  - IM-742 W2-3 StartRun use case + first end-to-end run (case 3.02)
  - IM-748 W4-2 T6 Apex Anonymous Lambda + Tooling REST adapter
  - IM-805 W3-2 Deploy to AWS dev + run 3.12 vía real Step Functions (smoke)

  Fuente Gherkin: Notion · QA Deliverables · Deliverable 1 · Feature 4
  https://app.notion.com/p/37302267648e81808620e072114f9a67

  Restricciones críticas para reproducir:
  - `LOCAL_DEV_MODE` MUST be unset en el Lambda deployed (sino el run
    double-drives in-process Y vía outbox)
  - `RUN_SM_ARN` resuelve non-empty
  - Solo T6 (Apex Anonymous) corre; T1-T5, T7, T8, T10, T13 no están
    construidos; MetadataDeploy-SM y HybridCase-SM son Noop stubs

type: integration
priority: critical
status: active

preconditions:
  - "AWS dev con real Step Functions (LOCAL_DEV_MODE unset)"
  - "Feature de Implementations desplegada; `RUN_SM_ARN` non-empty"
  - "Org Salesforce \"active\" conectada (TC-45 PASS)"
  - "Catálogo seeded con case 3.12 v3 (TC-46 PASS)"
  - "T6 Apex Anonymous Lambda + Tooling REST adapter deployed (IM-748)"

format: gherkin
scenarios:
  - title: "Lanzar un run para un plan T6 single-case"
    tags:
      - happy-path
      - ac-1
      - step-functions
      - outbox
    given:
      - "una org conectada con state \"active\""
      - "un plan solo de T6 (ej. case 3.12)"
    when:
      - "el IE inicia el run"
    then:
      - "se crea un PlanRun en status PENDING"
      - "se escribe y despacha una fila SFN_START_EXECUTION en outbox (eliminada en éxito)"
      - "se inicia una execution de Run-SM nombrada con el planRunId"
      - "el PlanRun transita PENDING → RUNNING → COMPLETED"

  - title: "Cada step corre vía SingleShot-SM → T6"
    tags:
      - happy-path
      - ac-2
      - step-functions
      - t6-apex
    given:
      - "un PlanRun en ejecución"
    when:
      - "Run-SM resuelve los steps listos"
    then:
      - "cada step T6 es despachado por SingleShot-SM al Lambda de T6 Apex"
      - "el StepRun transita a COMPLETED en éxito"


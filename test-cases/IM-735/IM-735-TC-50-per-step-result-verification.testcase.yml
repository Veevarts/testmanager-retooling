schemaVersion: "1.0"

id: "8e508f03-76c9-4f5b-8891-6bb2806844b9"
key: "TC-50"
title: "Verificación de resultado por step — gate de Apex result.success, self-verify (case 3.12) VerifyException, retry policy por error de transporte"
description: |
  Cobertura QA de Feature 6 del Deliverable 1 (Notion QA Deliverables —
  T6 implementation case end-to-end / AWS dev real Step Functions),
  bajo el epic IM-735 (DataMigration AppFrontend).

  El éxito de un step refleja el resultado real en la org, no solo que
  el Lambda devolvió. Tres aristas:
  1. Apex compile/runtime failure (result.success=false) -> step FAILED
     vía ReportToolFailure
  2. Self-verifying flagship case 3.12 v3 -> VerifyException si Company
     Information o Mock Contact ausente; COMPLETED solo si query-back
     pasa
  3. Error de transporte transitorio -> Retry policy de SingleShot-SM
     (NO falla el step inmediatamente)

  Tickets relacionados del epic IM-735:
  - IM-748 W4-2 T6 Apex Anonymous Lambda + Tooling REST adapter
  - IM-808 W3-4 Per-step result verification — gate on Apex success + self-verify 3.12

  Fuente Gherkin: Notion · QA Deliverables · Deliverable 1 · Feature 6
  https://app.notion.com/p/37302267648e81808620e072114f9a67

  Reference cases:
  - 3.12 (v3) Company Info & Mock Contact: T6 Apex con bloque de self-verify
    (query-back y throw VerifyException si falta primary Company Info o
    Mock Contact)
  - 5.04 (v2) Opportunity Stages: T6 Apex idempotente (re-run no
    duplica), vía self-callout Data API; no tiene verify block

type: integration
priority: critical
status: active

preconditions:
  - "AWS dev con real Step Functions (LOCAL_DEV_MODE unset)"
  - "T6 Apex Anonymous Lambda deployed"
  - "Catálogo con case 3.12 v3 seeded"
  - "Org Salesforce \"active\" conectada"
  - "Capacidad de inducir failures controlados (case modificado o org cleanup) para Scenario 1 y 2"

format: gherkin
scenarios:
  - title: "Falla de lógica Apex marca el step como FAILED"
    tags:
      - negative
      - ac-1
      - apex-failure
      - choice-evaluation
    given:
      - "un step T6 cuyo Apex falla al compilar o lanza excepción en runtime (result.success = false)"
    when:
      - "el step corre a través de SingleShot-SM"
    then:
      - "el choice EvaluateResult rutea a ReportToolFailure"
      - "el StepRun se reporta como FAILED (no COMPLETED) con el compileProblem / exceptionMessage"
      - "el estado terminal del PlanRun es FAILED"

  - title: "Flagship con self-verify (case 3.12) confirma el estado final"
    tags:
      - happy-path
      - ac-2
      - self-verify
      - case-3-12
    given:
      - "case 3.12 v3"
    when:
      - "corre pero la Company Information primaria (por nombre) o el Mock Contact están ausentes"
    then:
      - "el verify block lanza VerifyException y el step queda FAILED"
      - "el step queda COMPLETED solo después de que las query-back assertions pasen"

  - title: "Reintentos por error de transporte (distinto a una falla de lógica)"
    tags:
      - edge-case
      - ac-3
      - transport-retry
    given:
      - "un error de transporte transitorio al invocar el tool"
    when:
      - "SingleShot-SM despacha el step"
    then:
      - "SingleShot-SM reintenta según su Retry policy en vez de fallar el step inmediatamente"


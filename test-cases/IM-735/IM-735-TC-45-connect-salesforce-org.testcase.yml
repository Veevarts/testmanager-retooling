schemaVersion: "1.0"

id: "8585db25-aec3-4859-a706-c6acf3664208"
key: "TC-45"
title: "Conectar una org Salesforce (AuthBroker mint session, chips healthy/expired, validación de orgId malformado)"
description: |
  Cobertura QA de Feature 1 del Deliverable 1 (Notion QA Deliverables —
  T6 implementation case end-to-end / AWS dev real Step Functions),
  bajo el epic IM-735 (DataMigration AppFrontend).

  El Implementation Executive vincula un cliente a una org Salesforce;
  la salud de la org la decide el AuthBroker y solo orgs healthy pueden
  correr un run.

  Tickets relacionados del epic IM-735:
  - IM-740 W2-1 Auth broker integration (T9 mintSession)
  - IM-804 W3-1 AuthBroker SSM params + dev/prod env preflight

  Fuente Gherkin: Notion · QA Deliverables · Deliverable 1 · Feature 1
  https://app.notion.com/p/37302267648e81808620e072114f9a67

type: functional
priority: high
status: active

preconditions:
  - "AuthBroker SSM params provisionados: `/dev/auth-broker/base-url`, `/dev/auth-broker/api-key-secret-arn`"
  - "Org Salesforce target autorizada en el servicio AuthBroker"
  - "Cliente de prueba existe en la app y el tester tiene acceso Cognito"
  - "Feature de Implementations desplegada a AWS dev"
  - "IE logueado y posicionado en la página Connect Org"

format: gherkin
scenarios:
  - title: "Conectar una org autorizada"
    tags:
      - happy-path
      - ac-1
      - authbroker
    given:
      - "un cliente en la página Connect Org"
    when:
      - "el IE ingresa un orgId válido de 15 o 18 caracteres y lo envía"
    then:
      - "el backend acuña una sesión a través del AuthBroker"
      - "la org queda guardada con state \"active\" (instanceUrl y apiVersion capturados)"
      - "la org muestra un chip \"healthy\" y queda seleccionable para un run"

  - title: "Org no encontrada muestra un error"
    tags:
      - negative
      - ac-2
      - authbroker
    given:
      - "el IE ingresa un orgId que no se puede encontrar"
    when:
      - "el IE lo envía"
    then:
      - "se muestra un mensaje de error indicando que la org no fue encontrada"
      - "no se conecta ninguna org y nada queda seleccionable para un run"

  - title: "Credencial expirada o inválida"
    tags:
      - negative
      - ac-3
      - authbroker
    given:
      - "un orgId cuyo token de AuthBroker es inválido o no autorizado"
    when:
      - "el IE la conecta"
    then:
      - "la org queda guardada con state \"expired\""
      - "la UI muestra un chip \"auth expired\""
      - "la org NO es seleccionable para un run"

  - title: "orgId malformado es rechazado"
    tags:
      - negative
      - edge-case
      - ac-4
      - validation
    given:
      - "el IE está en la página Connect Org"
    when:
      - "el IE envía un orgId que no tiene 15 o 18 caracteres alfanuméricos"
    then:
      - "el envío es rechazado y no se guarda ninguna org"

  - title: "Re-verificar una org existente"
    tags:
      - happy-path
      - ac-5
      - authbroker
    given:
      - "una org ya conectada"
    when:
      - "el IE la re-verifica"
    then:
      - "connectedAt se preserva y state + lastVerifiedAt se refrescan"

tags:
  - im-735
  - im-740
  - im-804
  - datamigration-appfrontend
  - notion-qa-deliverables
  - deliverable-1
  - authbroker
  - salesforce
  - aws-dev

estimatedDuration: 30


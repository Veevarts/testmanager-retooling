schemaVersion: "1.0"

id: "dcb08c82-016a-44e2-aa1e-dc4b301feb3d"
key: "TC-47"
title: "Plan Templates — guardar como nuevo, actualizar versión shared, master es read-only"
description: |
  Cobertura QA de Feature 3 del Deliverable 1 (Notion QA Deliverables —
  T6 implementation case end-to-end / AWS dev real Step Functions),
  bajo el epic IM-735 (DataMigration AppFrontend).

  Templates se gestionan inline en Plan Preview. Los usuarios poseen
  "shared" templates; "master" templates son read-only (deben forkearse
  vía "Save as new").

  Tickets relacionados del epic IM-735:
  - IM-739 W1-4 Frontend entry + Plan preview skeleton (incluye templates)

  Fuente Gherkin: Notion · QA Deliverables · Deliverable 1 · Feature 3
  https://app.notion.com/p/37302267648e81808620e072114f9a67

type: functional
priority: high
status: active

preconditions:
  - "IE en Plan Preview con selección de cases"
  - "Existen templates seeded de kind \"master\" (ej. master template publicado vía CLI)"
  - "Catálogo seeded (case 3.12 / 5.04 disponibles)"

format: gherkin
scenarios:
  - title: "Guardar la selección actual como un nuevo template"
    tags:
      - happy-path
      - ac-1
      - template-create
    given:
      - "una selección de cases en Plan Preview"
    when:
      - "el IE hace clic en \"Save as new\", le pone nombre y confirma"
    then:
      - "se publica un nuevo template en versión 1 con kind \"shared\""
      - "aparece en el dropdown de templates"

  - title: "Actualizar un template shared"
    tags:
      - happy-path
      - ac-2
      - template-update
    given:
      - "un template \"shared\" está seleccionado y la selección de cases cambió"
    when:
      - "el IE hace clic en \"Update\""
    then:
      - "se publica una nueva versión (v+1), aún de kind \"shared\""

  - title: "Un template master no puede actualizarse in place"
    tags:
      - negative
      - ac-3
      - template-master
    given:
      - "un template \"master\" está seleccionado"
    when:
      - "el IE inspecciona las acciones disponibles en Plan Preview"
    then:
      - "la acción \"Update\" está deshabilitada"
      - "el IE debe forkearlo vía \"Save as new\""

tags:
  - im-735
  - im-739
  - datamigration-appfrontend
  - notion-qa-deliverables
  - deliverable-1
  - templates

estimatedDuration: 20


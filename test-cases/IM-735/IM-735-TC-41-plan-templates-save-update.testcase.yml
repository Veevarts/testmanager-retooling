schemaVersion: "1.0"

id: "dcb08c82-016a-44e2-aa1e-dc4b301feb3d"
key: "TC-41"
title: "Plan Templates — save as new, update shared version, master is read-only"
description: |
  Cobertura QA de Feature 3 del Deliverable 1 (Notion QA Deliverables —
  T6 implementation case end-to-end / AWS dev real Step Functions),
  bajo el epic IM-735 (DataMigration AppFrontend).

  Templates se gestionan inline en Plan Preview. Los usuarios poseen
  "shared" templates; "master" templates son read-only (deben forkearse
  via "Save as new").

  Tickets relacionados del epic IM-735:
  - IM-739 W1-4 Frontend entry + Plan preview skeleton (incluye templates)

  Fuente Gherkin: Notion · QA Deliverables · Deliverable 1 · Feature 3
  https://app.notion.com/p/37302267648e81808620e072114f9a67

type: functional
priority: high
status: active

preconditions:
  - "IE en Plan Preview con seleccion de cases"
  - "Existen templates seeded de kind \"master\" (ej. master template publicado via CLI)"
  - "Catalogo seeded (caso 3.12 / 5.04 disponibles)"

format: gherkin
scenarios:
  - title: "Save the current selection as a new template"
    tags:
      - happy-path
      - ac-1
      - template-create
    given:
      - "a selection of cases on Plan Preview"
    when:
      - "the IE clicks \"Save as new\", names it, and confirms"
    then:
      - "a new template is published at version 1 with kind \"shared\""
      - "it appears in the template dropdown"

  - title: "Update a shared template"
    tags:
      - happy-path
      - ac-2
      - template-update
    given:
      - "a \"shared\" template is selected and the case selection changed"
    when:
      - "the IE clicks \"Update\""
    then:
      - "a new version (v+1) is published, still kind \"shared\""

  - title: "A master template cannot be updated in place"
    tags:
      - negative
      - ac-3
      - template-master
    given:
      - "a \"master\" template is selected"
    when:
      - "the IE inspects the available actions on Plan Preview"
    then:
      - "the \"Update\" action is disabled"
      - "the IE must fork it via \"Save as new\""

tags:
  - im-735
  - im-739
  - datamigration-appfrontend
  - notion-qa-deliverables
  - deliverable-1
  - templates

estimatedDuration: 20


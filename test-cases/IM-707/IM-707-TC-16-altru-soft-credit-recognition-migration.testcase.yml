schemaVersion: "1.0"

id: "f1ef1089-89cc-45c3-aeff-6cc2f2be30f7"
key: "TC-16"
title: "NPSP soft credit migration produces correct Partial and Account Soft Credit records in Salesforce"
description: |
  Cobertura QA de IM-707 (sub-tarea IM-725) bajo el epic IM-70 Altru
  Queries. Validacion funcional en el sandbox tucsontrainings sobre el
  outcome de la migracion de PR 104 (MigrationToolETL), anclada al
  dataset PR_IM707: cuatro Opportunities que cubren los cuatro patrones
  funcionales relevantes (multi_mixed, multi_psc, single_psc, single_asc).

  Cambios desde v2:
  - Dataset TEST_IM707 reemplazado por PR_IM707 (4 Opps con donors,
    recipients y RecognizedAccs dedicados; ver preconditions).
  - El bug de picklist restringido en npsp__Role__c quedo resuelto en
    el pipeline emitiendo 'Donation Source' en ASC; ahora se valida
    como regression-fix en el Scenario 3.
  - Se reducen los escenarios de 9 a 4 escenarios densos, organizados
    por patron funcional y agregando rollups end-to-end como cierre.

type: integration
priority: medium
status: active

preconditions:
  - "Acceso al sandbox tucsontrainings con permisos de lectura sobre npsp__Partial_Soft_Credit__c, npsp__Account_Soft_Credit__c, Opportunity, Contact y Account"
  - "Dataset PR_IM707 cargado: 4 Opportunities (multi_mixed 225000, multi_psc 106762, single_psc 5000, single_asc 5000), cada una con su Donor primario, recipients y, cuando aplica, una org RecognizedAcc"
  - "NPSP instalado con Account Model = Household Account; el rollup batch job ya corrio al menos una vez tras la carga"
  - "QA tiene permisos para correr SOQL via sf data query"

format: gherkin
scenarios:
  - title: "OPP multi_psc preserves five distinct Partial Soft Credit rows including reused recipients"
    tags:
      - ac-1
      - happy-path
      - grain-preservation
      - multi-recognition
      - psc
    given:
      - "the PR_IM707 dataset is loaded in tucson-trainings"
      - "OPP multi_psc has Donor2 as primary donor for 106762 USD"
    when:
      - "QA queries npsp__Partial_Soft_Credit__c filtered by Opportunity = OPP multi_psc"
    then:
      - "exactly 5 PSC rows exist for that Opportunity"
      - "the rows include npsp__Amount values 52175, 10000, 5000, 3000 and 1000"
      - "two recipient Contacts each appear in 2 PSC rows on the same Opportunity (the grain preserves one row per REVENUERECOGNITION.ID even when the recognized constituent repeats)"
      - "every row has npsp__Role_Name equal to 'Soft Credit'"
      - "OPP multi_psc.Amount remains 106762 USD and Primary Contact remains Donor2"

  - title: "OPP multi_mixed exposes PSC and ASC for the same donation without changing hard credit"
    tags:
      - ac-1
      - ac-2
      - happy-path
      - multi-recognition
      - org-recognition
      - hard-credit-preservation
    given:
      - "the PR_IM707 dataset is loaded"
      - "OPP multi_mixed has Donor1 as primary donor for 225000 USD"
    when:
      - "QA inspects OPP multi_mixed and its related lists in Salesforce"
    then:
      - "OPP multi_mixed.Amount remains 225000 USD and Primary Contact remains Donor1"
      - "npsp__Partial_Soft_Credit__c contains 2 rows for OPP multi_mixed: each recipient Contact with npsp__Amount 50000 and npsp__Role_Name 'Soft Credit'"
      - "npsp__Account_Soft_Credit__c contains 1 row for OPP multi_mixed: RecognizedAcc with npsp__Amount 50000 and npsp__Role 'Donation Source'"
      - "the sum of soft credits (150000 USD = 67% of the hard credit) does not modify or duplicate the hard credit on OPP multi_mixed"

  - title: "OPP single_asc routes the soft credit to npsp__Account_Soft_Credit__c with a valid restricted picklist value (regression fix verified)"
    tags:
      - ac-1
      - regression-fix
      - org-recognition
      - asc
      - restricted-picklist-fix
    given:
      - "npsp__Account_Soft_Credit__c.npsp__Role__c is a restricted picklist that only accepts Donation Source, Influencer or Match"
      - "OPP single_asc has Donor4 as primary donor for 5000 USD and RecognizedAcc as the recognized organization"
    when:
      - "QA queries npsp__Account_Soft_Credit__c filtered by Opportunity = OPP single_asc"
    then:
      - "exactly 1 ASC row exists, referencing RecognizedAcc with npsp__Amount equal to 150"
      - "npsp__Role__c equals 'Donation Source' (the pipeline now emits a valid picklist value)"
      - "the load completed without INVALID_OR_NULL_FOR_RESTRICTED_PICKLIST"
      - "no PSC row exists for OPP single_asc (the org-recognized path routes to ASC only)"

  - title: "NPSP rollups on recognized Contacts and Accounts reflect the loaded soft credit data end-to-end"
    tags:
      - ac-2
      - rollup-validation
      - npsp-rollups
      - cross-opp-coverage
    given:
      - "the PR_IM707 dataset (all 4 Opportunities) is loaded and the NPSP rollup batch has completed"
    when:
      - "QA inspects npsp__Soft_Credit_Total__c and related rollup fields on each recognized Contact and on each recognized Account"
    then:
      - "the multi_psc recipient that received 52175 + 1000 shows a Soft Credit Total of 53175"
      - "the multi_psc recipient that received 10000 + 3000 shows a Soft Credit Total of 13000"
      - "the multi_psc recipient that received 5000 shows a Soft Credit Total of 5000"
      - "each multi_mixed recipient Contact shows a Soft Credit Total of 50000"
      - "the single_psc recipient Contact shows a Soft Credit Total of 250"
      - "the multi_mixed RecognizedAcc shows an Account-level soft credit total of 50000"
      - "the single_asc RecognizedAcc shows an Account-level soft credit total of 150"
      - "no Donor (Donor1, Donor2, Donor3, Donor4) sees their own Opportunity reflected in their soft credit rollups"

tags:

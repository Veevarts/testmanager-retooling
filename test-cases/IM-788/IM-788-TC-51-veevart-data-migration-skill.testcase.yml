schemaVersion: "1.0"

id: "f92e695e-ac5f-459a-af63-dc3658f2fe0d"
key: "TC-51"
title: "Veevart Data Migration Skill — experiencia end-user del migration specialist (dashboard Vite local)"
description: |
  Cobertura QA FUNCIONAL de IM-788 desde la perspectiva del migration
  specialist (end-user), no desde la perspectiva técnica (cubierta en
  [[IM-788-TC-53-veevart-data-migration-skill-pr-technical-review]],
  ejecutada en TR-061).

  El valor real de la skill para el specialist es el **dashboard Vite
  local** que se levanta en `http://127.0.0.1:5173/` (o el puerto que
  asigne la skill por workspace). Las 16 vistas del dashboard están
  declaradas en `references/vite-progress-dashboard.md` y son donde
  el specialist:
  - Configura y aprueba mappings sin tocar código
  - Ve el progreso de la migración a nivel global y por objeto
  - Identifica blockers que requieren su decisión
  - Explora fallas con root cause + plan de retry
  - Genera el acceptance report final para el cliente

  Estos 7 escenarios validan que el specialist puede HACER su trabajo
  completo desde el dashboard, sin necesidad de leer SKILL.md ni
  comandos en terminal después del intake inicial.

  La cobertura técnica (no-writes, intake forms, safety gate arquitectónico,
  sync script, contratos internos) se ejecuta por codex y queda registrada
  en TC-53 / TR-061.

  Tickets:
  - IM-788 padre
  - IM-889 — QA Sub-task consolidada
  - IM-874 — caso empírico Maloof (companion: TC-52)
  - IM-637 / IM-729 — Tessitura / RE templates Obvious.ai

  Pre-condición de datos para Scenarios 2-7:
  - Workspace poblado por la skill (Discovery / Mapping / Generate modes)
  - O artefactos sintéticos en `<workspace>/upload-runs/` (ej. los
    750WI*.csv de IM-812 Rentals que existen en el repo)

type: functional
priority: medium
status: active

preconditions:
  - "Clone local de Veevarts/VeevartAIHub con branch del PR y skill sincronizada"
  - "Claude Code con skill visible en `~/.claude/skills/veevart-data-migration-skill/SKILL.md`"
  - "Node.js + npm disponibles para el dashboard Vite"
  - "Browser con DevTools accesibles para verificar consola y network"
  - "Workspace de migración creado (skill via intake o setup manual con sample)"

format: gherkin
scenarios:
  - title: "El specialist activa la skill y completa el intake guiado hasta tener un workspace listo"
    tags:
      - happy-path
      - intake
      - activation
      - end-user
    given:
      - "Claude Code abierto en un directorio local"
      - "la skill `veevart-data-migration-skill` distribuida en `~/.claude/skills/`"
    when:
      - "el specialist invoca la skill con `/veevart-data-migration-skill` o un prompt con intent de migración"
      - "el specialist completa el intake form (Source / Mode / Target env / Volume / Submit — el orden y los steps pueden variar según contexto, la skill adapta)"
    then:
      - "la skill se activa visible en la UI de Claude Code"
      - "la skill presenta opciones navegables con descripción de 1-3 líneas por opción"
      - "la skill respeta el modo elegido (Discovery only NO genera staging/loads; Mapping only NO ejecuta loads)"
      - "al terminar el intake la skill confirma qué va a hacer + crea/identifica un workspace local listo para que el specialist abra el dashboard"

  - title: "El specialist abre el dashboard Vite local y navega las 16 vistas sin errores"
    tags:
      - happy-path
      - dashboard
      - navigation
      - 16-views
      - end-user
    given:
      - "workspace de migración disponible con `dashboard/` scaffolded (Scenario 1 PASS)"
    when:
      - "el specialist corre `npm install && npm run dev` dentro de `<workspace>/dashboard/`"
      - "el specialist abre `http://127.0.0.1:5173/` (o el puerto que la skill asigne) en un browser"
      - "el specialist abre DevTools → Console y revisa Network"
    then:
      - "la app carga sin errores rojos en consola del browser"
      - "no hay requests fallidos (4xx/5xx) en Network durante la carga inicial"
      - "las 16 vistas declaradas en `references/vite-progress-dashboard.md` aparecen como tabs/secciones navegables: Overall summary, Per-object progress, Operation manifest, Deferred updates, Upload runs, Failure explorer, Dependency graph, Global object map, Field-level mapping viewer, Full source data, Mandatory coverage, Fund domains, Sample staged, Website evidence, Validation checklist, New-provider control plane"
      - "cada vista se carga sin error aunque esté vacía (empty state legible, no crash)"

  - title: "El specialist entiende el estado global de la migración en menos de 30 segundos"
    tags:
      - happy-path
      - dashboard
      - overall-summary
      - per-object
      - end-user
    given:
      - "dashboard abierto en la vista Overall summary (Scenario 2 PASS)"
      - "workspace con al menos staging o upload data poblada"
    when:
      - "el specialist mira la vista Overall summary durante 30 segundos"
      - "el specialist navega a Per-object progress"
    then:
      - "el Overall summary muestra al menos: total source rows, total staged, total uploaded, total failed, total pending — todos numéricos visibles"
      - "Per-object progress muestra cada objeto target con su breakdown source/staged/uploaded/failed/pending"
      - "los conteos en Overall summary son consistentes con la suma de Per-object progress (no hay drift)"
      - "el specialist puede identificar cuáles objetos están \"green\" (uploaded == staged) y cuáles tienen failures, sin tener que abrir cada upload-run individualmente"

  - title: "El specialist identifica blockers y mandatory-field gaps que requieren su decisión"
    tags:
      - happy-path
      - dashboard
      - validation-checklist
      - mandatory-coverage
      - blocking-gate
      - end-user
    given:
      - "dashboard con workspace donde hay al menos un blocker conocido (campo mandatory sin map, target sin Email Deliverability resuelto, fund classifier pendiente, etc.)"
    when:
      - "el specialist navega a Validation Checklist y Mandatory Coverage"
    then:
      - "los blockers aparecen marcados como `BLOCKER` (rojo o equivalente visual) — NO como warning"
      - "cada blocker incluye: descripción del gap, objeto afectado, campo o regla involucrada, y owner sugerido (specialist / data steward / cliente)"
      - "la vista permite filtrar por severidad (Blocker / Warning / Info)"
      - "el specialist puede entender qué bloquea avanzar a load sin tener que leer SKILL.md ni `references/etl-control-plane.md`"

  - title: "El specialist revisa los mappings field-by-field y aprueba con un click"
    tags:
      - happy-path
      - dashboard
      - mapping-viewer
      - approval
      - end-user
    given:
      - "dashboard con workspace que ya tiene mapping baseline cargado (Scenario 1 completó al menos Mapping only mode)"
    when:
      - "el specialist navega a Field-level mapping viewer"
      - "el specialist filtra por estado: `pending approval`"
      - "el specialist selecciona un mapping y revisa los 3 layers (baseline provider mapping / project override / final approved)"
      - "el specialist hace click en \"Approve\""
    then:
      - "el viewer muestra por field: source name, transform rule, target field API name, target field type, relationship/external-ID resolution, operation classification, approval status"
      - "los 3 layers (baseline / override / final) son distinguibles visualmente"
      - "el botón Approve escribe la aprobación en `mappings/mapping-approvals.json` del workspace local"
      - "el dashboard NO ofrece botones que muten directamente la org Salesforce — solo \"copyable command preview\" o \"export to apply script\""

  - title: "El specialist explora una falla, entiende el root cause y planifica el retry"
    tags:
      - happy-path
      - dashboard
      - failure-explorer
      - upload-runs
      - end-user
      - retry-path
    given:
      - "dashboard con al menos un upload-run con failed records (puede usarse los 750WI*.csv de IM-812 como sample sintético)"
    when:
      - "el specialist navega a Upload runs y selecciona un run con failures"
      - "el specialist navega a Failure explorer filtrando por ese job ID"
      - "el specialist revisa un failed record"
    then:
      - "Upload runs lista cada job con: job ID, objeto, success count, failed count, fecha, duración"
      - "Failure explorer permite filtrar por job ID, objeto, mensaje de error, y deduplica errores similares"
      - "cada failed record muestra el mensaje crudo de Salesforce + un root cause interpretado (ej. \"missing required parent Account/Contact\" o \"Per-Item fee model with empty Charge\")"
      - "Failure explorer ofrece exportar el set de failures como CSV de retry (compatible con re-upload via `sf data import`)"
      - "el dashboard NO ejecuta el retry directamente — solo prepara el CSV; el load es decisión explícita del specialist"

  - title: "El specialist genera un acceptance report listo para entregar al cliente"
    tags:
      - happy-path
      - dashboard
      - acceptance-report
      - validation-checklist
      - end-user
    given:
      - "dashboard con un sample/wave de migración completado (Scenarios 2-6 con datos)"
    when:
      - "el specialist solicita la generación del acceptance report desde el dashboard (botón o comando preview)"
    then:
      - "se genera `reports/final-sample-acceptance-report.md` con totales por objeto, success/failed counts, blockers pendientes, deferred updates, y follow-ups"
      - "el report es legible por un cliente no técnico (sin API names crudos como variables principales — usa labels de Veevart)"
      - "Validation Checklist marca el item \"sample deployment acceptance\" como PASS si todos los conteos coinciden, o pending si hay deferred updates explícitos"
      - "el specialist puede compartir el report .md/.pdf con el cliente sin tener que post-procesarlo"


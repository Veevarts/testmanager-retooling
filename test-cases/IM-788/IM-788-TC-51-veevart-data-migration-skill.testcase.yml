schemaVersion: "1.0"

id: "f92e695e-ac5f-459a-af63-dc3658f2fe0d"
key: "TC-51"
title: "Veevart Data Migration Skill — validación funcional de los 4 modos del router + safety gate"
description: |
  Cobertura QA FUNCIONAL de IM-788 "Create local migration template skill"
  (PR Veevarts/VeevartAIHub#35, head 39993e5).

  Validamos la skill `veevart-data-migration-skill` desde Claude Code
  EN BASE A LO QUE LA SKILL REALMENTE HACE — no a lo que SKILL.md
  documenta. La skill arranca con un router de 4 modos:

  1. Continue <cliente> — resume un workspace in-flight
  2. Start a new migration — intake completo + scaffold workspace
  3. Discovery / mapping only — no writes, inventario + mappings
  4. Audit / report existing — solo resumen + retry CSVs

  Cada escenario valida un modo, en aislamiento, con criterios PASS/FAIL
  observables. El safety gate (write confirmation con 7 campos) se valida
  como escenario propio.

  Tickets:
  - IM-788 padre
  - IM-889 — QA Sub-task consolidada
  - IM-874 — companion (auditoría Maloof, [[IM-874-TC-52-maloof-etapestry-sample-deployment-audit]])
  - Technical review del PR: [[IM-788-TC-53-veevart-data-migration-skill-pr-technical-review]] (ya ejecutado en TR-061)

  Limitaciones (NO levantar como bug):
  - El modo "Continue <cliente>" sólo se puede validar si hay workspace
    previo accesible (ej. artefactos de Maloof). Si no hay, el escenario
    queda NOT-RUN, no FAIL.
  - El modo "Start a new migration" requiere sandbox Salesforce
    y un sample Tessitura o eTapestry para llegar al final.
  - El safety gate se valida cuando la skill intenta cualquier acción
    de escritura (filesystem o Salesforce), no requiere alcanzar un load.

type: functional
priority: medium
status: active

preconditions:
  - "Clone local de Veevarts/VeevartAIHub con branch `task/create-local-migration-template-skill-IM-788` checkout"
  - "Sync ejecutado: `bash scripts/sync-agent-assets.sh` desde la raíz del repo (PASS heredado de TR-061)"
  - "Claude Code instalado y operativo"
  - "Skill visible en `~/.claude/skills/veevart-data-migration-skill/SKILL.md`"

format: gherkin
scenarios:
  - title: "Activación de la skill + router de 4 modos visible"
    tags:
      - happy-path
      - smoke
      - router
      - activation
    given:
      - "Claude Code abierto en cualquier directorio local"
      - "la skill `veevart-data-migration-skill` está distribuida en `~/.claude/skills/`"
    when:
      - "el specialist invoca la skill (`/veevart-data-migration-skill` o un prompt con intent de migración)"
    then:
      - "el runtime activa la skill (visible en la UI de Claude Code)"
      - "la skill muestra el menú \"What do you want me to do with this migration skill right now?\""
      - "el menú contiene exactamente estas 4 opciones: (1) Continue <cliente in-flight si aplica>, (2) Start a new migration, (3) Discovery / mapping only, (4) Audit / report existing"
      - "cada opción incluye descripción de 1-2 líneas explicando qué hace"
      - "el menú permite navegación con flechas + Enter, o cancelar con Esc"

  - title: "Modo Discovery / mapping only — no writes y diagnóstico de artefactos existentes"
    tags:
      - happy-path
      - discovery
      - safety-gate
      - no-writes
    given:
      - "router visible (Scenario 1 PASS)"
    when:
      - "el specialist selecciona \"3. Discovery / mapping only\""
      - "el specialist provee Source = Tessitura (o el que aplique) en el intake form"
    then:
      - "la skill abre un intake form de 4 pasos: Source → Scope → Access → Submit"
      - "la skill NO ejecuta ninguna escritura (ni en filesystem ni en Salesforce)"
      - "si encuentra artefactos locales relevantes, los lista y los clasifica por origen sin moverlos"
      - "si el intake queda incompleto, la skill detiene el flujo y enumera los gaps; NO inventa datos"
      - "al cerrar, la skill resume qué encontró + qué no hizo (sección \"what I did not do\")"

  - title: "Modo Start a new migration — intake completo + workspace scaffold + dashboard Vite"
    tags:
      - happy-path
      - start-new
      - workspace-scaffold
      - dashboard
    given:
      - "router visible (Scenario 1 PASS)"
      - "directorio de workspace vacío (ej. `/tmp/migration-qa-YYYY-MM-DD/`)"
    when:
      - "el specialist selecciona \"2. Start a new migration\""
      - "el specialist completa el intake form (Source + Scope + Access + Submit)"
    then:
      - "la skill crea el workspace con las subcarpetas: `raw/`, `staging/`, `mappings/`, `target-maps/`, `scripts/`, `upload-runs/`, `deferred-updates/`, `reports/`, `status/`, `dashboard/`"
      - "la skill scaffold-ea el dashboard Vite React+TS en `dashboard/`"
      - "el specialist puede correr `cd dashboard && npm install && npm run dev` y abrir el dashboard en `http://127.0.0.1:5173/` sin errores"
      - "el dashboard muestra las 16 vistas declaradas en `references/vite-progress-dashboard.md` (aunque inicialmente vacías)"

  - title: "Modo Audit / report existing — genera resumen sin nuevos loads"
    tags:
      - happy-path
      - audit
      - reporting
      - no-writes
    given:
      - "router visible (Scenario 1 PASS)"
      - "un workspace con `upload-runs/` poblados (artefactos de un deployment previo)"
    when:
      - "el specialist selecciona \"4. Audit / report existing\""
    then:
      - "la skill lee los artefactos existentes (status JSON, upload runs, validation checklist)"
      - "la skill NO ejecuta ningún load nuevo (\"no new loads\" garantizado)"
      - "la skill genera un resumen con: success/failed counts por objeto, root cause de los failed, CSVs de retry"
      - "los outputs aparecen en `reports/` y son consultables por el specialist"

  - title: "Modo Continue <cliente> — resume in-flight deployment"
    tags:
      - happy-path
      - continue
      - in-flight-resume
    given:
      - "router visible (Scenario 1 PASS)"
      - "existe un workspace de cliente in-flight (ej. Maloof eTapestry) accesible"
    when:
      - "el specialist selecciona la opción \"1. Continue <cliente>\""
    then:
      - "la skill carga el workspace del cliente y reporta el estado actual"
      - "la skill identifica los artefactos disponibles (success/failed records, status JSON)"
      - "la skill ofrece acciones siguientes (retry, report, próxima fase) sin ejecutarlas hasta confirmar"
      - "si el workspace path inferido no existe, la skill lo dice claramente en vez de inventarlo"

  - title: "Safety gate — write confirmation con 7 campos antes de cualquier escritura"
    tags:
      - negative
      - safety-gate
      - write-confirmation
      - shared-environment-write
    given:
      - "la skill activa (cualquier modo)"
      - "la skill llega a un punto donde necesita escribir (filesystem o Salesforce)"
    when:
      - "la skill detecta una acción de escritura inminente (load, edit de archivo committeable, mover artefactos)"
    then:
      - "la skill exige confirmación exacta conteniendo los 7 campos: (1) target org/resource, (2) operation, (3) object API name (o file path), (4) row count (o file count), (5) payload path, (6) side effects, (7) verification/rollback plan"
      - "si el specialist omite algún campo, la skill RECHAZA y pide completar"
      - "para acciones menores (ej. editar .gitignore) la skill aplica un equivalente proporcional: muestra el diff propuesto + pide confirmación antes de ejecutar"
      - "la skill nunca ejecuta una escritura sin esa confirmación, en ningún modo del router"


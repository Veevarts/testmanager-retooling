schemaVersion: "1.0"

id: "f92e695e-ac5f-459a-af63-dc3658f2fe0d"
key: "TC-51"
title: "Veevart Data Migration Skill vs Obvious.ai — comparación funcional de migraciones equivalentes (mismo sample, mismo target)"
description: |
  Cobertura QA FUNCIONAL de IM-788 con enfoque comparativo:
  ¿la nueva skill `veevart-data-migration-skill` produce un resultado
  equivalente, mejor o peor que Obvious.ai cuando ambas reciben el
  MISMO sample y apuntan al MISMO target?

  El specialist ejecuta la misma migración Tessitura → Salesforce
  sandbox con ambas herramientas, luego compara:
  - Outputs (counts, mappings field-by-field, errores, tiempo)
  - UX durante la operación (dashboard skill vs UI Obvious.ai)

  La validación responde 3 preguntas de negocio:
  1. ¿La skill produce el mismo resultado que Obvious.ai? (paridad funcional)
  2. ¿La skill es operativamente mejor para el specialist? (UX)
  3. ¿Adoptamos la skill, mantenemos Obvious.ai, o ambas conviven?

  La cobertura técnica (no-writes, intake forms, safety gate
  arquitectónico) está cubierta en [[IM-788-TC-53...]] / TR-061 (codex).

  Tickets:
  - IM-788 padre
  - IM-889 — QA Sub-task consolidada
  - IM-637 — Tessitura template Obvious.ai (la herramienta de comparación)
  - IM-729 — RE template Obvious.ai
  - IM-874 — caso empírico Maloof (companion TC-52)

  Default scope para la comparación:
  - Source: Tessitura (la skill trae `providers/tessitura/`; Obvious.ai tiene template Tessitura)
  - Target: sandbox Tucson `veevartd` (admin.veevart@tucsonbotanical.org.trainings)
  - Sample: ≤ 100 records por objeto (Constituents, Donations, Funds)

type: functional
priority: medium
status: active

preconditions:
  - "Sample de Tessitura accesible (ZIP export real o mock con header + datos de Constituents/Donations/Funds)"
  - "Acceso operativo a Obvious.ai con el template Tessitura habilitado"
  - "Sandbox Salesforce de destino con estado conocido (limpia o snapshot pre-migración) — recomendado: `veevartd`"
  - "Claude Code con `veevart-data-migration-skill` instalada y sincronizada"
  - "Node.js + npm para correr el dashboard Vite local"
  - "Browser + capacidad para tomar screenshots"

format: gherkin
scenarios:
  - title: "Sample común preparado y target en estado conocido — listo para alimentar ambas herramientas"
    tags:
      - happy-path
      - sample-prep
      - baseline
      - comparison
    given:
      - "el specialist define el scope: Tessitura → sandbox Tucson `veevartd`, objetos en alcance Constituents + Donations + Funds"
      - "el sample de Tessitura está disponible (ZIP export o mock con `export_column_headings.txt` + `export_customers.txt` + `export_donations.txt` + `export_funds.txt`)"
    when:
      - "el specialist documenta el sample: cuántos records por archivo, qué objetos, qué fecha de captura"
      - "el specialist verifica el target: cuenta records pre-existentes en `Account`, `Contact`, `Opportunity`, `Auctifera__Specific_Fund__c` en `veevartd` y los registra como baseline"
    then:
      - "el sample tiene conteo reproducible y queda accesible para ambas herramientas (path local para la skill, upload UI para Obvious.ai)"
      - "el target tiene baseline pre-migración documentada (SOQL counts) para detectar drift después"
      - "el specialist tiene una hoja con: sample size, target baseline, fecha + hora de captura"

  - title: "El specialist ejecuta la migración con la skill veevart-data-migration-skill y captura outputs + UX"
    tags:
      - happy-path
      - skill-run
      - dashboard
      - comparison-input
    given:
      - "sample común preparado y baseline registrada (Scenario 1 PASS)"
      - "la skill activa en Claude Code (intake guiado validado en flow previo)"
    when:
      - "el specialist invoca la skill y completa el intake (Source=Tessitura, Mode=Generate staging/scripts o Dry-run/execute según riesgo, Target env=Full/partial sandbox, Volume=Sample)"
      - "el specialist abre el dashboard Vite local que la skill scaffold-ea"
      - "el specialist aprueba mappings desde el dashboard, autoriza el load contra `veevartd`, y deja que la skill complete el flow"
    then:
      - "la skill completa el flow sin caer y reporta success/failed por objeto"
      - "el dashboard refleja el progreso en tiempo real con sus 16 vistas pobladas (al menos: Overall summary, Per-object progress, Upload runs, Failure explorer, Mapping viewer)"
      - "el specialist captura para comparación: tiempo total, records uploaded por objeto, errores observados, screenshots clave del dashboard, ruta del acceptance report generado"

  - title: "El specialist ejecuta la MISMA migración con Obvious.ai y captura sus outputs + UX"
    tags:
      - happy-path
      - obvious-run
      - comparison-input
    given:
      - "sample común preparado y baseline registrada (Scenario 1 PASS)"
      - "el specialist tiene acceso a Obvious.ai con el template Tessitura habilitado"
    when:
      - "el specialist sube el sample (mismo dataset que Scenario 2) a Obvious.ai"
      - "el specialist ejecuta el template Tessitura apuntando al mismo target sandbox `veevartd`"
      - "el specialist sigue el flow de Obvious.ai (mapping approval + load) y deja que complete"
    then:
      - "Obvious.ai completa el flow y reporta success/failed por objeto"
      - "el specialist captura para comparación: tiempo total, records uploaded por objeto, errores observados, screenshots clave de la UI Obvious.ai, ruta del reporte generado"

  - title: "El specialist compara los OUTPUTS DE DATOS de ambas herramientas side-by-side"
    tags:
      - happy-path
      - comparison
      - output-comparison
      - verdict
    given:
      - "Scenarios 2 y 3 completados con outputs capturados de ambas herramientas"
    when:
      - "el specialist construye una tabla comparativa por objeto: source rows | skill-staged | skill-uploaded | skill-failed | obvious-staged | obvious-uploaded | obvious-failed"
      - "el specialist compara los mappings field-by-field: source field → target API name, ¿coinciden ambas?"
      - "el specialist revisa los errores: ¿son los mismos? ¿más en una herramienta que en la otra?"
    then:
      - "la tabla tiene veredicto explícito por dimensión: counts (skill mejor/igual/peor que Obvious.ai), mappings (idem), errores (idem), tiempo (idem)"
      - "cualquier diferencia significativa queda documentada con su razón (ej. campo X mapeado distinto porque skill aplica regla Y, Obvious.ai aplica Z)"
      - "se emite un veredicto: 'paridad funcional con Obvious.ai en N de M dimensiones de datos'"

  - title: "El specialist compara la UX de ambas herramientas y emite veredicto operativo"
    tags:
      - happy-path
      - comparison
      - ux-comparison
      - verdict
    given:
      - "Scenarios 2 y 3 completados con screenshots de UX de ambas herramientas"
    when:
      - "el specialist evalúa 5 dimensiones de UX en cada herramienta: claridad del progreso, surfacing de blockers, aprobación de mappings, navegación, exportabilidad del reporte final"
    then:
      - "se documenta tabla side-by-side con veredicto por dimensión: dashboard skill mejor/igual/peor que UI Obvious.ai"
      - "se identifican al menos 1 ventaja y 1 desventaja por herramienta"
      - "el veredicto final es accionable: 'adoptar skill / mantener Obvious.ai / convivencia con criterio X'"


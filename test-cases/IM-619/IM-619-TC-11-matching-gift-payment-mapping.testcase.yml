schemaVersion: "1.0"
id: "11f6e296-47e1-479b-b80b-4d4e63892099"
key: "TC-11"
title: "Matching gift payment mapping avoids duplicate Salesforce records"
description: "Cobertura QA de IM-619 para validar que los matching gifts no creen pagos duplicados en Salesforce por el mapeo de opportunity-payment, y que los pledge payments sigan cargando sin regresion."
type: "integration"
priority: "medium"
status: "active"
format: "gherkin"
preconditions:
  - "El usuario QA tiene acceso al dataset fuente en Altru y a los registros migrados en Salesforce."
  - "Existe el caso de referencia con Matching Gift rev-10467999 y Payment rev-10468000 para la cuenta TUSCON."
  - "Existe al menos un caso control de pledge con pledge payments que no corresponde a matching gift."
  - "El usuario QA puede ejecutar o revisar las corridas de donation-transaction y opportunity-payment despues del ajuste."
scenarios:
  - title: "Create one matching gift opportunity with one linked payment"
    tags:
      - "happy-path"
      - "matching-gift"
    given:
      - "el dataset fuente contiene un matching gift con su payment correspondiente"
      - "el matching gift y su payment estan incluidos en las corridas de donation-transaction y opportunity-payment"
    when:
      - "las pipelines se ejecutan con el ajuste aplicado"
    then:
      - "Salesforce contiene exactamente un Opportunity para el matching gift"
      - "Salesforce contiene exactamente un npe01__OppPayment__c vinculado a ese Opportunity"
      - "no existe un payment standalone o duplicado para la misma transaccion"
  - title: "Keep pledge payments loading without regression"
    tags:
      - "regression"
      - "pledge-payments"
    given:
      - "el dataset fuente contiene un pledge con sus pledge payments y no corresponde a matching gift"
    when:
      - "las pipelines se ejecutan despues del ajuste"
    then:
      - "los pledge payments se crean como npe01__OppPayment__c vinculados a su Opportunity"
      - "no se introduce regresion en los pagos que no son matching gift"
  - title: "Reference case no longer creates duplicate payment records"
    tags:
      - "reference-case"
      - "tuscon"
    given:
      - "el caso de referencia usa Matching Gift rev-10467999 y Payment rev-10468000 para la cuenta TUSCON"
      - "antes del ajuste ese caso generaba un registro de pago duplicado en Salesforce"
    when:
      - "la migracion se vuelve a ejecutar con el ajuste aplicado"
    then:
      - "Salesforce contiene un solo Opportunity del matching gift"
      - "Salesforce contiene un solo payment vinculado a ese Opportunity"
      - "el registro duplicado observado previamente ya no existe"
tags:
  - "im-619"
  - "altru-queries"
  - "matching-gift"
  - "payment-mapping"
  - "salesforce-migration"
  - "pledge-payments"

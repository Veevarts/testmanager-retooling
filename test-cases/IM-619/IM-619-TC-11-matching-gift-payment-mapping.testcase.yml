schemaVersion: "1.0"
id: "11f6e296-47e1-479b-b80b-4d4e63892099"
key: "TC-11"
title: "Matching gift payment mapping avoids duplicate Salesforce records"
description: "Cobertura QA de IM-619 para validar que los matching gifts no creen pagos duplicados en Salesforce por el mapeo de opportunity-payment, y que los pledge payments sigan cargando sin regresion."
type: "integration"
priority: "medium"
status: "active"
format: "gherkin"
preconditions:
  - "El usuario QA tiene acceso al dataset fuente en Altru y a los registros migrados en Salesforce."
  - "Existe el caso de referencia con Matching Gift rev-10467999 y Payment rev-10468000 para la cuenta TUSCON."
  - "Existe al menos un caso control de pledge con pledge payments que no corresponde a matching gift."
  - "El usuario QA puede ejecutar o revisar las corridas de donation-transaction y opportunity-payment despues del ajuste."
scenarios:
  - title: "Matching gift creates one opportunity and one linked payment"
    tags:
      - "happy-path"
      - "matching-gift"
    given:
      - "an Altru matching gift with its corresponding payment"
    when:
      - "the donation-transaction and opportunity-payment pipelines run"
    then:
      - "Salesforce contains exactly one matching gift Opportunity"
      - "Salesforce contains exactly one linked npe01__OppPayment__c"
      - "no standalone duplicate payment record exists"
  - title: "Reference case no longer produces duplicate payment records"
    tags:
      - "reference-case"
      - "tuscon"
    given:
      - "the reference case rev-10467999 and rev-10468000 for account TUSCON"
    when:
      - "the fix is applied and the migration is re-run"
    then:
      - "Salesforce contains one matching gift Opportunity and one linked payment"
      - "the previously observed duplicate record is not present"
  - title: "Pledge payments continue loading without regression"
    tags:
      - "regression"
      - "pledge-payments"
    given:
      - "a pledge transaction with valid pledge payments that is not a matching gift"
    when:
      - "the pipelines run after the fix"
    then:
      - "the pledge payments are still created as linked npe01__OppPayment__c records"
      - "no regression is introduced for non-matching-gift payments"
tags:
  - "im-619"
  - "altru-queries"
  - "matching-gift"
  - "payment-mapping"
  - "salesforce-migration"
  - "pledge-payments"

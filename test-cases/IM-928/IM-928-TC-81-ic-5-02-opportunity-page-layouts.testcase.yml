title: IC 5.02 — Update Opportunity + Lightning Page Layouts (delivery hybrid, 10 selections + 3 manual handoffs)
description: |
  Cobertura QA de IM-928 (5.02 Update Opportunity + Lightning Page Layouts —
  deliver to Implementations, high-confidence). Junio delivery del Implementation
  Case `ic-5-02-opportunity-page-layouts` v6 (hybrid). Confianza alta por reporte
  IM-735 (2026-06-12): verificado cross-org. Delivered en BE PR #192 (T2
  addRelatedList op) + FE PR #115 (searchable selects card).

  Validar que el IC:
  1) presenta 1 input card con 10 selecciones de page-layout (Opportunity ×6 record
     types + Payment + Fund Assignment + Veevart File Private/Public), searchable
     dropdowns discovered from org (no hardcoded),
  2) asigna cada Veevart layout como active al record type/objeto correspondiente
     across all profiles y verifica por read-back,
  3) inserta la Files related list en cada Opportunity layout (dedupe),
  4) asigna Payment + Fund Assignment layouts,
  5) asigna Private/Public Veevart File layouts + confirma que Membership Card
     Logo y Specific Fund Banner están en ambos,
  6) parquea con 3 handoffs manuales guiados (Veevart Opportunity Lightning
     Record Page como Org Default, Payment Assignment wizard, override del label
     `Make a Donation` → `Make a Donation/Membership` en Contact),
  7) org-agnostic + idempotente.

  QA Sub-task asociada: IM-988
  Riesgos abiertos: AC6 handoffs manuales requieren attestation del operator;
  la verificación real de la Lightning Record Page assignment y del Payment
  Assignment wizard es Setup-UI-only.
type: functional
priority: high
status: active
preconditions:
- Implementation Case `ic-5-02-opportunity-page-layouts` v6 deployado en prod (BE PR #192 + FE PR #115)
- Org target con Veevart package (Auctifera + vnfp) instalado
- Existen los 6 Opportunity record types (Donation, Grant, In-Kind Gift, Major Gift, Matching Gift, Membership) y objetos Payment, Fund Assignment, Veevart File con record types Private/Public
- Permisos para modificar page layout assignments across all profiles
- Acceso a Setup para los 3 manual handoffs (Lightning Record Page, Payment Assignment wizard, Contact button override)
- Acceso al catálogo de prod para seedear el IC
format: gherkin

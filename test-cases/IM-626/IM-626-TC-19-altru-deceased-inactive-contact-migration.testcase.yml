schemaVersion: "1.0"

id: "2cf225b4-4186-43e2-bba2-c76b02facc51"
key: "TC-19"
title: "Altru contact query reflects deceased and inactive constituents end-to-end (Aspen data review)"
description: |
  Cobertura QA de IM-626 (sub-task IM-734) bajo el epic IM-70 Altru
  Queries. Foco: revision de data sobre el output del query actualizado
  (`contact.sql` + `CROSS APPLY ST`) tras PR 105 en MigrationToolETL.

  Solo se valida lo que produce el query (resultado de safesql sobre
  Aspen). Fuera de scope: CSV contract, pipeline orquestacion, upsert al
  sandbox de Salesforce, idempotencia de re-run, tenant compatibility,
  preservacion de manual fixes. Esos van en test cases separados.

  DB validada: `Aspen_db_1` via safesql profile `aspen` (corrida del
  2026-05-19).

  Resultado de la primera corrida (todos PASS):
  - Total individual constituents en Aspen: 11,262
  - Deceased (nueva logica = fila en DECEASEDCONSTITUENT): 796
  - Deceased (vieja logica = DECEASEDDATE parseable): 374
  - Delta = 422 deceased recuperados (53% del universo se perdia pre-fix)
  - Inactive (CONSTITUENT.ISINACTIVE = 1): 1,001
  - Inactive OR deceased: 1,177

  Severidad de la story: 2 - Critical (Compliance, Financial Loss on
  reports, Data Corruption).

  Referencias:
  - PR: https://github.com/Veevarts/MigrationToolETL/pull/105
  - Branch: story/deceased-and-inactive-contacts-in-altru-not-IM-626

type: integration
priority: high
status: active

preconditions:
  - "Acceso safesql a `Aspen_db_1` configurado (profile `aspen` con bastion + keychain)"
  - "Permisos SELECT sobre CONSTITUENT y DECEASEDCONSTITUENT en Aspen"
  - "Altru Lookup IDs de regresion disponibles: 112009 (Mr. Alexander Hunter, DECEASED) y 8-10014788 (James Connolly, INACTIVE)"
  - "Filtro de query aplicado consistentemente: C.ISCONSTITUENT = 1 AND C.ISGROUP = 0 AND C.ISORGANIZATION = 0"
  - "Macro derivado conocido: IsDeceasedBit = (DECEASEDCONSTITUENT row exists); IsInactiveOrDeceased = IsDeceasedBit OR (CONSTITUENT.ISINACTIVE = 1)"

format: gherkin
scenarios:
  - title: "Aggregate parity and pre-fix delta against Aspen"
    tags:
      - aggregate-parity
      - regression-evidence
      - data-review
    given:
      - "safesql access to Aspen_db_1 is configured"
      - "the new logic in contact.sql derives IsDeceasedBit from DECEASEDCONSTITUENT row presence and Inactive__c from CONSTITUENT.ISINACTIVE"
    when:
      - "QA runs aggregate counts on individual constituents (ISCONSTITUENT = 1, ISGROUP = 0, ISORGANIZATION = 0)"
    then:
      - "deceased_new_logic equals 796"
      - "deceased_old_logic (DECEASEDDATE parseable per the OUTER APPLY DD parser) equals 374"
      - "the delta equals 422 deceased contacts recovered (53% of the deceased universe was being dropped pre-fix)"
      - "inactive_total equals 1001"
      - "inactive_or_deceased equals 1177"
      - "every deceased_new_logic row has a corresponding DECEASEDCONSTITUENT row in Altru"
      - "every Inactive__c = true row has CONSTITUENT.ISINACTIVE = 1 in Altru"

  - title: "Deceased contract via Mr. Alexander Hunter (Altru Lookup 112009)"
    tags:
      - regression-evidence
      - deceased
      - cascade
    given:
      - "Mr. Alexander Hunter has Altru Lookup ID 112009 with a DECEASEDCONSTITUENT row in Aspen"
      - "his Altru opt-out columns DONOTEMAIL, DONOTMAIL and DONOTPHONE are all 0"
    when:
      - "QA queries the contact.sql derived fields for that constituent"
    then:
      - "npsp__Deceased__c is true"
      - "Inactive__c is true (he is also marked inactive in Altru)"
      - "the three household exclusion fields (Name, Formal_Greeting, Informal_Greeting) are true"
      - "the three effective opt-outs (HasOptedOutOfEmail, Do_not_mail__c, DoNotCall) are true even though Altru had them at 0 (OR cascade forces them on)"
      - "npsp__Do_Not_Contact__c is true"

  - title: "Inactive-only contract via James Connolly (Altru Lookup 8-10014788)"
    tags:
      - regression-evidence
      - inactive
      - cascade
      - household-exclusion-deceased-exclusive
    given:
      - "James Connolly has Altru Lookup ID 8-10014788 with CONSTITUENT.ISINACTIVE = 1 and no DECEASEDCONSTITUENT row in Aspen"
      - "his Altru opt-out columns DONOTEMAIL, DONOTMAIL and DONOTPHONE are all 0"
    when:
      - "QA queries the contact.sql derived fields for that constituent"
    then:
      - "npsp__Deceased__c is false"
      - "Inactive__c is true"
      - "the three household exclusion fields are false (household exclusion is deceased-exclusive)"
      - "the three effective opt-outs are true (cascaded by inactive state via OR)"
      - "npsp__Do_Not_Contact__c is true"

  - title: "Active baseline: no false positives"
    tags:
      - negative
      - active-baseline
    given:
      - "a sample of active individual constituents in Aspen (no DECEASEDCONSTITUENT row, ISINACTIVE = 0)"
    when:
      - "QA queries the contact.sql derived fields for each sample row"
    then:
      - "npsp__Deceased__c is false on every sample row"
      - "Inactive__c is false on every sample row"
      - "the three household exclusion fields are false on every sample row"
      - "npsp__Do_Not_Contact__c is false on every sample row"
      - "HasOptedOutOfEmail, Do_not_mail__c, DoNotCall reflect the raw Altru opt-out values (no forced true)"
      - "count of active constituents equals total_individual_constituents minus inactive_or_deceased (11,262 - 1,177 = 10,085 expected)"


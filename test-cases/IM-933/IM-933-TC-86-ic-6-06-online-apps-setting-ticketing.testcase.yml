key: TC-86
title: IC 6.06 — Online Apps Setting CMDT / Ticketing (delivery auto, T3 customMetadata allRecords)
description: |
  Cobertura QA de IM-933 (6.06 Online Apps Setting CMDT (Ticketing) — deliver to
  Implementations, high-confidence). Junio delivery del Implementation Case
  `ic-6-06-online-apps-setting-metadata` (auto). Confianza alta por reporte IM-735
  (2026-06-12): built+verified CamiloDev, cross-tested COMPLETED Tucson.
  Delivered en PR #201 (managed-record fix) + PR #203 (all-records mode). v3
  seedeado a MigrationApp-dev.

  El case activa 2 flags en TODOS los records del CMDT `Auctifera__Online_Apps_Setting__mdt`
  usando el T3 `customMetadata` op en modo `allRecords` (no per-IC code):
  - `Auctifera__Save_Tickets_Contact__c` (Save Tickets Contact)
  - `Auctifera__Update_Tickets_Contact__c` (Update Tickets Contact)

  Verified en CamiloDevOrg: 3 records (`Auctifera.Default`, `Auctifera.MiOnlineApp`,
  `vnfp.Sandbox`) flipped false → true, incluyendo el cross-namespace `vnfp` record.

  Validar (functional):
  1) Activate — todos los records del CMDT quedan con ambos flags true,
  2) idempotent — records ya-configurados no se modifican,
  3) mixed state — off records se actualizan, on records unchanged, todos end con true,
  4) managed records updated in place (no unmanaged duplicate),
  5) works across owning namespaces (Auctifera + vnfp records),
  6) self-verifying — un record que no commit reporta failure (no falsely COMPLETED),
  7) release DoD.

  QA Sub-task asociada: IM-993
  Riesgos abiertos: reproducir el cross-namespace scenario requiere una org con
  al menos un vnfp-owned Online Apps Setting record.
type: functional
priority: high
status: active
preconditions:
- Implementation Case `ic-6-06-online-apps-setting-metadata` deployado en prod
- Org target con Auctifera package instalado
- Al menos 1 record de `Auctifera__Online_Apps_Setting__mdt` en la org (el `Default` managed record típicamente)
- Backend redeployed carrying el T3 `customMetadata` op en modo allRecords
- Permisos para escribir Custom Metadata Types
- Acceso al catálogo prod para seedear v3

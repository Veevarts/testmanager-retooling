schemaVersion: "1.0"

id: "ab3ea958-05c8-43d4-9c22-e4e9b8d5fd24"
key: "TC-14"
title: "Tessitura reusable template in Obvious.ai validates intake, transforms, and reuse"
description: |
  Cobertura QA de IM-723 (sub-tarea de IM-637) para validar que la plantilla
  reusable de Tessitura en Obvious.ai acepte inputs esperados, bloquee inputs
  incompletos, transforme correctamente en dry run, exponga campos no mapeados
  o ambiguos, genere evidencia de validacion y reconciliacion, falle de forma
  segura ante esquemas no soportados o columnas faltantes, y quede documentada
  para reuso futuro alineado con IM-584.

type: integration
priority: medium
status: active

preconditions:
  - "An approved representative or sanitized Tessitura source export is available"
  - "The Obvious.ai Tessitura template is created and accessible for configuration and execution"
  - "QA has access to review intake, mapping, transformation, and outputs configuration in Obvious.ai"
  - "The template runbook documents source-file expectations, mapping assumptions, rerun steps, known limitations, and the relationship to IM-584"

format: gherkin
scenarios:
  - title: "Load expected Tessitura inputs and block missing required inputs"
    tags:
      - happy-path
      - intake
    given:
      - "an approved representative or sanitized Tessitura source export"
      - "the Obvious.ai Tessitura template is configured"
    when:
      - "the operator loads the expected Tessitura input files"
    then:
      - "the template accepts the supported Tessitura inputs"
      - "any missing required input is identified before transformation starts"

  - title: "Transform mapped records and surface unmapped or ambiguous fields"
    tags:
      - happy-path
      - transformation
      - dry-run
    given:
      - "Tessitura source fields are mapped in the Obvious.ai template"
    when:
      - "the operator executes a dry-run transformation"
    then:
      - "mapped records are transformed according to the documented rules"
      - "unmapped fields are surfaced for operator review"
      - "invalid or ambiguous fields are surfaced for operator review"

  - title: "Produce validation and reconciliation evidence after a dry run"
    tags:
      - reconciliation
      - evidence
    given:
      - "a representative dry run completes successfully"
    when:
      - "the implementation team reviews the run outputs"
    then:
      - "validation evidence is available"
      - "reconciliation evidence is available"
      - "the output includes source counts, transformed counts, rejected records, and known gaps"

  - title: "Fail safely when schema version or required columns are unsupported"
    tags:
      - negative
      - schema-validation
      - safety
    given:
      - "a Tessitura source export has an unsupported schema version or missing required columns"
    when:
      - "the operator runs the template"
    then:
      - "the run fails safely or blocks promotion"
      - "the error output includes actionable notes for the operator"
      - "the template does not silently produce a partial migration artifact"

  - title: "Reusable documentation explains expectations, assumptions, and rerun process"
    tags:
      - documentation
      - reuse
    given:
      - "future migration operators need to reuse the Tessitura template"
    when:
      - "they review the template documentation"
    then:
      - "they can understand source-file expectations"
      - "they can understand mapping assumptions"
      - "they can understand rerun steps"
      - "they can understand known limitations"
      - "they can understand the relationship to IM-584"

tags:
  - im-723
  - im-637
  - tessitura
  - obvious-ai
  - template
  - migration
  - dry-run
  - reconciliation

estimatedDuration: 60


  - 'captura post-AC1: NPSP Settings > People > Contact Naming Settings (o equivalente) con name format + date format aplicados a los record types requeridos'
  - 'captura post-AC2: NPSP Settings > Households > Household Naming Settings con Household Name Format `{!{!FirstName}} {!LastName} Household`'
  - 'captura post-AC3: Setup > Object Manager > Opportunity > Fields & Relationships mostrando el field `Pledge__c` con type Checkbox, default Unchecked'
  - 'captura post-AC4: Setup > Profiles > <running profile> > Field-Level Security > Opportunity mostrando `Pledge__c` con Read + Edit granted'

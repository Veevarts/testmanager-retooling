key: TC-73
title: IC 3.17 — Remote Site Settings activate-only (delivery auto)
description: "Cobertura QA de IM-925 (3.17 Remote Site Settings Set up — deliver to\nImplementations, high-confidence). Junio delivery del Implementation\nCase `ic-3-17-remote-site-settings` v2 (auto).\
  \ Confianza alta por\nreporte IM-735 (2026-06-12): verificado en ambas orgs (auto).\n\nValidar que el IC:\n1) activa los 3 remote sites de Veevart (`Auctifera__Veevart_Email_Resources`,\n   `Auctifera__Veevart_Compress_App`,\
  \ `Auctifera__Veevart_Barcode_App`)\n   sin cambiar su URL ni demás settings,\n2) verifica cada paso por read-back (no false-green),\n3) es idempotente,\n4) marca un site faltante como NOT COMPLETED sin\
  \ crashear el run,\n5) documenta las verificaciones visuales y el Custom Label fallback como\n   pasos manuales NO automatizados.\n\nQA Sub-task asociada: IM-974\nRiesgos abiertos: AC7 (manual visual\
  \ check) requiere imprimir un Artwork\ny un POS Receipt para ver QR codes; AC8 (catalog seed dev → prod)\nrequiere coordinación con quien hace el seed.\n"
type: functional
priority: high
status: active
preconditions:
- Implementation Case `ic-3-17-remote-site-settings` v2 deployado en prod
- Org target con Auctifera managed package instalado (los 3 remote sites existen, owned por el package)
- Permisos para tocar `RemoteSiteSetting` (Active flag)
- Catálogo de dev disponible para validar seed antes del seed en prod
format: gherkin
scenarios:
- title: 3.17 Remote Site Settings Set up — The three Veevart remote sites end up Active and the case is COMPLETED
  tags:
  - happy-path
  - im-925
  - ac-1
  - automated
  given:
  - una customer org con Auctifera instalado
  when:
  - el IC 3.17 corre
  then:
  - '`Auctifera__Veevart_Email_Resources` queda Active'
  - '`Auctifera__Veevart_Compress_App` queda Active'
  - '`Auctifera__Veevart_Barcode_App` queda Active'
  - el status del case es COMPLETED
- title: 3.17 Remote Site Settings Set up — Activation only — the package-owned URL is never changed
  tags:
  - happy-path
  - im-925
  - ac-2
  - automated
  - no-side-effects
  given:
  - un remote site cuya URL fue seteada por el managed package
  when:
  - el case activa el site
  then:
  - sólo el flag `Active` cambia
  - la URL del site y los demás settings quedan exactamente como los shippeó el package
- title: 3.17 Remote Site Settings Set up — Inactive site is genuinely turned on
  tags:
  - happy-path
  - im-925
  - ac-3
  - automated
  given:
  - '`Auctifera__Veevart_Barcode_App` está actualmente inactivo'
  when:
  - el case corre
  then:
  - el site queda Active
  - su URL no cambia
- title: 3.17 Remote Site Settings Set up — Each step is verified by read-back (no false-green)
  tags:
  - regression
  - im-925
  - ac-4
  - verification
  given:
  - un step de remote-site del IC 3.17
  when:
  - el step termina su escritura
  then:
  - el sistema re-lee el site y confirma `Active = true` antes de marcar done
  - si no puede confirmar Active, el step reporta NOT DONE (no se reporta silenciosamente como SUCCESS)
- title: 3.17 Remote Site Settings Set up — Idempotent re-run with all three sites already Active
  tags:
  - regression
  - im-925
  - ac-5
  - idempotent
  given:
  - los 3 remote sites ya están Active
  when:
  - el case se ejecuta de nuevo
  then:
  - el case completa SUCCESS sin errores
  - los sites no cambian (la URL ni el Active flag se sobreescribe innecesariamente)
- title: 3.17 Remote Site Settings Set up — Missing remote site is flagged, not crashed
  tags:
  - negative
  - im-925
  - ac-6
  - error-handling
  given:
  - un site nombrado por el IC NO existe en la org
  when:
  - el case intenta activarlo
  then:
  - el step se reporta como NOT COMPLETED con un mensaje claro
  - el run NO erratea con stacktrace ni hard-fail inesperado
  - los otros sites del case siguen evaluándose
- title: 3.17 Remote Site Settings Set up — Manual verification and fallback are documented but not auto-run
  tags:
  - manual
  - im-925
  - ac-7
  - documentation
  given:
  - el case completó la activación de los 3 sites
  when:
  - el run llega al cierre
  then:
  - 'el case documenta cómo verificar visualmente: crear un Artwork e imprimir un documento (imágenes), Print Receipt en una POS Purchase (QR codes)'
  - el case documenta el Custom Label fallback (`Veevart_Compress_App_URL`, `Veevart_barcode_App_URL`) para usar SÓLO si el render falla
  - estos pasos manuales NO están automatizados (intencional)
- title: 3.17 Remote Site Settings Set up — Released via catalog seed (no feature flags)
  tags:
  - delivery
  - im-925
  - ac-8
  - catalog
  given:
  - el backend con la capability activate-only está deployado
  when:
  - el IC 3.17 v2 se seedea en dev catalog, validado, luego en prod catalog
  then:
  - Implementations puede seleccionar y correr el case en ambos ambientes
  - no se requiere feature flag para habilitarlo
- title: 3.17 Remote Site Settings Set up — Cross-org regression — verified on both reference orgs
  tags:
  - regression-evidence
  - im-925
  - cross-test
  given:
  - el confidence report IM-735 marca este IC como auto-verified en ambas orgs
  when:
  - QA re-ejecuta el IC en cada org de referencia
  then:
  - los 3 remote sites quedan Active en ambas orgs
  - no se observa cambio de URL en ninguna org
  - el case completa COMPLETED en ambas orgs
- title: 3.17 Remote Site Settings Set up — Evidencia UI — IC 3.17 ejecutado contra una org real (screenshots)
  tags:
  - functional-ui
  - screenshot-evidence
  - im-925
  - manual
  given:
  - el IC 3.17 v2 está seedeado en el catálogo del MigrationApp
  - el operador tiene acceso a una org con Auctifera instalado y permisos para RemoteSiteSetting
  when:
  - el operador entra al MigrationApp, abre el catálogo y lanza el IC 3.17 contra la org
  - el operador deja correr el case sin intervención (los 3 pasos son automáticos)
  - 'el operador completa la verificación visual manual: imprimir un Artwork con imagen y un POS Receipt con QR'
  then:
  - captura del catálogo MigrationApp mostrando `IMPL_CASE#ic-3-17-remote-site-settings` v2 disponible
  - captura pre-run de Setup > Security > Remote Site Settings mostrando los 3 sites con `Active` flag (estado inicial — al menos uno inactivo idealmente para validar AC3)
  - captura del run en progress con cada step verificando el read-back
  - captura post-run de Setup > Remote Site Settings mostrando los 3 sites Active con sus URLs intactas (AC1 + AC2)
  - captura del detalle de cada uno de los 3 sites (`Auctifera__Veevart_Email_Resources`, `Auctifera__Veevart_Compress_App`, `Auctifera__Veevart_Barcode_App`) mostrando URL package-owned sin cambios
  - captura del Artwork document print con imágenes renderizando correctamente (AC7 manual)
  - captura del POS Receipt print con QR code renderizando correctamente (AC7 manual)
  - captura final del run en COMPLETED

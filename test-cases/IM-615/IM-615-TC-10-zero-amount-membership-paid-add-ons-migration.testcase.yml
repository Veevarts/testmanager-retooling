schemaVersion: "1.0"
id: "ae51821d-5391-4640-b626-3ab006a82c64"
key: "TC-10"
title: "Zero-amount membership transactions preserve paid add-ons in Salesforce"
description: "Cobertura QA de IM-615 para validar que las transacciones de membership con total $0 sigan creando en Salesforce los add-ons con valor presentes en Altru, sin generar duplicados ni registros extra en transacciones no afectadas."
type: "integration"
priority: "high"
status: "active"
format: "gherkin"
preconditions:
  - "El usuario QA tiene acceso a los registros fuente en Altru y a sus representaciones migradas en Salesforce."
  - "Existen casos de prueba con transacciones de membership total $0 con uno o mas add-ons pagos y al menos un caso total $0 sin add-ons."
  - "El usuario QA puede ejecutar o solicitar la corrida del proceso de migracion o backfill para memberships afectados."
  - "El usuario QA puede verificar importes y registros hijos de add-ons en Salesforce sin depender solo del total de la transaccion."
scenarios:
  - title: "Create add-on records for a zero-amount membership transaction with paid add-ons"
    tags:
      - "happy-path"
      - "single-addon"
    given:
      - "existe una transaccion de membership en Altru con total igual a $0"
      - "la transaccion contiene al menos un add-on con valor monetario"
      - "el registro aun no tiene su add-on representado en Salesforce"
    when:
      - "se ejecuta el proceso de migracion o correccion para la transaccion afectada"
    then:
      - "Salesforce crea el registro relacionado del add-on faltante"
      - "el importe del add-on en Salesforce coincide con el importe del add-on en Altru"
      - "el desglose financiero de la transaccion en Salesforce coincide con la fuente"
  - title: "Create all paid add-ons when a zero-amount membership transaction has multiple add-ons"
    tags:
      - "happy-path"
      - "multiple-addons"
    given:
      - "existe una transaccion de membership en Altru con total igual a $0"
      - "la transaccion contiene multiples add-ons con valor monetario"
      - "Salesforce no tiene creados esos add-ons para la transaccion"
    when:
      - "se ejecuta el proceso de migracion o correccion para la transaccion afectada"
    then:
      - "Salesforce crea un registro por cada add-on con valor presente en Altru"
      - "cada add-on conserva su monto correcto"
      - "no se pierde ningun add-on por el hecho de que el total de membership sea $0"
  - title: "Do not create extra add-ons for a zero-amount membership transaction without add-ons"
    tags:
      - "negative"
      - "no-addons"
    given:
      - "existe una transaccion de membership en Altru con total igual a $0"
      - "la transaccion no contiene add-ons en la fuente"
    when:
      - "se ejecuta el proceso de migracion o correccion para la transaccion"
    then:
      - "Salesforce no crea registros adicionales de add-ons"
      - "la transaccion permanece sin add-ons asociados"
  - title: "Backfill previously migrated transactions without duplicating existing valid records"
    tags:
      - "backfill"
      - "deduplication"
    given:
      - "existe una transaccion afectada que ya fue migrada previamente a Salesforce"
      - "la transaccion tiene add-ons pagos en Altru que faltan en Salesforce"
      - "la transaccion puede incluir otros registros validos ya existentes en Salesforce"
    when:
      - "se ejecuta el proceso de backfill o correccion sobre la transaccion afectada"
    then:
      - "Salesforce crea solo los add-ons faltantes"
      - "los registros validos existentes no se duplican"
      - "la transaccion queda alineada con la fuente despues del reproceso"
  - title: "Reprocessing unaffected transactions does not introduce duplicate add-ons"
    tags:
      - "regression"
      - "unaffected-records"
    given:
      - "existe una transaccion de membership cuya representacion en Salesforce ya coincide con Altru"
      - "la transaccion puede tener total $0 o un total distinto de $0"
    when:
      - "se ejecuta nuevamente el proceso de migracion o correccion"
    then:
      - "Salesforce no crea add-ons duplicados"
      - "la representacion financiera existente se mantiene correcta"

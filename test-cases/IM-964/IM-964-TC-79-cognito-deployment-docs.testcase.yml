schemaVersion: '1.0'
id: cdfc2b21-ee9e-4333-ac3b-21e5d868fe96
key: TC-79
title: IM-964 — Cognito deployment documentation for survey-tool
description: |
  Cobertura QA de IM-964 (Document Cognito configuration for deployment). Sub-task
  QA: IM-985. Repositorio en scope: `survey-tool`.

  Esta es una historia de documentación: validar que el README / docs cubren
  Cognito domain, User Pool Id, App Client Id, secret handling, callback/logout
  URLs, cookie secret, session/cookie security settings, URL local de callback y
  el production deployment checklist.

  Validar:
  1) un dev nuevo puede configurar Cognito localmente sólo leyendo la doc,
  2) la doc lista TODOS los valores requeridos para production deploy,
  3) la doc NO commitea ni expone secretos reales (placeholders only),
  4) la doc enumera las flags de cookie (HttpOnly, Secure, SameSite),
  5) el local callback URL está documentado y es distinto del prod URL.

  Riesgos abiertos:
  - Es una historia low-risk; la validación es revisión documental + smoke test
    de seguir las instrucciones contra un User Pool de prueba.
  - Si IM-961 / IM-962 cambian variables de entorno, la doc debe quedar alineada.
type: functional
priority: medium
status: active
preconditions:
- Branch / merge de IM-964 con la documentación publicada en `survey-tool` (README, `docs/`, o equivalente)
- Acceso a la doc (Markdown / Confluence si aplica)
- (Opcional) Cognito User Pool de prueba para validar que las instrucciones funcionan end-to-end
- `git grep` para buscar secretos o credenciales en la rama
format: gherkin
scenarios:
- title: IM-964 — New developer can configure Cognito locally by following the documentation only
  tags:
  - happy-path
  - im-964
  - im-985
  - ac-1
  - documentation
  - local-setup
  given:
  - un dev nuevo con repo clonado y sin contexto previo de Cognito en survey-tool
  when:
  - el dev sigue paso a paso la sección de "Cognito setup" del README / docs
  then:
  - el dev consigue arrancar el server local con login funcional contra un User Pool de prueba
  - NO necesita leer el código del middleware ni de los routes auth para entender la configuración
  - la doc incluye Cognito domain, User Pool Id, App Client Id, secret handling, callback / logout URLs, cookie secret, y session/cookie security settings
- title: IM-964 — Production deployment checklist enumerates every Cognito value and callback URL
  tags:
  - happy-path
  - im-964
  - im-985
  - ac-2
  - documentation
  - production
  given:
  - el ops engineer revisa la doc para preparar un deploy a prod
  when:
  - el ops repasa el "production deployment checklist"
  then:
  - la checklist lista User Pool Id, App Client Id, App Client secret, Cognito domain, callback URL de prod, logout URL de prod, cookie secret, cookie flags requeridas (HttpOnly, Secure, SameSite)
  - la checklist diferencia explícitamente entre local / dev / prod callback URLs
  - la checklist menciona cómo rotar el cookie secret y el App Client secret si se filtran
- title: IM-964 — No real secrets are committed in the documentation
  tags:
  - negative
  - im-964
  - im-985
  - ac-3
  - security
  - secrets
  given:
  - la rama / merge de IM-964
  when:
  - QA corre `git grep` contra patrones de secrets (`COGNITO_CLIENT_SECRET=`, `COOKIE_SECRET=`, `User Pool Id` con valor real, JWTs, `-----BEGIN`, `AWS_SECRET_ACCESS_KEY=`)
  then:
  - sólo aparecen placeholders / ejemplos claramente marcados (e.g. `<your-app-client-secret>`, `change-me`)
  - NO hay un valor real de User Pool ni de cookie secret
  - NO hay credenciales productivas en imágenes ni en YAML de ejemplo
- title: IM-964 — Cookie security flags (HttpOnly, Secure, SameSite) are documented with the right values
  tags:
  - happy-path
  - im-964
  - im-985
  - ac-1
  - cookie-security
  - missing-doc
  given:
  - la sección de session / cookie security settings en la doc
  when:
  - QA revisa los flags documentados
  then:
  - aparecen `HttpOnly: true`, `Secure: true` (prod), `SameSite: Lax|Strict` con justificación
  - se documenta por qué `Secure` puede estar en `false` para local-only (http) y `true` para prod (https)
  - se aclara el `Domain` / `Path` recomendado
- title: IM-964 — Local development callback URL is documented and distinct from production
  tags:
  - happy-path
  - im-964
  - im-985
  - ac-1
  - local-vs-prod
  given:
  - la sección de Cognito callback URLs
  when:
  - QA revisa los ejemplos
  then:
  - el local URL ejemplo es `http://localhost:<port>/api/auth/callback` (o equivalente)
  - el prod URL ejemplo está en formato `https://<prod-domain>/api/auth/callback`
  - se nota que ambos deben quedar registrados en el App Client de Cognito antes del deploy

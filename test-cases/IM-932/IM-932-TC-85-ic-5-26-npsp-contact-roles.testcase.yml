  when:
  - el case corre
  then:
  - no aparecen org-specific Ids hardcoded
  - role names y value-set name son NPSP/Salesforce constants
  - hierarchy settings se escriben via `getOrgDefaults()`
  - picklist reconciled via dynamic metadata read-back
- title: 5.26 NPSP Contact Roles — Release (catalog seed in prod)
  tags:

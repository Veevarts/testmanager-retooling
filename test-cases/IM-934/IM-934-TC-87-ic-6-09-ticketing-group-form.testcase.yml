title: IC 6.09 — Ticketing / Group Form (delivery auto v5, single T3 recordTypes step)
description: |
  Cobertura QA de IM-934 (6.09 Ticketing / Group Form — deliver to Implementations,
  high-confidence). Junio delivery del Implementation Case
  `ic-6-09-ticketing-group-form` v5 (auto). Confianza alta por reporte IM-735
  (2026-06-12): built+verified CamiloDev, cross-tested COMPLETED Tucson.
  Delivered en BE PR #202 (catalog case v5 + deactivate-safety hardening del
  shared T3 recordTypes op).

  El manual "Knowledge-Article-driven group-form setup" fue removido → el case es
  ahora fully automated (single T3 `recordTypes` step). El case desactiva el
  managed record type "Group Invitation Form" en el Form Center object
  (`Auctifera__Document_Center__c`) preservando el label.

  Validar:
  1) el record type "Group Invitation Form" queda Inactive (label preservado),
     verificado por read-back,
  2) idempotent y safe on re-run (no crea unmanaged duplicate),
  3) honest outcome — si el subscriber no puede modificar el managed record type,
     step FAILED con Salesforce error (no falsely COMPLETED),
  4) org-agnóstico y repeatable.

  QA Sub-task asociada: IM-994
  Riesgos abiertos: AC3 branch subscriber-no-permission requiere reproducir con
  un running user sin permisos sobre managed record types.
type: functional
priority: high
status: active
preconditions:
- Implementation Case `ic-6-09-ticketing-group-form` v5 deployado en prod (BE PR #202)
- Org target con Auctifera package instalado (el managed record type "Group Invitation Form" existe en `Auctifera__Document_Center__c`)
- Backend redeployed carrying el hardened T3 `recordTypes` op
- Permisos para modificar managed record types (o handling adecuado del branch sin permiso)
- Acceso al catálogo prod para seedear v5

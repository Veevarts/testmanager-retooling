schemaVersion: "1.0"

id: "ef637892-9e5e-492d-b1ad-76fae9eee1bb"
key: "TC-18"
title: "Veevart Insights — UAT end-to-end (Chrome extension + Hosted MCP)"
description: |
  Cobertura UAT del demo Veevart Insights bajo la historia padre IM-641
  (Configure Salesforce Hosted MCP with Veevart context for ChatGPT/Claude)
  y la historia relacionada IM-697 (Build Veevart Insights Chrome Extension
  Demo). Sub-task QA asociada: IM-732. Fuente normativa: Notion
  "Veevart Insights - Product, Setup & QA Testing Guide" (May 15, 2026).

  Enfoque: pruebas de aceptacion de usuario final. Cada escenario describe
  el comportamiento esperado de la extension desde la optica del usuario
  autorizado (admin/staff de la institucion), no la configuracion tecnica.
  El setup tecnico del paquete VeevartMCPContext, External Client Apps,
  JWT/Named Credential, Hosted MCP server, certificados y permission sets
  queda en las precondiciones y se asume validado.

  Alcance UAT cubierto:
  - Conexion Salesforce OAuth + PKCE desde el side panel (experiencia, no setup)
  - Identidad del agente como experto Veevart
  - Descubrimiento de capacidades y topics de contexto
  - Preguntas analiticas acotadas sin generar reporte
  - Planificacion y creacion de reportes guardados por lenguaje natural
  - Mapa Basquiat / geografia de visitantes por ZIP
  - Modo guiado opt-in
  - Cancelacion, recall de prompts, multiples chats, draft
  - Reconexion tras token expirado y resiliencia del side panel
  - Manejo de fallos sin claims falsos ni links inventados
  - Garantias de seguridad visibles al usuario

  Fuera de alcance UAT (a proposito): negativos puramente de configuracion
  tecnica (Wrong JWT aud, Named Credential namespace allowlist, Wrong
  Hosted MCP URL sandbox vs prod, Package API app not pre-authorized,
  Missing managed permission set, External Credential principal not
  assigned, Wrong connector External Client App client ID). Pertenecen a
  la guia de setup de implementadores.

  Riesgos abiertos al momento de la reescritura (2026-05-21):
  - Bloqueante de paquete: la version 0.20.0.1 de VeevartMCPContext solo
    expone Get Veevart MCP Context como @InvocableMethod. Sin
    VeevartMCPAnalyticsTool, VeevartMCPSOQLTool, VeevartMCPCreateReportTool,
    VeevartMCPReportRecipesTool, VeevartMCPReportTypesTool y los de
    contexto secundarios anotados, los Escenarios 3 al 13 quedan
    parcialmente o totalmente bloqueados.
  - Gaps de documentacion confirmados en la guia Notion: aud del JWT
    Bearer es https://test.salesforce.com (sandbox) o
    https://login.salesforce.com (prod), NO el My Domain; el campo Scope
    del External Credential debe ir vacio en JWT Bearer; openid != id en
    la UI de OAuth scopes; el Hosted MCP custom server no se provisiona
    via paquete y debe crearse manualmente por org; el unpacked load en
    Chrome puede cambiar el extension ID y rompe el callback URL del ECA,
    preferir Chrome Web Store unlisted beta.
  - Setup org subscriber requerido (precondicion, no escenario):
    Certificate VeevartMCPJWT, External Client App Veevart MCP API con
    Authorization Code + PKCE y JWT Bearer Flow, External Credential
    VeevartMCPExternalCredential con JWT Bearer, Named Principal
    VeevartMCPIntegrationPrincipal, Named Credential VeevartMCPAPI con
    namespace allowlist veevart, Permission Set unmanaged
    Veevart_MCP_API_Callout_Access (deploy SFDX), Hosted MCP server
    custom name VeevartMCP.

type: integration
priority: high
status: active

preconditions:
  - "El paquete VeevartMCPContext esta instalado en la org objetivo con todos los tools relevantes expuestos como @InvocableMethod"
  - "Permission sets 'Veevart MCP Context User' (managed) y 'Veevart_MCP_API_Callout_Access' (unmanaged) asignados al tester user"
  - "Hosted MCP custom server 'VeevartMCP' activo y con los Apex tools del paquete agregados, configurado para el tipo de org (prod/sandbox)"
  - "Named Credential 'VeevartMCPAPI' operativo end-to-end (callout read-only 'GET callout:VeevartMCPAPI/services/data/v65.0/limits' retorna HTTP 200)"
  - "External Client App connector configurado con callback URL alineada al extension ID cargado en Chrome"
  - "Chrome extension Veevart Insights Agent cargado (Chrome Web Store unlisted beta recomendado o unpacked desde dist/) con un extension ID estable"
  - "Settings de la extension configurados: Connection con Consumer Key del ECA connector, Salesforce Login URL correcta segun prod/sandbox, scopes 'mcp_api api refresh_token openid', MCP Server URL apuntando al server correcto, MCP Context Tool Name resuelto, BYO AI provider key (Anthropic u OpenAI) cargada"
  - "Default report save folder seleccionado en Settings > General"
  - "Multiple chats habilitado si se va a probar Escenario 15; deshabilitado en otro caso"
  - "Service worker activo y IndexedDB disponible para chat history local"
  - "Datos realistas en la org para los escenarios analiticos y de reporte: membership data, donantes, opportunities, eventos con asistentes y postal code"
  - "El tester user tiene permiso de crear reportes y acceso a la carpeta default seleccionada; tambien tiene FLS de los objetos y report types involucrados"

format: gherkin
scenarios:
  - title: "Conectar Salesforce y dejar el agente listo desde el side panel"
    tags:
      - uat
      - ac-1
      - happy-path
      - conexion
    given:
      - "el usuario abre el side panel de Veevart Insights por primera vez"
    when:
      - "el usuario observa el estado inicial del panel"
      - "el usuario abre Settings"
      - "el usuario inicia sesion con su cuenta de Salesforce desde el boton de conectar"
    then:
      - "el panel muestra el estado 'desconectado' y un boton para conectar Salesforce"
      - "la pestania Settings se abre en General como pestania por defecto"
      - "la conexion cambia a 'conectado' y se muestra la org / instance URL"
      - "el agente queda listo para recibir prompts"
      - "el usuario no tuvo que reinstalar la extension ni copiar tokens manualmente"

  - title: "El agente se presenta como experto de dominio Veevart"
    tags:
      - uat
      - ac-1
      - identidad
    given:
      - "la extension esta conectada a Salesforce"
      - "una BYO AI provider key esta configurada"
    when:
      - "el usuario envia 'What can you do?'"
    then:
      - "la respuesta se presenta como Veevart Insights"
      - "menciona explicitamente dominios Veevart como memberships, fundraising, ticketing, exhibitions o visitor attendance"
      - "no responde como un chatbot generico de Salesforce"

  - title: "Descubrir las capacidades Veevart instaladas en la org"
    tags:
      - uat
      - ac-1
      - descubrimiento
      - capacidades
    given:
      - "la extension esta conectada a una org con paquetes Veevart instalados"
    when:
      - "el usuario envia 'What Veevart capabilities are available in this org?'"
    then:
      - "la respuesta lista las areas Veevart presentes (por ejemplo memberships, ticketing, fundraising, NPSP) basadas en el contexto cargado por el agente"
      - "no inventa capacidades de paquetes que no estan instalados"
      - "si una capacidad espera datos y no los hay, lo aclara en la respuesta"

  - title: "Listar los topics de contexto que el agente puede usar"
    tags:
      - uat
      - ac-1
      - descubrimiento
      - contexto
    given:
      - "la extension esta conectada"
    when:
      - "el usuario envia 'List the Veevart context topics you can use.'"
    then:
      - "la respuesta enumera los topics Veevart disponibles para esta org"
      - "el usuario puede usar esos topics como guia para sus siguientes preguntas"

  - title: "Pregunta analitica sobre donantes a reactivar sin crear reporte"
    tags:
      - uat
      - ac-1
      - analitica
      - sin-reporte
    given:
      - "la extension esta conectada"
      - "el usuario no pidio guardar un reporte"
    when:
      - "el usuario envia 'Who are the top 5 people I should try to reactivate as potential donors?'"
    then:
      - "la respuesta es un resumen analitico con los 5 candidatos y la razon"
      - "no se crea ningun reporte de Salesforce"
      - "si no hay resultados, el agente lo explica como 'no matching records for the filters used' en lugar de un error de conexion"
      - "se incluyen caveats cuando el analisis no cabe en los limites de Salesforce"

  - title: "Tendencia mensual de revenue de membresias"
    tags:
      - uat
      - ac-1
      - analitica
      - tendencia
    given:
      - "la extension esta conectada"
    when:
      - "el usuario envia 'Which months had the strongest membership revenue trend?'"
    then:
      - "la respuesta indica los meses con mayor revenue y el periodo comparado"
      - "se basa en datos reales de la org (no inventa cifras)"
      - "no se crea ningun reporte como efecto colateral"

  - title: "Explicacion del modelado de membresias y donaciones en la org"
    tags:
      - uat
      - ac-1
      - analitica
      - modelado
    given:
      - "la extension esta conectada"
    when:
      - "el usuario envia 'Explain how Veevart models memberships and donations in this org.'"
    then:
      - "la respuesta describe los objetos, record types y relaciones relevantes presentes en la org"
      - "menciona si la org usa NPSP, Veevart Fundraising u otro modelo"
      - "no asume un modelo que la org no tiene"

  - title: "Planificar un reporte antes de crearlo"
    tags:
      - uat
      - ac-1
      - report-planning
    given:
      - "la extension esta conectada"
    when:
      - "el usuario envia 'Plan a report for membership revenue by month over the last two years.'"
    then:
      - "el agente describe el recipe propuesto: report type, agrupaciones, metricas y filtros"
      - "valida la disponibilidad de report types y campos antes de hablar de crearlo"
      - "NO crea el reporte hasta que el usuario lo pida explicitamente"

  - title: "Crear el reporte principal de membership revenue by month (ultimos 2 anios)"
    tags:
      - uat
      - ac-1
      - happy-path
      - saved-report
      - regression-primary
    given:
      - "la extension esta conectada"
      - "el usuario selecciono una carpeta default en Settings > General"
      - "el tester user tiene permiso de crear reportes en esa carpeta"
    when:
      - "el usuario envia 'Give me a report showing membership revenue by month over the last two years.'"
    then:
      - "el agente identifica intent de crear reporte y planifica con report recipes"
      - "el reporte se crea exitosamente"
      - "la respuesta final incluye un link clickeable al reporte en Salesforce"
      - "el reporte se abre automaticamente en una pestania de Salesforce"
      - "el reporte queda guardado en la carpeta default seleccionada"
      - "el reporte esta agrupado por close month y suma revenue amount"
      - "si se pidio un chart, la respuesta indica si el chart quedo persistido o lanza el warning correspondiente"

  - title: "Crear otros reportes guardados por lenguaje natural"
    tags:
      - uat
      - ac-1
      - saved-report
    given:
      - "la extension esta conectada y la autorizacion de creacion de reportes esta lista"
    when:
      - "el usuario envia 'Create a report of won opportunities from the last 90 days grouped by close month.'"
      - "el usuario envia 'Create a donor reactivation prospects report showing lapsed donors with lifetime giving of 1000 or more.'"
      - "el usuario envia 'Show all members by 5-digit zip code as a report.'"
    then:
      - "cada prompt crea el reporte solicitado"
      - "la respuesta final incluye el link al reporte"
      - "el reporte abre automaticamente en Salesforce"
      - "ningun registro de negocio (Opportunities, Contacts, Accounts, Memberships) se crea, edita o borra como efecto colateral"

  - title: "Reparar o agregar el chart de un reporte existente"
    tags:
      - uat
      - ac-1
      - chart-repair
    given:
      - "la extension esta conectada"
      - "el usuario tiene el ID de un reporte existente"
    when:
      - "el usuario envia 'Add or repair the chart on this existing report: <report id>'"
    then:
      - "el agente intenta persistir el chart en el reporte indicado"
      - "la respuesta describe si el chart quedo persistido o por que no se pudo"
      - "no se pierde la configuracion previa del reporte"

  - title: "Mapa de asistentes Basquiat por ZIP code (ticketing/exhibition)"
    tags:
      - uat
      - ac-1
      - ticketing
      - exhibitions
      - geografia
    given:
      - "la extension esta conectada a una org con paquete de ticketing/exhibitions y data de asistentes"
    when:
      - "el usuario envia 'Using the Veevart MCP, give me a map showing all attendees of the Basquiat event by the contact zip code.'"
    then:
      - "el agente interpreta el prompt con semantica Veevart de ticketing/exhibitions, no con Salesforce Event ni Campaign"
      - "devuelve un mapa o un resumen por ZIP cuando el mapa literal no es posible"
      - "si falta data o paquete, el agente explica el blocker exacto en lugar de inventar resultados"

  - title: "Modo guiado opt-in para acciones que el agente no puede hacer solo"
    tags:
      - uat
      - ac-1
      - modo-guiado
      - safety
    given:
      - "existe un reporte recien creado"
      - "la extension esta conectada"
    when:
      - "el usuario envia 'Change the report column color to red.'"
      - "MCP no puede modificar el chart style del reporte"
      - "el usuario confirma entrar a modo guiado"
    then:
      - "el agente avisa que esa accion no se puede hacer automaticamente y ofrece pasos guiados manualmente"
      - "espera la confirmacion explicita del usuario antes de entrar a modo guiado"
      - "el side panel muestra un paso a la vez con los controles Done, Couldn't do it y Cancel"
      - "el agente no entra a modo guiado sin antes intentar la ruta segura por MCP"

  - title: "Cancelar una respuesta en curso y reintentar"
    tags:
      - uat
      - ac-1
      - ux
      - cancel
    given:
      - "el usuario envio un prompt y el agente esta procesando"
    when:
      - "el usuario cancela la respuesta en curso"
    then:
      - "el indicador de loading desaparece de inmediato"
      - "el chat queda en estado listo para un nuevo prompt"
      - "el usuario puede reenviar el mismo prompt o uno nuevo sin recargar la extension"

  - title: "Historial de prompts y multiples conversaciones aisladas"
    tags:
      - uat
      - ac-1
      - ux
      - composer
      - multi-chat
    given:
      - "el usuario envio varios prompts en el chat activo"
      - "multiple chats esta habilitado en Settings"
    when:
      - "el usuario presiona Arrow Up al inicio del composer"
      - "el usuario presiona Arrow Down para regresar"
      - "el usuario crea un segundo chat y regresa al primero"
      - "el usuario escribe en el composer estando desconectado y luego reconecta"
    then:
      - "Arrow Up trae los prompts anteriores del chat activo del mas reciente al mas antiguo"
      - "Arrow Down regresa hacia el draft actual"
      - "cada chat conserva su propio historial sin mezclarse"
      - "el draft escrito estando desconectado se conserva al reconectar"

  - title: "Reconexion tras token de Salesforce expirado sin perder el contexto"
    tags:
      - uat
      - ac-1
      - resiliencia
      - reconexion
    given:
      - "la extension estaba conectada y el usuario esta en medio de una conversacion"
    when:
      - "el token de OAuth expira"
      - "el usuario reconecta"
    then:
      - "la extension muestra estado 'expired' o equivalente y ofrece reconectar"
      - "el usuario puede continuar la conversacion sin reinstalar la extension"
      - "el chat previo sigue visible en el historial"

  - title: "Cerrar y reabrir el side panel sin perder estado"
    tags:
      - uat
      - ac-1
      - resiliencia
      - service-worker
    given:
      - "una llamada MCP o creacion de reporte esta en curso"
    when:
      - "el usuario cierra el side panel y lo vuelve a abrir"
    then:
      - "el chat activo se preserva"
      - "el estado de conexion se mantiene"
      - "ninguna respuesta tardia pisa el chat actual con contenido obsoleto"

  - title: "El agente no inventa exitos cuando algo falla"
    tags:
      - uat
      - ac-2
      - manejo-error
      - safety
    given:
      - "el usuario pide crear un reporte"
      - "la creacion falla por permisos, credenciales o configuracion"
    when:
      - "el agente recibe el error y responde al usuario"
    then:
      - "el agente NO dice 'Report Created Successfully'"
      - "NO devuelve un link inventado"
      - "el mensaje final explica el blocker en terminos accionables (por ejemplo falta permiso, falta acceso a la carpeta, falta el report type)"
      - "el usuario puede reintentar tras resolver el blocker"

  - title: "El agente respeta los limites de la solucion y la privacidad"
    tags:
      - uat
      - ac-2
      - safety
      - privacidad
      - tool-surface
    given:
      - "la extension esta en uso"
    when:
      - "el usuario interactua con cualquiera de los prompts cubiertos por este test case"
    then:
      - "el agente nunca crea, edita o borra registros de negocio (Opportunities, Contacts, Accounts, Memberships)"
      - "solo crea reportes cuando el usuario lo pide explicitamente"
      - "nunca muestra access tokens, OAuth codes, claves privadas ni PII de donantes en el chat ni en logs visibles al usuario"
      - "no expone respuestas de SOQL/REST/dashboard/user lookup directas que no pasen por las tools empaquetadas de Veevart"

  - title: "Flujo completo end-to-end visible al usuario"
    tags:
      - uat
      - ac-1
      - end-to-end
      - release-readiness
    given:
      - "la extension esta conectada y configurada"
    when:
      - "el usuario hace una pregunta de identidad y obtiene una respuesta Veevart"
      - "el usuario consulta capacidades disponibles en la org"
      - "el usuario hace una pregunta analitica sin generar reporte"
      - "el usuario planifica un reporte"
      - "el usuario crea el reporte de membership revenue by month ultimos 2 anios"
      - "el usuario abre el reporte desde el link del chat"
      - "el usuario cancela una respuesta y la reenvia"
      - "el usuario usa Arrow Up/Down para reusar prompts previos"
    then:
      - "el flujo completo se ejecuta sin reinstalacion"
      - "todo reporte exitoso queda en la carpeta default y aparece como link en el chat"
      - "ningun paso requirio que el usuario abriera Salesforce Setup ni copiara credenciales"


type: integration
priority: medium
status: active

preconditions:
  - "Repo MigrationToolETL con worktree `/Users/joseangarita/Developer/MigrationToolETL-IM-952` y branch `story/membresia-con-add-on-validar-migracion-de-IM-952`"
  - "safesql configurado para los profiles: `aspen`, `everson`, `high-desert`, `illinois`, `kidstream`, `moad`, `tucson` (+ opcional `muhammed2`)"
  - "Node + npm instalado para `npm test`, `npm run build`, `npm run lint:check`"
  - "Acceso opcional a Everson sandbox para validar `rev-10142916` post-load en Lightning"

format: gherkin
scenarios:
  - title: "Membership add-on without SALESORDERITEM is captured via the revenue-line fallback"
    tags:
      - happy-path
      - im-952
      - ac-1
      - fallback
      - revenue-split
    given:
      - "a membership transaction has a Membership revenue split and a Membership add-on revenue split"
      - "the Membership add-on has no linked `SALESORDERITEM`"
    when:
      - "the export calculates add-on totals"
    then:
      - "it uses the `MEMBERSHIPADDON.REVENUESPLITID` revenue line fallback"
      - "the parent Opportunity amount includes the add-on amount"

  - title: "Everson rev-10142916 exports with full $80 amount and $30 add-on total"
    tags:
      - regression-evidence
      - im-952
      - ac-1
      - everson
      - example
    given:
      - "Everson Revenue ID `rev-10142916` has a $50 Membership line and a $30 Membership add-on line"
    when:
      - "the membership Opportunity export is generated"
    then:
      - "the parent Opportunity `Amount` is $80"
      - "`Add_On_Total__c` is $30"
      - "`Add_On_Quantity__c` is 1"

  - title: "Sales-order add-on total wins when both sources exist"
    tags:
      - happy-path
      - im-952
      - ac-3
      - precedence
      - coalesce
    given:
      - "a membership has both sales-order add-on totals and revenue-line fallback totals"
    when:
      - "the export calculates the Opportunity amount"
    then:
      - "it uses the sales-order add-on total"
      - "it does NOT add both sources together"
      - "no double counting occurs in `Add_On_Total__c`"

  - title: "Membership Opportunity amount aligns with membership fund assignment total"
    tags:
      - regression
      - im-952
      - ac-4
      - parity
      - fund-assignment
    given:
      - "membership fund assignments are exported for the same payment as the Opportunity"
    when:
      - "totals are compared"
    then:
      - "the membership Opportunity `Amount` equals the sum of membership fund assignment amounts"
      - "no orphan add-on amounts are unallocated"

  - title: "Memberships without any add-on data remain unchanged"
    tags:
      - negative
      - im-952
      - no-regression
    given:
      - "a membership has neither a sales-order add-on item nor a `MEMBERSHIPADDON` revenue line"
    when:
      - "the export runs with the IM-952 fallback applied"
    then:
      - "the Opportunity `Amount` equals only the Membership line amount"
      - "`Add_On_Total__c` is 0 (or NULL per existing convention)"
      - "`Add_On_Quantity__c` is 0"

  - title: "Cross-profile aggregate smoke confirms expected counts"
    tags:
      - regression
      - im-952
      - cross-profile
      - smoke
    given:
      - "the safesql aggregate smoke `SHA 1be4cae26811` runs on each reachable profile"
    when:
      - "the export is generated"
    then:
      - "`aspen`, `everson`, `high-desert`, `illinois`, `kidstream`, `moad`, `tucson` all pass smoke"
      - "no profile shows duplicated Opportunities for the same membership transaction"
      - "no profile shows a regression in fund-assignment-to-Opportunity parity"

  - title: "muhammed2 profile validated after tunnel restoration"
    tags:
      - edge-case
      - im-952
      - missing-doc
      - muhammed2
    given:
      - "the `muhammed2` safesql profile was blocked at engineering time by tunnel connection failure"
    when:
      - "QA re-runs the smoke on `muhammed2`"
    then:
      - "the add-on totals and Opportunity amounts are captured"
      - "any unexpected divergence from the other profiles is flagged"

  - title: "Add-on join does not multiply rows (grain stability)"
    tags:
      - regression
      - im-952
      - grain
    given:
      - "the membership Opportunity export runs with the new fallback"
    when:
      - "the row count is compared to distinct `MEMBERSHIPTRANSACTIONID` count"
    then:
      - "row count equals distinct membership transaction count"
      - "the JOIN on `MEMBERSHIPADDON.MEMBERSHIPTRANSACTIONID` does not multiply parents"


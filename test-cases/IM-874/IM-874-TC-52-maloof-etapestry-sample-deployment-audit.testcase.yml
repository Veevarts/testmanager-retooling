schemaVersion: "1.0"

id: "2eb71277-5302-40d2-b75c-6910ccca7023"
key: "TC-52"
title: "Maloof eTapestry sample deployment audit — identificación de scope, conteos source/staged/target, exclusión Ticketing, backfill country"
description: |
  Cobertura QA de IM-874 "Etapstry + Maloof sample migration deployment".

  IM-874 documenta una ejecución real de migración: 100-contact anchored
  sample desde Blackbaud eTapestry export
  (`BLACKBAUD-3073930D28.zip`) hacia `MaloofDataDevSandbox`
  (`00DWe000005cAptMAE`). Scope cargado: non-ticketing downstream. Ticketing
  explícitamente excluido hasta que el mapping de object/product se apruebe.

  Cross-link con IM-788: la skill `veevart-data-migration-skill` codifica la
  metodología; este deployment de Maloof es uno de los casos empíricos que
  alimentaron las lecciones de `references/obvious-ai-lessons.md`. eTapestry
  no es un provider de primera clase en la skill — va por el track
  "new-provider" (`sources/new-provider.md` +
  `references/new-provider-deployment-controls.md`). El naming pattern
  `maloof_etap_campaign_553.0.52316203` aparece en
  `references/workspace-dashboard-control-plane.md` como contraejemplo
  de external ID largo. Ver [[IM-788-TC-51-veevart-data-migration-skill]]
  para la cobertura del skill mismo.

  Tickets relacionados:
  - IM-874 padre (Historia, In QA Review, Medium, Maloof Foundation)
  - IM-788 (skill que abstrae esta metodología; QA companion = TC-51)
  - IM-889 — QA Sub-task consolidada IM-788 + IM-874

  Fuente: descripción del ticket IM-874 + artefactos en
  `/Users/joseangarita/Developer/migrations/maloof/`.

  Cobertura por AC:
  - AC1 → Scenario 1 (ticket identifica target org, source, deployment mode, scope excluido)
  - AC2 → Scenario 2 (conteos source/staged/target verificables vs final-sample-acceptance-report.md y final-sample-readonly-qa-*.json)
  - AC3 → Scenario 3 (Ticketing documentado como bloqueado hasta aprobación de mapping)
  - AC4 → Scenario 4 (backfill audit prueba 100 Accounts + 100 Contacts con United States, 0 raw country refs)

  Limitaciones (NO levantar como bug):
  - Los artefactos viven en la máquina local de Jose Angarita
    (`/Users/joseangarita/Developer/migrations/maloof/`). QA necesita
    acceso (zip a shared location, screen-share, o pull a un bucket).
  - El dashboard `http://127.0.0.1:8765/` solo está disponible en la
    máquina de Jose mientras corra el server local.
  - La validación es read-only sobre artefactos ya generados; no se
    re-ejecuta el deployment ni se modifica `MaloofDataDevSandbox`.

  Out of scope para este TC:
  - Re-ejecutar la migración o validar individualmente los 170
    `Auctifera__Charge__c` / `npe01__OppPayment__c` / etc. en la org.
    El TC audita los REPORTES que afirman los conteos, no la integridad
    fila-por-fila en la org.
  - Validación del Ticketing scope (excluido por diseño hasta aprobación
    de mapping; ver Scenario 3).

type: integration
priority: medium
status: active

preconditions:
  - "Acceso al directorio `/Users/joseangarita/Developer/migrations/maloof/` (vía zip compartido, screen-share, o pull a un shared bucket)"
  - "Acceso de lectura a la org `MaloofDataDevSandbox` (`00DWe000005cAptMAE`) con `sf` o `sfdx` para validación spot-check si se requiere"
  - "El dashboard local `http://127.0.0.1:8765/` corriendo desde la máquina de Jose, O acceso al snapshot estático `dashboard/validation-checklist.json`"
  - "Conocimiento del scope del ticket: 100-contact sample, non-ticketing only, Veevart como único write target, trigger bypass con `Auctifera__Disable_Trigger__c = true` donde aplica"
  - "Familiaridad con el conteo del deployment: 31 Campaign / 20 Specific Fund / 100 Account / 100 Contact / 170 Opportunity / 170 npe01__OppPayment__c / 170 Auctifera__Charge__c / 170 Auctifera__Fund_Donation_Assignment__c / 11 Auctifera__Membership_Programs__c / 72 Membership Opportunity backfill / 100 Account BillingCountry + 100 Contact MailingCountry backfilled a United States"

format: gherkin
scenarios:
  - title: "El ticket identifica target org, source system, deployment mode y scope excluido sin ambigüedad"
    tags:
      - happy-path
      - ac-1
      - ticket-scope
      - maloof
    given:
      - "el ticket IM-874 con su description actual"
    when:
      - "un miembro del equipo (QA, lead, CSM) abre IM-874 por primera vez"
    then:
      - "puede identificar Customer = Maloof Foundation"
      - "puede identificar Target org = `MaloofDataDevSandbox / 00DWe000005cAptMAE`"
      - "puede identificar Source = Blackbaud eTapestry export `BLACKBAUD-3073930D28.zip`"
      - "puede identificar Deployment mode = 100-contact anchored sample"
      - "puede identificar el scope cargado = non-ticketing downstream sample"
      - "puede identificar el scope excluido = Ticketing transactions (bloqueado hasta aprobación de mapping)"
      - "puede identificar Veevart como único write target y el uso de `Auctifera__Disable_Trigger__c = true` donde aplica"

  - title: "Los conteos source/staged/target se pueden verificar contra los artefactos referenciados"
    tags:
      - happy-path
      - ac-2
      - count-verification
      - reports
    given:
      - "acceso a `reports/final-sample-acceptance-report.md` y `reports/final-sample-readonly-qa-20260604T2135Z.json`"
      - "acceso a `reports/membership-backfill-upload-summary.md` y `reports/membership-backfill-post-upload-audit.json`"
    when:
      - "QA cruza los conteos del DEPLOYMENT SUMMARY del ticket contra el contenido de los artefactos"
    then:
      - "los 31 Campaign uploaded coinciden con la cifra en el final acceptance report"
      - "los 20 Specific Fund coinciden con el report"
      - "los 100 Account y 100 Contact coinciden y representan el anchored sample"
      - "los 170 Opportunity, 170 `npe01__OppPayment__c`, 170 `Auctifera__Charge__c` y 170 `Auctifera__Fund_Donation_Assignment__c` coinciden y reflejan la relación 1:1:1:1 esperada por el modelo de fundraising"
      - "los 11 `Auctifera__Membership_Programs__c` coinciden y el membership-backfill-upload-summary documenta los 72 Membership Opportunity actualizados"
      - "el JSON `final-sample-readonly-qa-*.json` reporta los mismos totales por objeto"

  - title: "Ticketing está claramente documentado como bloqueado hasta aprobación de mapping"
    tags:
      - happy-path
      - ac-3
      - excluded-scope
      - ticketing
    given:
      - "el ticket IM-874 y el final acceptance report"
    when:
      - "QA busca evidencia del scope de Ticketing"
    then:
      - "el ticket dice explícitamente \"Ticketing transactions explicitly excluded until object/product mapping is approved\""
      - "no hay rows de `Auctifera__Inventory_Service__c`, `Auctifera__Museum_Offer__c`, ni `Auctifera__Group_Reservation__c` cargados (deployment summary los omite)"
      - "el final acceptance report y/o el validation-checklist enumera Ticketing como blocker pendiente (no como bug)"
      - "queda claro al QA, al lead, y al CSM que se necesita aprobación de mapping antes de reabrir Ticketing scope"

  - title: "Backfill de country: 100 Accounts + 100 Contacts ahora reportan United States con 0 raw refs eTapestry"
    tags:
      - happy-path
      - ac-4
      - country-backfill
      - data-quality
    given:
      - "acceso a `reports/country-reference-backfill-post-upload-audit.json`"
    when:
      - "QA inspecciona el audit del backfill de country"
    then:
      - "el audit confirma 100 Account.BillingCountry actualizados a `United States`"
      - "el audit confirma 100 Contact.MailingCountry actualizados a `United States`"
      - "el audit reporta 0 occurrencias de raw refs eTapestry (`CountryRef 1178.0.3073` o similares) en ambos campos"
      - "el dashboard `validation-checklist.json` marca el item de country reference correction como PASS"
      - "(opcional) un spot-check SOQL sobre `MaloofDataDevSandbox` confirma `SELECT COUNT() FROM Account WHERE BillingCountry = 'United States' = 100` y `SELECT COUNT() FROM Contact WHERE MailingCountry = 'United States' = 100`"


schemaVersion: "1.0"

id: "2eb71277-5302-40d2-b75c-6910ccca7023"
key: "TC-52"
title: "eTapestry → Veevart sample deployment audit — Illinois Holocaust Museum (SAMFAC) · 10 waves · 690 records · 0 fallos"
description: |
  Cobertura QA de IM-874 ejecutada empíricamente contra el sandbox de
  trainings de Illinois Holocaust Museum (`illinois-trainings`), usando
  eTapestry export del cliente SAMFAC como source. Esta es la segunda
  ejecución empírica que alimenta la skill `veevart-data-migration-skill`
  (la primera fue Maloof, ver `references/obvious-ai-lessons.md`).

  El deployment audita la metodología end-to-end del control plane de la
  skill — intake, preflight, mapping, staging wave-based, ejecución con
  correcciones en vivo y reconciliación. eTapestry no es provider de
  primera clase en la skill — va por el track "new-provider"
  (`sources/new-provider.md` + `references/new-provider-deployment-controls.md`).

  Cross-link con IM-788: TC-51 v6 validó la skill comparativa contra
  Obvious.ai (Tessitura → Tucson). Este TC-52 valida la skill
  empíricamente contra un provider distinto (eTapestry → Illinois)
  para confirmar que el control plane es provider-agnostic.

  Tickets relacionados:
  - IM-874 padre (Historia, In QA Review, Medium)
  - IM-788 (skill que abstrae esta metodología; QA companion = TC-51)
  - IM-889 — QA Sub-task consolidada IM-788 + IM-874

  Fuente del deployment:
  - Source: `~/Downloads/BLACKBAUD-3073930D28 → SAMFAC_20260527-090150_csv.zip`
    (cliente SAMFAC, generado 2026-05-27, 48 CSVs)
  - Target: org `illinois-trainings` (Illinois Holocaust Museum and Education Center)
    `https://ilholocaustmuseum--trainings.sandbox.my.salesforce.com` · orgId `00DWI00000CIwZi2AL`
  - Usuario de carga: `adminveevart@ilhmec.org.trainings`
  - Workspace: `/Users/veevart/dev/etl-illinois-etapestry/` (fuera del repo QA por PII)

  Cobertura por AC:
  - AC1 → Scenario 1 (intake + inventario fuente + preflight + mapping listos)
  - AC2 → Scenario 2 (carga ejecutada en 10 waves parent-first + 3 correcciones en vivo)
  - AC3 → Scenario 3 (reconciliación de conteos + montos + side effects NPSP)
  - AC4 → Scenario 4 (scope diferido/excluido documentado + workspace + re-run idempotente)

  Limitaciones (NO levantar como bug):
  - El workspace `/Users/veevart/dev/etl-illinois-etapestry/` vive fuera del repo QA por PII.
  - El dashboard estático `http://localhost:8787/` solo está disponible mientras corre localmente.
  - La validación es read-only sobre el sandbox de trainings; no se modifica producción.

  Out of scope para este TC:
  - Validación fila-por-fila de los 116 Charge/OppPayment/FDA/POS Purchase contra la org.
    El TC audita los REPORTES de carga y la reconciliación; no valida integridad row-by-row.
  - JournalNotes (48.187) y Attachments — diferidos por política (file policy no aprobada).
  - Ticketing/Shop/Rentals — 0 filas en fuente (no aplica scope, no es exclusión política).

type: integration
priority: medium
status: active

preconditions:
  - "Acceso al workspace `/Users/veevart/dev/etl-illinois-etapestry/` (zip compartido o screen-share)"
  - "Acceso de lectura a la org `illinois-trainings` (orgId `00DWI00000CIwZi2AL`) con `sf` o `sfdx` para validación spot-check"
  - "El dashboard local `http://localhost:8787/` corriendo desde la máquina del operador, O acceso al snapshot estático en `dashboard/validation-checklist.json`"
  - "Conocimiento del scope del deployment: smoke batch determinista de ~30 entidades (mix Individual/Family/Business) con sus transacciones (Donation + Membership), tope 8 txns/entidad → 116 transacciones, más toda la reference data"
  - "Familiaridad con el conteo del deployment: 31 Campaign / 20 Specific Fund / 11 Auctifera__Membership_Programs__c / 30 Account / 18 Contact / 116 Auctifera__POS_Purchase__c / 116 Opportunity / 116 npe01__OppPayment__c / 116 Auctifera__Charge__c / 116 Auctifera__Fund_Donation_Assignment__c = 690 records totales"
  - "Familiaridad con las 3 correcciones en vivo aplicadas: (1) Auctifera__Open__c=true en Specific Fund por validation rule, (2) sanitizador trim/regex para 2 emails inválidos en Account, (3) backfill diferido de Amount para 5 Membership opps con Amount=0"

format: gherkin
scenarios:
  - title: "Intake + inventario de fuente eTapestry + preflight del target + mapping de proyecto quedan listos antes del primer write"
    tags:
      - happy-path
      - ac-1
      - intake
      - preflight
      - mapping
      - illinois
    given:
      - "el export eTapestry `SAMFAC_20260527-090150_csv.zip` accesible en `~/Downloads/BLACKBAUD-3073930D28`"
      - "acceso a la org de trainings `illinois-trainings` (orgId `00DWI00000CIwZi2AL`) con usuario `adminveevart@ilhmec.org.trainings`"
      - "Veevart es el único target de escritura; eTapestry se trata read-only"
    when:
      - "el operador extrae el zip, ejecuta conteos de filas + checksums, decodifica ColumnCodes, define el clasificador de fondos (fondo 'Membership' → dominio Membership; resto → Donation) y el grain de personhood"
      - "el operador ejecuta preflight contra el target: valida external IDs en los 10 objetos, record types Donation/Membership, campos required-on-create, lookups de toda la cadena, POS lock bypass (=true)"
      - "el operador define el mapping de proyecto + clasificador de fondos + mapa de niveles de membresía"
      - "el operador selecciona el smoke batch determinista: ~30 entidades (mezcla Individual/Family/Business) con sus transacciones (Donation + Membership), tope 8 txns por entidad → 116 transacciones, más toda la reference data"
    then:
      - "el inventario reporta: 48 CSVs, 4.203 EntityRoles, 6.416 transacciones (99,9% Gift), 20 fondos, 31 campañas, 2.942 defined values, 48.187 notas; perfil fundraising-first con Ticketing/Shop/Fundraiser = 0 filas"
      - "el preflight reporta 10 objetos con external IDs válidos + record types Donation/Membership existentes + POS lock bypass habilitado"
      - "el mapping de proyecto + clasificador de fondos + niveles de membresía quedan documentados en el workspace"
      - "el smoke batch seleccionado contiene exactamente 30 entidades + 116 transacciones de ambos dominios (Donation + Membership) + reference data completa"
      - "no hay writes a la org en este step — todo es read-only sobre fuente + describe sobre target"

  - title: "Carga ejecutada en 10 waves parent-first (bulk upsert por external ID) con 3 correcciones en vivo aplicadas"
    tags:
      - happy-path
      - ac-2
      - wave-load
      - bulk-upsert
      - corrections
      - illinois
    given:
      - "intake + preflight + mapping completos (Scenario 1 PASS)"
      - "staging de las 10 waves construido (parent-first, upsert por external ID)"
      - "dashboard estático corriendo en `http://localhost:8787/`"
    when:
      - "el operador ejecuta el bulk upsert wave-by-wave en orden de dependencias"
      - "durante la carga aparecen 3 issues y el operador los corrige en vivo sin abortar el flow"
    then:
      - "Wave 1 carga: 31 Campaign (ext id `CMP-<CampaignRef>`) + 20 Auctifera__Specific_Fund__c (ext id `FND-<FundRef>`) + 11 Auctifera__Membership_Programs__c (ext id `DVL-<DefinedValueRef>`)"
      - "Wave 2 carga: 30 Account (ext id `ENT-<EntityRef>`)"
      - "Wave 3 carga: 18 Contact (ext id `ERL-<EntityRoleRef>`)"
      - "Wave 4 carga: 116 Auctifera__POS_Purchase__c (ext id `POS-<TransactionRef>`)"
      - "Wave 5 carga: 116 Opportunity (ext id `TXN-<TransactionRef>`, breakdown 74 Membership + 42 Donation)"
      - "Waves 6, 7, 8 cargan: 116 npe01__OppPayment__c + 116 Auctifera__Charge__c + 116 Auctifera__Fund_Donation_Assignment__c (todos ext id `TXN-<TransactionRef>`)"
      - "Corrección #1: Specific Fund inicialmente rechazaba por validation rule → el operador agrega `Auctifera__Open__c=true` al payload → re-upsert → 20/20 cargan"
      - "Corrección #2: 2 emails inválidos en Account → sanitizador trim/regex aplicado → 30/30 Accounts cargan"
      - "Corrección #3: 5 Membership opps con Amount=0 (automatización de membresía al insertar) → backfill diferido en `deferred-updates/opp_amount_backfill.csv` que persiste post-load"
      - "total enviado: 690 records en 10 objetos · 0 fallos terminales · todas las correcciones quedan documentadas"

  - title: "Reconciliación post-load: conteos + montos + side effects NPSP coinciden 1:1 con la fuente"
    tags:
      - happy-path
      - ac-3
      - reconciliation
      - npsp
      - illinois
    given:
      - "carga ejecutada con 690/690 records y 0 fallos terminales (Scenario 2 PASS)"
      - "acceso de lectura a `illinois-trainings` con `sf data query`"
    when:
      - "el operador corre SOQL contra la org para validar conteos por objeto"
      - "el operador suma Amount en Opportunity, npe01__Payment_Amount__c en OppPayment, y Auctifera__Amount__c en Fund Donation Assignment"
      - "el operador inspecciona side effects automáticos NPSP"
    then:
      - "SOQL counts por objeto coinciden con lo enviado: 31 Campaign · 20 Specific Fund · 11 Membership Program · 30 Account · 18 Contact · 116 POS Purchase · 116 Opportunity · 116 OppPayment · 116 Charge · 116 Fund Donation Assignment"
      - "Opportunity breakdown: 74 Membership + 42 Donation (clasificador de fondos validado)"
      - "Reconciliación de montos: Opportunity total = OppPayment total = Fund Donation Assignment total = $44.489,96 (paridad exacta entre los 3 totales)"
      - "Side effect NPSP automático: 78 OpportunityContactRole primarios creados (Donor/Member) sin intervención del operador"
      - "no se observan otros side effects fuera del scope NPSP esperado"

  - title: "Scope diferido + excluido documentado · workspace persistente · re-run idempotente del smoke batch"
    tags:
      - happy-path
      - ac-4
      - deferred-scope
      - workspace
      - reproducibility
      - illinois
    given:
      - "deployment completo con 690 records cargados y reconciliados (Scenarios 1-3 PASS)"
      - "workspace en `/Users/veevart/dev/etl-illinois-etapestry/` con scripts, staging, deferred-updates, reports"
    when:
      - "el operador documenta lo NO enviado y la razón"
      - "el operador valida que el re-run del smoke batch es idempotente"
    then:
      - "JournalNotes (48.187 source rows) + Attachments declarados como diferidos por política — file policy no aprobada para este customer"
      - "Ticketing / Shop / Rentals declarados como NO aplicables — 0 filas en fuente (no es exclusión política, es ausencia de scope en eTapestry)"
      - "Relationships (8 source rows) + backfill de membresía a nivel donante declarados como fuera del sample smoke (cobertura en deployment futuro full-volume)"
      - "el workspace permanece accesible para handoff: scripts/, staging/, mappings/, target-maps/, upload-runs/, deferred-updates/, reports/, status/, dashboard/"
      - "el comando `ORG=illinois-trainings bash scripts/load_smoke.sh` es idempotente: re-correrlo NO crea duplicados (upsert por external ID confirmado) y NO altera el deferred-updates persistido"


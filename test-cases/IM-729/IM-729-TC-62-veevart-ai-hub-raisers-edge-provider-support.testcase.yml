schemaVersion: "1.0"

id: "d19b812b-c254-463b-a264-d0b9b5f781ef"
key: "TC-62"
title: "veevart-data-migration-skill — Raiser's Edge como provider de primera clase (routing, source playbook, baseline mapping, safety gates, sync validation)"
description: |
  Cobertura QA funcional/integración para IM-729 "Support Raiser's Edge
  in migration skill".

  El PR de Veevarts/VeevartAIHub (branch
  `story/support-raisers-edge-in-migration-skill-IM-729`, commit `e2cb488`,
  +425/-71 LOC en 10 archivos) extiende el `veevart-data-migration-skill`
  distribuido para que Raiser's Edge / Raiser's Edge NXT sea un provider
  de primera clase con:

  - Routing del provider key + aliases (`raisers-edge`,
    `raisers-edge-backup`, `re`, `re-nxt`, `blackbaud-re`) hacia
    `sources/raisers-edge-backup.md`.
  - Source playbook completo con intake, manejo seguro de TDE/Azure SAS
    backups, expected source inventory, personhood policy, external ID
    strategy y Hammer-Validated Lessons.
  - Mapping baseline `mappings/raisers-edge-backup.md` con domain table +
    24 field-level rows, todos usando external IDs (`RE-<DOMAIN>-<source-id>`)
    sin Salesforce IDs hardcoded.
  - Provider adapter contract cumplido (referencias a
    `references/provider-adapter-template.md`,
    `references/workspace-dashboard-control-plane.md`,
    `references/validation-flow.md`,
    `references/provider-finalization-workflow.md`).

  Tickets relacionados:
  - IM-729 padre (Historia, In QA Review, Medium, reporter veevart_josed)
  - IM-909 — QA Sub-task de IM-729
  - IM-637 — Tessitura migration provider (prior provider pattern)
  - IM-584 — Obvious.ai migration spike (historical context)
  - IM-788 — Local migration template skill (cloned-from)
  - PR: Veevarts/VeevartAIHub#TBD branch
    `story/support-raisers-edge-in-migration-skill-IM-729`

  Cobertura por AC (6 ACs en la historia):
  - AC1 (Route to RE playbook) → Scenario 1
  - AC2 (Source inventory + identity strategy) → Scenario 2
  - AC3 (Map via external IDs) → Scenario 3
  - AC4 (Surface unsupported / customer-specific) → Scenario 4
  - AC5 (Preserve migration safety gates) → Scenario 5
  - AC6 (Validate distributed skill docs / sync script) → Scenario 6

  Cobertura adicional (regression evidence + edge cases):
  - Scenario 7: Postura de seguridad para TDE/Azure SAS Blackbaud backups
    (secretos nunca en chat, `.pvk` y password tratados como secretos).
  - Scenario 8: Hammer-Validated Lessons preservadas (gift type decoding,
    membership end-date cohort, OCR/personhood policy, payment lookup).
  - Scenario 9: Gap NXT/API extracts — mencionados como soportados sin
    intake propio dedicado (edge-case / missing-doc).

  Riesgos abiertos identificados en el code review:
  - R1 (Alta) scope creep "dashboard-first for every migration mode" en
    `SKILL.md`, `references/etl-control-plane.md`,
    `references/workspace-dashboard-control-plane.md`. Afecta default de
    Altru/Tessitura/eTapestry. No está justificado por IM-729.
  - R2 (Media) cambio retroactivo en `references/validation-flow.md`
    membership cohort-profile gate; aplica a todos los providers.
  - R3 (Baja) refactor `mappings/etapestry.md` no relacionado a IM-729.
  - R4 (Media) NXT/API extracts sin sección de intake propia.
  - R5 (Baja) inconsistencia `RE-PAY-<PaymentGiftId>` vs
    `RE-PAY-<payment-or-writeoff-id>` entre tablas del mismo archivo.
  - R6 (Baja) todos los rows del mapping baseline en `confidence:
    candidate` — ningún row promovido a `high`.

  Limitaciones (NO levantar como bug):
  - El PR es solo documentación distribuida (skill markdown). No produce
    cambios de código ejecutable ni mutaciones en Salesforce por sí mismo.
  - La validación de los Scenarios 1-9 es estática sobre el contenido del
    skill repo (routing, playbook, baseline, safety gates documentados).

  Actualización 2026-06-16 — validación end-to-end EJECUTADA (cierra R7):
  - El follow-up "dry-run con un dataset RE7 real de Hammer" (riesgo R7 de
    IM-909) ya NO está pendiente: se ejecutó una migración end-to-end real
    siguiendo el provider RE del skill, desde un backup RE7 TDE del Hammer
    Museum (UCLA) hacia un sandbox Veevart (`hammer-trainings`).
  - Scenarios 10-14 capturan esa evidencia ejecutable: 13 tipos de objeto
    cargados (Accounts/Contacts/Addresses/Relationships/Affiliations,
    Campaigns/Funds/Opportunities/FDA/Payments/Recurring, Membership
    Programs/Opportunities) con 0 FKs colgados y relaciones íntegras.
  - Workspace de evidencia: `~/veevart-migrations/raisers-edge/` (raw,
    staging, scripts, reports/01-04, mappings/gift-type-decode.md).

type: integration
priority: medium
status: active

preconditions:
  - "Branch del PR Veevarts/VeevartAIHub `story/support-raisers-edge-in-migration-skill-IM-729` checkeada (commit `e2cb488` o posterior)"
  - "Acceso de lectura al repo `Veevarts/VeevartAIHub` (worktree local o equivalente)"
  - "`python3` y `bash` disponibles en el entorno para correr `scripts/validate-skills.sh`"
  - "Repo limpio o aislado en worktree para evitar contaminar el clone principal"
  - "Conocimiento del schema de Raiser's Edge 7 (RECORDS / GIFT / CONSTIT_RELATIONSHIPS / ADDRESS / membership tables) para inspección semántica del mapping baseline"

format: gherkin
scenarios:
  - title: "Routing de Raiser's Edge: aliases del provider key resuelven al playbook RE y no a `sources/new-provider.md`"
    tags:
      - happy-path
      - ac-1
      - provider-routing
      - alias-normalization
    given:
      - "el archivo `user/skills/veevart-data-migration-skill/references/field-mapping-registry.md` lista las aliases `raisers-edge`, `raisers-edge-backup`, `re`, `re-nxt`, `blackbaud-re` mapeadas al provider key canónico `raisers-edge-backup`"
      - "el archivo `user/skills/veevart-data-migration-skill/SKILL.md` Source Routing table tiene una entrada de Raiser's Edge backup apuntando a `sources/raisers-edge-backup.md`"
    when:
      - "se simula la selección de Raiser's Edge como source provider con cada una de las 5 aliases"
    then:
      - "cada alias resuelve al provider key canónico `raisers-edge-backup`"
      - "cada alias enruta a `user/skills/veevart-data-migration-skill/sources/raisers-edge-backup.md`"
      - "ninguna alias enruta a `sources/new-provider.md`"
      - "la mapping baseline resuelta es `mappings/raisers-edge-backup.md`"
      - "el playbook `sources/raisers-edge-backup.md` declara explícitamente las 5 aliases aceptadas en su header (`Provider key:` + `Accepted intake aliases:`)"

  - title: "Source playbook documenta inventario y estrategia de identidad para RE backups, exports, NXT y API extracts"
    tags:
      - happy-path
      - ac-2
      - source-playbook
      - source-inventory
      - identity-strategy
    given:
      - "el archivo `user/skills/veevart-data-migration-skill/sources/raisers-edge-backup.md` está presente en la branch del PR"
    when:
      - "un implementation specialist lee el playbook antes de planear una migración RE"
    then:
      - "el playbook tiene una sección `## Intake Additions` que enumera al menos: formato fuente (SQL backup / CSV / NXT API / mixto), schema/data dictionary, modelo de constituent identity, modelo de gift/revenue, modelo de membership, addresses/email/phone, relationships/affiliations, política de fechas, política de IDs/PII y excluiones customer-specific"
      - "el playbook tiene una sección `## Expected Source Inventory` con tabla de Domain ↔ Common source entities/files ↔ Row grain to confirm cubriendo Constituents, Households/accounts, Addresses, Relationships, Fundraising reference, Gifts, Payments, Membership y History"
      - "el playbook tiene una sección `## Personhood and Account-Only Policy` con clasificación clara (`Contact/person`, `Household Account`, `Organization Account`, `Account-only transaction`, `unresolved`) y reglas para no inventar Contacts placeholder"
      - "el playbook tiene una sección `## External ID Strategy` con tabla por target object usando patrones `RE-<DOMAIN>-<source-id>` (al menos Account, Contact, Address, Relationship, Affiliation, Campaign, Fund, Membership Program, Opportunity Gift, Opportunity Membership, Recurring Donation, OppPayment, Fund Donation Assignment)"
      - "ningún patrón en la External ID Strategy contiene un Salesforce Id literal (15/18 chars de tipo `001/003/006/...`)"

  - title: "Mapping baseline mapea constituent y fundraising vía external IDs sin requerir IDs de Salesforce hardcoded"
    tags:
      - happy-path
      - ac-3
      - mapping-baseline
      - external-ids
    given:
      - "el archivo `user/skills/veevart-data-migration-skill/mappings/raisers-edge-backup.md` está presente en la branch del PR"
      - "el archivo declara que es un `shared provider baseline candidate` con `Provider key: raisers-edge-backup`"
    when:
      - "se inspecciona la `## Baseline Domain Mapping` y las `### Common Foundation Mapping` + `### Fundraising and Membership Mapping` tables"
    then:
      - "el Baseline Domain Mapping incluye al menos: Constituent individual + organization, Addresses, Relationships (person-person y person-org), Org-org parent, Campaign/Appeal/Package, Fund/Designation, Cash gift, Pledge, Pledge payment/installment, Write-off, Stock/property/in-kind, Matching gift, Recurring gift series + installment, Membership category + transaction, Soft credit/tribute/solicitor/campaign member, Notes/actions"
      - "el Field-Level mapping tiene al menos 20 rows con columnas Source entity, Source field, Source grain, Transform, Target object API name, Target field API name, Operation, Required parent, Writability, Confidence, Validation"
      - "todos los external IDs siguen el patrón `RE-<DOMAIN>-<source-id>` con prefijos como `RE-ACCT`, `RE-CON`, `RE-ORG`, `RE-ADDR`, `RE-REL`, `RE-AFF`, `RE-CAMP`, `RE-FUND`, `RE-GIFT`, `RE-PAY`, `RE-RD`, `RE-MEM`, `RE-MEMCAT`, `RE-GSPLIT`"
      - "ningún row del mapping baseline contiene un Salesforce Id literal de 15 o 18 caracteres (`001...`, `003...`, `005...`, `006...`, `00Q...`, `701...`)"
      - "los lookups inter-object usan sintaxis de external-ID relationship (`<Lookup>__r.<ExternalIdField>`), no `<Lookup>__c = '<hardcoded-id>'`"

  - title: "Estructuras Raiser's Edge no soportadas o customer-specific aparecen como blockers, project overrides o exclusiones explícitas antes de load execution"
    tags:
      - important
      - ac-4
      - unsupported-cases
      - project-overrides
    given:
      - "un implementation team encuentra un campo, tabla o relación RE que está ausente, ambigua, customer-specific o sin mapping de target seguro (ej. soft credits, tributes, solicitors, custom modules, refund/reversal semantics)"
    when:
      - "ejecuta mapping validation siguiendo el provider playbook + baseline"
    then:
      - "el playbook `sources/raisers-edge-backup.md` tiene una sección `## Unsupported or Customer-Specific Cases` enumerando al menos: IDs inestables, household/personhood ambiguo, reference codes sin decode, soft credits/tributes/solicitors/prospect ratings/custom modules sin target, refund/reversal sin chain, membership sin program/categoría/dates, payments sin parent resolvible, notes con texto sensible sin privacy review"
      - "la mapping baseline `mappings/raisers-edge-backup.md` tiene una sección `## Blockers Before Load` y una sección `## Required Project Overrides` que enumera qué overrides debe crear cada proyecto (actual source export/table names, source IDs/grain, household/personhood decisions, gift type decoding, classification, membership mapping, soft credit policy, target record type developer names, unsupported structures con owner/reason)"
      - "la baseline no enuncia un default silencioso para escenarios ambiguos; cualquier ambigüedad queda como blocker, deferred, override o exclusión documentada"

  - title: "Las safety gates compartidas de migración se preservan cuando se usa el RE provider path (Veevart-only target, read-only source, exact write confirmation, validation flow)"
    tags:
      - important
      - ac-5
      - safety-gates
      - veevart-target-only
    given:
      - "el branch del PR está checked-out y contiene el archivo `user/skills/veevart-data-migration-skill/SKILL.md` con la sección `## Critical Operating Principles`"
      - "el playbook `sources/raisers-edge-backup.md` referencia los flows compartidos `references/provider-adapter-template.md`, `references/workspace-dashboard-control-plane.md`, `references/validation-flow.md`, `references/provider-finalization-workflow.md`"
    when:
      - "se inspecciona el flujo end-to-end del Standard Workflow del SKILL para una migración RE executable"
    then:
      - "los Critical Operating Principles incluyen explícitamente: Veevart como único write target, exact command confirmation para writes (target org, object API name, row count, payload path, side effects, rollback/verification plan)"
      - "el RE playbook declara `Source write policy: read-only unless the user explicitly authorizes a source write` y `Target write policy: Veevart Salesforce target only, gated by exact command confirmation`"
      - "el RE playbook no re-implementa las gates de Email Deliverability / POS Transaction Lock bypass / trigger bypass — las hereda por referencia al validation-flow compartido"
      - "el Standard Workflow del SKILL pasa primero por intake → discovery → mapping → staging → validation antes de cualquier upload (steps 1-12 del workflow)"
      - "el RE playbook nunca pide al usuario pegar credenciales, passwords, private keys ni SAS URLs en chat"

  - title: "El sync script `validate-skills.sh` pasa y los índices distribuidos (README.md, agents.override.md) se mantienen consistentes con el RE provider"
    tags:
      - important
      - ac-6
      - distributed-skill-validation
      - sync-script
    given:
      - "el repo `Veevarts/VeevartAIHub` está checked-out en la branch del PR"
      - "`python3` y `bash` están disponibles"
    when:
      - "se ejecuta `bash scripts/validate-skills.sh --quiet` desde la raíz del repo"
    then:
      - "el script termina con exit code 0"
      - "el output incluye `Summary: <N> skills checked, 0 errors, 0 warnings`"
      - "la skill `veevart-data-migration-skill` aparece en la lista de skills validadas"
      - "el archivo `README.md` lista Raiser's Edge en la entrada de `veevart-data-migration-skill` del catálogo distribuido"
      - "el archivo `user/skills/agents.override.md` lista Raiser's Edge en la entrada de `veevart-data-migration-skill` del routing índice"
      - "ningún archivo del repo referencia `mappings/raisers-edge.md` (nombre incorrecto del ticket original): la convención es `mappings/raisers-edge-backup.md` consistente con el provider key canónico"

  - title: "Postura de seguridad para TDE/Azure SAS Blackbaud backups: secretos nunca pedidos en chat, `.pvk` y restore-password tratados como secretos"
    tags:
      - edge-case
      - regression-evidence
      - security
      - tde-handling
      - sas-url-handling
    given:
      - "el playbook `sources/raisers-edge-backup.md` contiene las secciones `## Backup / Database Mount Intake`, `### Azure Blob SAS URL download handling`, y `### Local Blackbaud TDE bundle handling`"
    when:
      - "un operador prepara la descarga / restore de un backup Blackbaud TDE-encrypted siguiendo el playbook"
    then:
      - "el playbook indica explícitamente que NUNCA se debe pedir SAS URL completa, private key password, certificate password ni restore password en chat"
      - "el playbook trata el archivo `.pvk` y el archivo restore-password como secretos: solo se referencian por path o secret manager item; nunca se imprime su contenido"
      - "el playbook prohíbe commitear backups descargados, SAS URLs, certificate private keys, password files, logs con SAS query strings, o restored database files"
      - "el download script generado redacta el SAS query string en terminal output y status files"
      - "el playbook bloquea la descarga si la SAS URL está expirada o tiene permisos más amplios que lo aprobado"
      - "el playbook trata el backup descargado como inmutable y exige extract/restore from a copy"
      - "el restore plan separa el certificate/private-key setup del database restore y verifica la existencia del certificate antes del `RESTORE DATABASE`"

  - title: "Hammer-Validated Raiser's Edge Lessons preservadas en el playbook: gift type decoding, membership end-date cohort, OCR/personhood policy, payment lookup integrity"
    tags:
      - regression-evidence
      - hammer-validated
      - lessons-learned
    given:
      - "el playbook `sources/raisers-edge-backup.md` contiene la sección `## Hammer-Validated Raiser's Edge Lessons`"
    when:
      - "se inspecciona la transferencia de aprendizajes del sample Hammer al baseline reusable"
    then:
      - "la sección incluye un subapartado `### Gift type and recurring-gift decisions` con tabla mapeando al menos los tipos Cash / Pledges TYPE=8 / Stock TYPE=9 / Recurring series TYPE=30 / Recurring installments TYPE=31 / In-kind TYPE=15 / Matching TYPE=27 a target Veevart"
      - "la sección incluye un subapartado `### Account, Contact, OCR, and account-only policy` con reglas: spouse pairs comparten Household Account, organization gifts permiten Account-only Opportunities, no inventar Contacts para satisfacer OCR, missing OCR aceptado solo para account-only Opportunities"
      - "la sección incluye un subapartado `### Membership policy` con la regla cohort-profile para blank end dates (profile por programa/categoría/dues/expiration antes de elegir policy: blank, lifetime/far-future, programa-specific)"
      - "la sección incluye un subapartado `### Payments, write-offs, wrappers, and allocations` con reglas: parent gift/pledge/recurring resolvible, suppression de auto-payments cuando se usa `npe01__OppPayment__c` explícito, FDA con lookups Opportunity + Fund, POS/Charge wrappers como source-derived"
      - "la sección incluye un subapartado `### Reference decoding and no invented business data` que prohíbe inventar campaign/membership/relationship/note labels"

  - title: "Gap NXT/API extracts: documentado como soportado pero sin sección de intake propia equivalente al Backup/Database Mount Intake"
    tags:
      - edge-case
      - missing-doc
      - nxt-api-extracts
      - follow-up
    given:
      - "el playbook `sources/raisers-edge-backup.md` declara en su header que soporta `SQL backup, flat CSV exports, NXT/API extracts, or mixed packages`"
      - "el playbook tiene secciones detalladas para SQL `.bak` (`Backup / Database Mount Intake`), Azure SAS (`Azure Blob SAS URL download handling`) y TDE (`Local Blackbaud TDE bundle handling`)"
    when:
      - "se busca la sección equivalente para NXT/API extracts (auth, throttling, paginación, delta loads, scope de endpoints, manejo de tokens)"
    then:
      - "no existe una sección dedicada `NXT / API Extract Intake` que cubra: tipo de credencial (OAuth client credentials / refresh token / Subscription Key), rate limits y backoff, paginación (`page` / `next` / cursor), endpoint scope (constituents, gifts, addresses, memberships), delta strategy (`since` filter / timestamp / changelog endpoint), manejo de tokens como secretos"
      - "este gap se debe (a) cerrar agregando la sección NXT/API o (b) declarar explícitamente que el primer release soporta solo backup-based migrations y NXT queda como follow-up ticket"
      - "QA reportará este gap como riesgo abierto R4 en el code review comment del PR y como follow-up ticket recomendado"

  - title: "E2E ejecutable — Common Foundation: backup RE7 TDE del Hammer restaurado y Accounts/Contacts/Addresses/Relationships/Affiliations cargados a un sandbox Veevart con relaciones íntegras"
    tags:
      - e2e-execution
      - regression-evidence
      - ac-1
      - ac-2
      - ac-3
      - common-foundation
      - hammer-dataset
    given:
      - "se sigue el provider RE del skill (`sources/raisers-edge-backup.md` + `mappings/raisers-edge-backup.md`) con un backup RE7 real (Hammer Museum, UCLA), restaurado READ_ONLY como `RE7_src` en un SQL Server en container (Colima/Docker), confirmando RE7 (RECORDS/GIFT/CONSTIT_RELATIONSHIPS/ADDRESS/membership tables)"
      - "el target es el sandbox Veevart `hammer-trainings` con NPSP + Auctifera, external IDs `Auctifera__Implementation_External_ID__c` (Account/Contact) y `vnfp__Implementation_External_ID__c` (Address/Relationship/Affiliation) presentes"
      - "se construye una muestra estratificada y cerrada bajo relaciones de 364 constituyentes (377 con endpoints) que cubre todos los gift types + membership + orgs + spouse households"
    when:
      - "se transforma y se cargan vía Bulk API 2.0 upsert por external ID: households + organizations a `Account`, personas a `Contact`, addresses a `npsp__Address__c`, relaciones persona-persona a `npe4__Relationship__c`, persona-org a `npe5__Affiliation__c`"
    then:
      - "se cargan 323 Accounts (288 households con 54 spouse-pairs colapsados + 35 orgs), 342 Contacts (todos con AccountId), 277 npsp__Address__c, 80 npe4__Relationship__c y 91 npe5__Affiliation__c — 0 FKs colgados"
      - "las relaciones quedan íntegras en Salesforce: el par spouse comparte un household; NPSP propaga la dirección household al Contact; la affiliation resuelve Organization + Contact con rol decodificado"
      - "todos los lookups usan sintaxis external-ID relationship (`<Lookup>__r.<ExternalIdField>`); ningún Salesforce Id hardcoded (valida AC3 en ejecución)"
      - "los códigos crudos RE (RELATION_CODE, COUNTRY, TYPE) se decodifican vía `TABLEENTRIES.LONGDESCRIPTION` antes de ir a campos de display (no se cargan códigos crudos)"

  - title: "E2E ejecutable — Fundraising: gift Opportunities por record type decodificado, FDA fund allocation, pledge payments y recurring donations cargados con cadenas íntegras"
    tags:
      - e2e-execution
      - regression-evidence
      - ac-3
      - fundraising
      - gift-type-decoding
      - hammer-dataset
    given:
      - "los Accounts/Contacts del Common Foundation ya existen en `hammer-trainings`"
      - "el GIFT.TYPE del source se decodifica con la tabla Hammer-validated del playbook (1 Cash, 8 Pledge, 9/10 Stock, 15 In-Kind, 27 MG Pledge, 30 Recurring; 2/21/11/3/22/28/31 = pagos Pay-*)"
    when:
      - "se cargan Campaigns y Funds de referencia, luego gift Opportunities (record type por gift type decodificado), `Auctifera__Fund_Donation_Assignment__c` desde GiftSplit, pledge payments a `npe01__OppPayment__c` y recurring series a `npe03__Recurring_Donation__c`"
    then:
      - "se cargan 52 Campaigns, 312 Funds, 4954 gift Opportunities (Donation 3875 / In_Kind 505 / Matching 20), 5015 FDA, 972 pledge payments (USD 73.5M) y 15 recurring donations — 0 fallos finales"
      - "el grafo resuelve end-to-end: Opportunity -> Account -> Primary Contact -> Campaign -> FDA -> Fund"
      - "los pagos Pay-* NO se cargan como Opportunities nuevas sino a `npe01__OppPayment__c` contra su pledge padre; los rollups del pledge cuadran (Payments_Made = Amount, Outstanding = 0)"
      - "NPSP auto-crea el payment de los gifts Closed Won (4657); se evita el doble conteo cargando solo los pledge payments reales"

  - title: "E2E ejecutable — Membership: Membership Programs (decode correcto) y Membership Opportunities con member/program/fechas; cohort de end-date en blanco resuelto por política"
    tags:
      - e2e-execution
      - regression-evidence
      - ac-2
      - ac-4
      - membership
      - end-date-cohort
      - hammer-dataset
    given:
      - "los Accounts/Contacts y los Member->ConstitID del source están disponibles"
      - "el cohort de membership con `ExpiresOn` en blanco (350 tx, 348 con Dues=0) se perfila por programa/dues siguiendo la regla Hammer del playbook, y se elige política antes de cargar"
    when:
      - "se cargan `Auctifera__Membership_Programs__c` desde el campo RE `Program` (decodifica a nombres reales) y 1978 Membership Opportunities (RT Membership) ligando Account + `vnfp__Member__r` + `vnfp__Membership_Program__r`"
    then:
      - "se cargan 7 Membership Programs y 1978 Membership Opportunities — 0 FKs colgados; distribución por programa coherente (Individual 1251, Visitor Check-In 273, VIP 258, ...)"
      - "se decide NO usar el campo RE `Category` como nivel porque decodifica a otra code-table (basura: 51->Electrical); se usa `Program` (decode correcto) — se documenta la decisión, no se inventan labels"
      - "el cohort de end-date en blanco se deja en blanco por política; la automatización Auctifera de membership lo auto-completa (start + duración) como efecto de trigger esperado"

  - title: "E2E ejecutable — Safety gates del skill aplicadas en vivo: target describe, external IDs, Email Deliverability, write confirmation, source read-only, secretos nunca en chat"
    tags:
      - e2e-execution
      - regression-evidence
      - ac-5
      - safety-gates
      - secret-handling
    given:
      - "se ejecuta el Standard Workflow del skill para una migración RE executable real contra `hammer-trainings`"
    then:
      - "el preflight valida target describe (objetos, record types, external ID fields, Email Deliverability, POS lock bypass, `Auctifera__Disable_Trigger__c`) antes de cualquier staging"
      - "cada escritura a Salesforce pasa por confirmación exacta (target org, objeto, row count, payload, side effects, rollback); el classifier bloqueó un flip de flag de seguridad (POS lock) por falta de autorización explícita y se respetó"
      - "el source RE7 se mantiene READ_ONLY; el `.bak`/`.pvk`/restore-password se tratan como secretos (nunca impresos ni commiteados); las queries inyectan la password sin loguearla"
      - "Veevart es el único write target; el staging es script-first (no CSVs ad hoc); cada wave preserva raw/staging/scripts/reports auditables"

  - title: "E2E ejecutable — Estructuras RE customer-specific surfacing como blockers/overrides corregidos: 4 correcciones de mapping promovibles al baseline (valida AC4 en ejecución)"
    tags:

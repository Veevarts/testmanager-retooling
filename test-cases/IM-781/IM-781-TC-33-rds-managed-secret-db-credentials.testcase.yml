schemaVersion: "1.0"

id: "cad04c38-4eec-46fc-b6fb-b54335905209"
key: "TC-33"
title: "Analytics Postgres credential loading from RDS-managed Secrets Manager secret (two-secret model)"
description: |
  Cobertura QA de IM-781 (PR 27 en VeevartAnalytics) bajo el epic IM-506
  KPI Automation. Valida que el cliente Postgres de analytics arme la
  conexion a partir del secret RDS-managed (Secrets Manager) en lugar del
  DATABASE_URL mantenido manualmente, para que la rotacion automatica de
  password de RDS no rompa la conectividad.

  Mecanica confirmada (code review del head SHA db1be7f0):

  - Nuevo `analytics-postgres.connection.ts` (+181) con 2 funciones core:
    - `resolveAnalyticsPostgresConnectionConfig()`: lee 2 env vars,
      `ANALYTICS_DATABASE_SECRET_ARN` (metadata) y
      `ANALYTICS_DATABASE_CREDENTIALS_SECRET_ARN` (credenciales RDS). Carga
      ambos secrets en paralelo via loadSecretString. Retorna undefined si
      el metadata ARN no esta; throw si metadata esta pero falta el
      credentials ARN.
    - `buildAnalyticsPostgresConnectionConfig(metadataSecret, credentialsSecret)`:
      funcion pura testeable. Valida METADATA_REQUIRED_FIELDS
      [engine, host, port, dbname] y CREDENTIAL_REQUIRED_FIELDS
      [username, password], asegura engine postgres/postgresql, y arma un
      pg PoolConfig (host/port/database/user/password). No construye
      connection string; arma PoolConfig estructurado.
  - `analytics-postgres.client.ts` (+4/-39): delega al nuevo modulo;
    elimina el viejo resolveConnectionString()/readField() que leia
    DATABASE_URL/databaseUrl/connectionString/RDS_CONNECTION_STRING.
  - Garantia no-secret-logged: por construccion. No hay logging; los
    mensajes de error nombran solo field names, nunca valores.
  - SAM: nuevo parametro AnalyticsDatabaseCredentialsSecretArn, condition
    HasAnalyticsDatabaseCredentialsSecret, env var nueva en Globals,
    SecretsManager read policy agregada a 7 functions.

  HALLAZGO CRITICO DE SCOPE-FIT: el AC2 del ticket ("existing secret con
  DATABASE_URL o connectionString sigue funcionando") NO se cumple. El PR
  DELIBERADAMENTE remueve todo el soporte de DATABASE_URL/connectionString
  (modelo two-secret breaking). El OpenSpec spec.md del PR declara
  explicitamente: "The system SHALL NOT require or parse DATABASE_URL...
  a legacy URL-only secret MUST fail." El comportamiento implementado es
  OPUESTO al AC2. Escalar al owner: o el AC2 esta mal redactado (y el
  breaking change es intencional) o falta el backward-compat.

  Referencias:
  - PR: https://github.com/Veevarts/VeevartAnalytics/pull/27
  - Issue: https://veevart.atlassian.net/browse/IM-781
  - Epic: https://veevart.atlassian.net/browse/IM-506

type: integration
priority: medium
status: active

preconditions:
  - "Repo VeevartAnalytics checkeado en main (incluye PR 27 mergeado, head db1be7f0)"
  - "Node.js + pnpm para correr los unit tests: `pnpm --dir veevart-analytics test` o el spec especifico analytics-postgres.connection.spec.ts"
  - "Para validacion de deploy (opcional): acceso a un entorno no-prod con el RDS-managed secret configurado en AnalyticsDatabaseCredentialsSecretArn"

format: gherkin
scenarios:
  - title: "Side-by-side y scope-fit del PR 27 + flag de AC2 (backward-compat removido)"
    tags:
      - data-review
      - side-by-side
      - scope-fit
    given:
      - "PR 27 mergeado, 15 archivos (+1067/-43): 2 production + 1 test + SAM/Makefile/deploy script + 6 OpenSpec + docs"
    when:
      - "QA descarga del head SHA db1be7f0 el connection.ts, client.ts, connection.spec.ts, template.yaml y el spec.md de OpenSpec"
    then:
      - "`buildAnalyticsPostgresConnectionConfig` valida los campos requeridos (engine/host/port/dbname del metadata + username/password de credentials) y arma un pg PoolConfig estructurado, sin construir connection string"
      - "`resolveAnalyticsPostgresConnectionConfig` lee 2 ARNs (metadata + credentials), carga ambos en paralelo, retorna undefined sin metadata ARN, throw si falta credentials ARN"
      - "`analytics-postgres.client.ts` elimina el viejo resolveConnectionString()/readField() que leia DATABASE_URL/connectionString/RDS_CONNECTION_STRING"
      - "los mensajes de error nombran solo field names; no hay logging de valores de secret (redaccion por construccion)"
      - "SAM agrega AnalyticsDatabaseCredentialsSecretArn + condition + env var + read policy a 7 functions"
      - "AC2 (backward-compat DATABASE_URL/connectionString) NO se cumple: el PR lo remueve a proposito (modelo two-secret breaking, confirmado en OpenSpec spec.md). FLAG: el AC2 contradice la implementacion; escalar al owner para confirmar si el breaking change es intencional o si falta backward-compat"

  - title: "Unit test coverage valida parsing RDS-managed + missing-fields + secret redaction"
    tags:
      - regression
      - unit-tests
      - secret-safety
    given:
      - "el spec analytics-postgres.connection.spec.ts tiene 7 tests con loadSecretString mockeado (sin AWS real)"
    when:
      - "QA corre `pnpm --dir veevart-analytics test analytics-postgres.connection` (o el suite completo) y mapea cada test a su AC"
    then:
      - "AC1 cubierto: test 'builds pool config from metadata and RDS-managed credentials secrets' + 'loads metadata and credentials from separate configured secret identifiers'"
      - "AC3 (rotacion) cubierto parcialmente: cada call re-lee via el loader mockeado (soporta rotacion en cold start; warm container cachea el Pool hasta reciclar — nuance documentada)"
      - "AC4 cubierto: 'requires credentials secret when metadata secret is configured' + 'rejects missing credential fields without leaking configured values'"
      - "AC5 cubierto: 'rejects invalid JSON without echoing the raw secret' + asserts not.toContain(legacy-user/legacy-password/rds-user)"
      - "AC2 inverso confirmado: test 'rejects legacy connection-string-only metadata without leaking secret values' PRUEBA que un secret DATABASE_URL-only FALLA (lo opuesto al AC2 redactado)"
      - "los 7 tests pasan (validar al correr el suite); ningun test usa AWS live"

  - title: "Validacion de conectividad post-deploy (opcional, requiere entorno no-prod con RDS-managed secret)"
    tags:
      - functional
      - deploy
      - blocked-without-env
    given:
      - "un entorno no-prod con AnalyticsDatabaseCredentialsSecretArn apuntando a un RDS-managed secret real + AnalyticsDatabaseSecretArn al metadata secret"
    when:
      - "QA dispara una migracion o extraccion que abra conexion Postgres"
      - "(opcional) QA simula una rotacion de password de RDS y dispara una nueva ejecucion Lambda (cold start)"
    then:
      - "la conexion Postgres se abre exitosamente usando las credenciales del RDS-managed secret, sin DATABASE_URL"
      - "tras rotacion, la siguiente ejecucion (cold start) usa el password actual del secret rotado (AC3 end-to-end)"
      - "los CloudWatch logs no contienen password ni connection string completo"


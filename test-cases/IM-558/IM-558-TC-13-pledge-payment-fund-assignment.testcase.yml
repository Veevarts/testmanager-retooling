schemaVersion: "1.0"
id: "6a582a92-40dc-4f29-ad76-6afa4da463db"
key: "TC-13"
title: "Pledge payment fund assignment uses the correct designation source"
description: "Cobertura QA de IM-558 para validar que los fund assignments de pledge payments usen la designation del source pledge line item cuando exista, hagan fallback correcto al installment split cuando no exista y mantengan la integridad del external ID y de las referencias a opportunities."
type: "integration"
priority: "medium"
status: "active"
format: "gherkin"
preconditions:
  - "El usuario QA tiene acceso a la salida actualizada de la query de fund assignments y a la referencia del caso en Altru."
  - "Existe el caso reportado de KidSTREAM con payment 4C4C3D7E-05B9-4F99-A350-D54DEBCBF3E7 para comparar fund extraido vs fund esperado."
  - "Existe al menos un caso de pledge payment donde la source pledge line item designation no pueda resolverse."
  - "El usuario QA puede ejecutar o revisar validaciones locales de regresion para la query."
scenarios:
  - title: "Usar la designación del source pledge line item cuando está disponible"
    tags:
      - "happy-path"
      - "source-designation"
    given:
      - "existe un pledge payment fund assignment en el export anterior"
      - "el fund anterior fue exportado como Contributions \\ Unrestricted \\ Giving Tuesday"
      - "el source pledge line item tiene una designación disponible diferente al installment split fund"
    when:
      - "se genera el export actualizado de fund assignments"
    then:
      - "el fund assignment debe usar la designación del source pledge line item"
      - "el fund name debe actualizarse al valor esperado"
      - "el external ID debe permanecer sin cambios"
  - title: "Usar installment split designation como fallback cuando no se resuelve la source designation"
    tags:
      - "fallback"
      - "installment-split"
    given:
      - "existe un pledge payment cuyo source pledge line item designation no puede resolverse"
      - "existe una designation disponible en el installment split"
    when:
      - "se genera el export actualizado de fund assignments"
    then:
      - "el fund assignment debe usar la designation del installment split"
      - "el fund assignment no debe quedar sin fund"
  - title: "Mantener el external ID grain de los pledge payment fund assignments existentes"
    tags:
      - "regression"
      - "external-id"
    given:
      - "existen pledge payment fund assignments en el export anterior"
    when:
      - "se genera el export actualizado de fund assignments"
    then:
      - "el external ID debe permanecer con el grain {InstallmentSplitID}-{PaymentID}"
      - "no deben agregarse external IDs para registros existentes"
      - "no deben eliminarse external IDs de registros existentes"
  - title: "No generar duplicate POS external IDs en el export actualizado"
    tags:
      - "regression"
      - "duplicate-external-ids"
    given:
      - "existe el archivo actualizado de fund assignments"
    when:
      - "se valida el campo Implementation_External_ID__c"
    then:
      - "no deben existir duplicate POS external IDs"
  - title: "Mantener referencias a opportunities existentes"
    tags:
      - "regression"
      - "opportunity-reference"
    given:
      - "existe el archivo actualizado de fund assignments"
    when:
      - "se valida el campo vnfp__Opportunity__c"
    then:
      - "cada fund assignment debe continuar referenciando una opportunity existente"
      - "el campo vnfp__Opportunity__c no debe estar vacío"
tags:
  - "im-558"
  - "altru-queries"
  - "pledge-payments"
  - "fund-assignment"
  - "designation"
  - "kidstream"

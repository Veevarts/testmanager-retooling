schemaVersion: "1.0"
id: "6a582a92-40dc-4f29-ad76-6afa4da463db"
key: "TC-13"
title: "Pledge payment fund assignment uses the correct designation source"
description: "Cobertura QA de IM-558 para validar que los fund assignments de pledge payments usen la designation del source pledge line item cuando exista, hagan fallback correcto al installment split cuando no exista y mantengan la integridad del external ID y de las referencias a opportunities."
type: "integration"
priority: "medium"
status: "active"
format: "gherkin"
preconditions:
  - "El usuario QA tiene acceso a la salida actualizada de la query de fund assignments y a la referencia del caso en Altru."
  - "Existe el caso reportado de KidSTREAM con payment 4C4C3D7E-05B9-4F99-A350-D54DEBCBF3E7 para comparar fund extraido vs fund esperado."
  - "Existe al menos un caso de pledge payment donde la source pledge line item designation no pueda resolverse."
  - "El usuario QA puede ejecutar o revisar validaciones locales de regresion para la query."
scenarios:
  - title: "Use source pledge line item designation when available"
    tags:
      - "happy-path"
      - "source-designation"
    given:
      - "un pledge payment tiene una source pledge line item con designation resoluble"
    when:
      - "los fund assignments se exportan"
    then:
      - "el fund assignment usa la designation de la source pledge line item"
  - title: "Fallback to installment split designation when source designation is unavailable"
    tags:
      - "fallback"
      - "installment-split"
    given:
      - "un pledge payment no puede resolver la designation de la source pledge line item"
    when:
      - "los fund assignments se exportan"
    then:
      - "el fund assignment usa la designation del installment split como fallback"
  - title: "Preserve external ID grain for pledge payment fund assignments"
    tags:
      - "regression"
      - "external-id"
    given:
      - "existen fund assignments actuales para pledge payments"
    when:
      - "la query actualizada genera la salida de fund assignments"
    then:
      - "el grain del external ID permanece como {InstallmentSplitID}-{PaymentID}"
  - title: "Regression validation does not create duplicate external IDs or broken opportunity references"
    tags:
      - "regression"
      - "integrity"
    given:
      - "se ejecutan validaciones locales de regresion para los escenarios de IM-558"
    when:
      - "la salida actualizada de la query es revisada"
    then:
      - "no existen duplicate POS external IDs"
      - "los fund assignments siguen referenciando opportunities existentes"
  - title: "KidSTREAM reference case exports the expected historical fund"
    tags:
      - "reference-case"
      - "kidstream"
    given:
      - "el caso de KidSTREAM usa el payment 4C4C3D7E-05B9-4F99-A350-D54DEBCBF3E7"
      - "la salida previa extraia Contributions \\ Unrestricted \\ Giving Tuesday"
    when:
      - "la salida actualizada de la query es revisada"
    then:
      - "el fund extraido corresponde a Contributions \\ Unrestricted \\ Historical"
      - "el fund extraido ya no corresponde a Contributions \\ Unrestricted \\ Giving Tuesday"
tags:
  - "im-558"
  - "altru-queries"
  - "pledge-payments"
  - "fund-assignment"
  - "designation"
  - "kidstream"

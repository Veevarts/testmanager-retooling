schemaVersion: "1.0"
id: "0d309455-fbe3-4420-aac3-123122ba7bad"
key: "TC-12"
title: "Backup server toggle controls start and stop lifecycle from the application"
description: "Cobertura QA de IM-533 para validar que el toggle del backup server permita encender y apagar el servidor desde la aplicacion, refleje el estado real, persista cambios en datos de conexion y maneje errores sin mostrar estados falsos."
type: "integration"
priority: "medium"
status: "active"
format: "gherkin"
preconditions:
  - "El usuario QA tiene acceso a la vista de backups dentro de la aplicacion."
  - "Existe al menos un backup server de prueba visible desde la interfaz."
  - "El usuario QA puede verificar el estado real del backup server despues de las acciones de start y stop."
  - "El usuario QA puede revisar si el hostname u otros datos de conexion cambian despues de un nuevo encendido."
scenarios:
  - title: "Turn on a backup server from the application toggle"
    tags:
      - "happy-path"
      - "turn-on"
    given:
      - "un backup server esta actualmente apagado"
    when:
      - "el usuario activa el toggle desde la aplicacion"
    then:
      - "la aplicacion ejecuta la accion de encendido para ese backup server"
      - "la interfaz muestra el servidor como running despues de completarse la accion"
  - title: "Turn off a running backup server from the application toggle"
    tags:
      - "happy-path"
      - "turn-off"
    given:
      - "un backup server esta actualmente encendido"
    when:
      - "el usuario desactiva el toggle desde la aplicacion"
    then:
      - "la aplicacion ejecuta la accion de apagado para ese backup server"
      - "la interfaz muestra el servidor como stopped despues de completarse la accion"
  - title: "Show a clear error without displaying a false state when start or stop fails"
    tags:
      - "negative"
      - "error-handling"
    given:
      - "la accion de start o stop falla al usar el toggle"
    when:
      - "el usuario intenta cambiar el estado del backup server desde la aplicacion"
    then:
      - "la aplicacion muestra un mensaje de error claro"
      - "la interfaz no refleja un estado falso del backup server"
  - title: "Persist updated runtime connection data after starting the backup server again"
    tags:
      - "persistence"
      - "connection-data"
    given:
      - "el backup server se enciende nuevamente"
      - "el hostname o los datos de conexion del runtime cambian despues del start"
    when:
      - "la accion de encendido finaliza"
    then:
      - "la aplicacion persiste los valores actualizados para operaciones futuras"
  - title: "Load the real backup server state when the backup view is opened or refreshed"
    tags:
      - "refresh"
      - "real-state"
    given:
      - "el usuario abre o refresca la vista de backup"
    when:
      - "la aplicacion carga los datos del backup server"
    then:
      - "el toggle refleja el estado real actual del servidor"
      - "la interfaz no muestra un valor obsoleto"
tags:
  - "im-533"
  - "migration-tool"
  - "backup-server"
  - "toggle"
  - "server-state"
  - "connection-data"

schemaVersion: "1.0"

id: "ca75f2a6-02b7-41cb-84f1-046c793474b8"
key: "TC-70"
title: "IC 3.05 — Setup Timeout for POS & Time Zone (delivery hybrid, automated + manual)"
description: |
  Cobertura QA de IM-922 (3.05 Setup Timeout for POS & Time Zone — deliver
  to Implementations, high-confidence). Junio delivery del Implementation
  Case `ic-3-05-pos-timeout-timezone` v4 (hybrid). Confianza alta por el
  reporte IM-735 (2026-06-12): construido + verificado en CamiloDev,
  cross-test COMPLETED en Tucson.

  Validar que el IC seedeado al catálogo de prod ejecuta los 3 pasos
  automáticos (Enhanced Profile UI off, 12h session timeout, Default Time
  Zone operator-selected) con verificación honesta por read-back, expone el
  4to paso como manual (profile session timeout — sin API disponible) y es
  idempotente entre ejecuciones. Release controlado por seed del catálogo,
  sin feature flags (IM-759).

  QA Sub-task asociada: IM-971
  Riesgos abiertos: AC4 (manual) depende del operador para confirmar y
  cerrar; AC5 (false-green) requiere forzar fallos para validar que la
  verificación realmente reporta failure.

type: functional
priority: high
status: active

preconditions:
  - "Implementation Case `ic-3-05-pos-timeout-timezone` v4 deployado en prod"
  - "Org de prueba con Auctifera + NPSP instalados, accesible vía la runtime de Implementation Cases"
  - "Permisos para modificar UserManagementSettings, SecuritySettings y Organization en la org target"
  - "Acceso al catálogo de prod para seedear el IC (IMPL_CASE# entry)"

format: gherkin
scenarios:
  - title: "Enhanced Profile User Interface is turned off and verified"
    tags:
      - happy-path
      - im-922
      - ac-1
      - automated
    given:
      - "una org donde `UserManagementSettings.enableNewProfileUI` está en true"
    when:
      - "el implementer ejecuta el IC 3.05"
    then:
      - "el paso escribe `UserManagementSettings.enableNewProfileUI = false`"
      - "el paso re-lee el setting y confirma `false` antes de marcar SUCCESS"
      - "en Setup > Users > User Management Settings el checkbox `Enhanced Profile User Interface` aparece desmarcado"

  - title: "Org-wide session timeout is set to 12 hours and verified"
    tags:
      - happy-path
      - im-922
      - ac-2
      - automated
    given:
      - "una org cuyo org-wide session timeout NO es 12 horas"
    when:
      - "el IC 3.05 ejecuta el paso de session timeout"
    then:
      - "`SecuritySettings.sessionSettings.sessionTimeout` queda en 12 horas"
      - "el paso re-lee el setting y confirma el valor antes de marcar SUCCESS"

  - title: "Operator selects an org-discovered time zone and the org Default Time Zone is updated"
    tags:
      - happy-path
      - im-922
      - ac-3
      - automated
      - operator-input
    given:
      - "el IC se ejecuta contra una org cualquiera"
    when:
      - "el paso de time zone se alcanza"
    then:
      - "el run pausa en AWAITING_INPUT y muestra un dropdown con los time zones activos descubiertos en runtime (no hardcoded)"
      - "al seleccionar el time zone del cliente, el paso escribe `Organization.TimeZoneSidKey` con el valor elegido"
      - "el paso re-consulta la org y confirma el `TimeZoneSidKey` antes de marcar SUCCESS"

  - title: "Profile-level session timeout manual confirmation"
    tags:
      - manual
      - im-922
      - ac-4
      - awaiting-handoff
    given:
      - "el org-wide session timeout quedó en 12 horas (AC2 PASS)"
    when:
      - "el IC alcanza el paso manual de profile session timeout"
    then:
      - "el run parquea en AWAITING_HANDOFF con instrucciones para confirmar que el profile del POS hereda 12h o lo tiene seteado explícitamente"
      - "el paso se cierra solo cuando el operador confirma manualmente"
      - "el case documenta que el campo profile-level session timeout no está expuesto por Metadata/Data/Tooling API"

  - title: "Honest verification — failed write reports failure (no false-green)"
    tags:
      - negative
      - im-922
      - ac-5
      - verification
    given:
      - "un paso automatizado del IC 3.05 ha intentado escribir un setting"
    when:
      - "la org no refleja el cambio (e.g. permisos insuficientes, validación de seguridad, write silenciosamente rechazado)"
    then:
      - "el paso reporta failure y NO marca COMPLETED"
      - "el implementer recibe el mensaje de error en el log del run"
      - "el case no avanza al siguiente paso hasta resolver el failure"

  - title: "Idempotent re-run on already-applied org"
    tags:
      - regression
      - im-922
      - ac-6
      - idempotent
    given:
      - "el IC 3.05 ya fue aplicado a la org (Enhanced Profile UI off, timeout 12h, TimeZoneSidKey seteado)"
    when:
      - "el IC se ejecuta nuevamente sobre la misma org"
    then:
      - "cada paso re-aplica el mismo valor y verifica como aplicado (no falla, no produce side effects)"
      - "el run termina COMPLETED sin generar duplicados ni cambios extra"

  - title: "Delivery — catalog seed in prod releases the case"
    tags:
      - delivery
      - im-922
      - ac-7
      - catalog
    given:
      - "el código del IC 3.05 está deployado en prod"
    when:
      - "se seedea `IMPL_CASE#ic-3-05-pos-timeout-timezone` v4 en el catálogo de prod"
    then:
      - "el case aparece disponible para el equipo de Implementations sin feature flag"
      - "una corrida de prueba en prod completa los pasos 1-3 con verificación y deja el paso 4 esperando confirmación manual"

  - title: "Cross-test on Tucson matches the CamiloDev baseline"
    tags:
      - regression-evidence
      - im-922
      - tucson
      - cross-test
    given:
      - "el IC 3.05 v4 fue cross-tested en Tucson (COMPLETED por IM-735 report)"
    when:
      - "QA re-ejecuta el IC en Tucson sandbox o equivalente"
    then:
      - "los 3 pasos automáticos completan con verificación"
      - "el dropdown de time zones se llena con los valores activos de Tucson"
      - "el resultado coincide con el run COMPLETED registrado en el confidence report de IM-735"

  - title: "Evidencia UI — IC 3.05 ejecutado contra una org real (screenshots)"
    tags:
      - functional-ui
      - screenshot-evidence
      - im-922
      - manual
    given:
      - "el IC 3.05 v4 está seedeado en el catálogo del MigrationApp"
      - "el operador tiene acceso a una org de prueba (CamiloDev o Tucson sandbox) con permisos sobre UserManagementSettings, SecuritySettings y Organization"
    when:
      - "el operador entra al MigrationApp, abre el catálogo y lanza el IC 3.05 contra la org seleccionada"
      - "el operador deja correr los 3 pasos automáticos y selecciona un time zone en el dropdown del paso AC3"
      - "el operador confirma manualmente el paso AC4 (profile session timeout) en Salesforce y lo marca done en el MigrationApp"
    then:
      - "captura del catálogo del MigrationApp mostrando `IMPL_CASE#ic-3-05-pos-timeout-timezone` v4 disponible"
      - "captura del run start con la org target seleccionada"
      - "captura post-run de Setup > Users > User Management Settings con `Enhanced Profile User Interface` desmarcado (AC1)"
      - "captura post-run de Setup > Security Controls > Session Settings con `Timeout value = 12 hours` (AC2)"
      - "captura del dropdown AC3 mostrando los time zones org-discovered + captura post-run de Setup > Company Information con `Default Time Zone` seteado al valor elegido (AC3)"
      - "captura del paso AC4 en AWAITING_HANDOFF con la instrucción de confirmación manual + captura del profile POS en Setup mostrando `Session Times Out After`"
      - "captura final del run en COMPLETED con los 4 pasos cerrados y los logs de verificación visibles"


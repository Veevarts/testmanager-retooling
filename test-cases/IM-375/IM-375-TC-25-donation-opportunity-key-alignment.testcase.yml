schemaVersion: "1.0"

id: "3062958a-b03f-4556-8aaf-6a81cea21295"
key: "TC-25"
title: "Donation opportunity keys aligned across 3 queries for refund support"
description: |
  Cobertura QA de IM-375 (PR 102 en MigrationToolETL) bajo el epic IM-70
  Altru Queries. Valida la alineacion del Opportunity key entre 3 queries
  donation: donation_transaction.sql, fund_assignment_donations.sql, y
  fund_assingments_donation_refunds.sql.

  Mecanica del fix (resuelta tras inspeccion side-by-side pre/post):

  - donation_transaction.sql: cambia Implementation_External_ID__c de
    `ta.FinancialTransactionID` a `COALESCE(rgi.RecurringInstallmentID,
    ta.FinancialTransactionID)`. Cardinalidad invariante (1 Opp per FT
    pre y post — el TransactionAgg CTE ya existia). Lo que cambia es el
    VALOR para los 2,087 FTs con recurring installment 1:1 (3.77%).
  - donation_transaction.sql Amount: cambia de `ta.Amount` a
    `COALESCE(rgi.InstallmentAmount, ta.Amount)`. Para recurring FTs,
    Amount viene del schedule (InstallmentAmount) en lugar del sum de
    lines del payment.
  - fund_assignment_donations.sql: agrega CTE RecurringInstallments;
    vnfp__Opportunity__c pasa de `ft.ID` a `COALESCE(rgi, ft.ID)`. Misma
    cardinalidad, mismo cambio de valor para los 2,087 RGI cases.
  - fund_assingments_donation_refunds.sql (EL CAMBIO MAS IMPACTANTE):
    vnfp__Opportunity__c pasa de `source_dli.FINANCIALTRANSACTIONID` (el
    FT que CONTIENE la source line item — tipicamente un Order) a
    `COALESCE(rgi, rli.OriginalPaymentTransactionId)` (el FT del payment
    canonico via CREDITPAYMENT). Cardinalidad invariante; el LINK del
    refund se redirige al Opp correcto.

  Bug real (clarificado): pre-fix los refund fund assignments linkeaban al
  Opportunity creado por el FT de la SOURCE LINE (un Order en la mayoria
  de casos de Altru). El fix los redirige al Opportunity del PAYMENT
  canonico (la FT del original payment, accesible via CREDITPAYMENT).
  Cuando una donacion fluye Order -> Payment -> Refund en Altru, los 3
  FTs son distintos; pre-fix el refund apuntaba al Order Opp (incorrecto
  semanticamente); post-fix apunta al Payment Opp (correcto).

  Anchor del ticket: Order 10356776 o 10022998 en cuenta Muhammad — no
  presente en Tucson snapshot 2026-05-22 (probable otro org del cliente).
  Validacion usa anchor tucsonense del mismo patron.

  Universo Tucson confirmado (snapshot 2026-05-22):
  - Donation Opps pre-fix = post-fix = 55,317 (cardinalidad invariante).
  - Opps con external_id cambiado (RGI adoption): 2,087 (3.77%).
  - Opps unchanged (FT.ID fallback): 53,230 (96.23%).
  - Total donation refund lines: 188.
  - Refund lines donde pre/post Opp keys DIVERGE: 188 (100%).
  - Refund lines donde keys alinean (false coincidence): 0.

  Anchor Tucson seleccionado: refund line 26124232-7DBE (en source Order
  rev-10449528, ft 85CE4CAC) cuyo payment canonico es rev-10449527 (ft
  AC19A145). Pre-fix linkeaba a Order Opp; post-fix linkea a Payment Opp.
  Mismo constituyente, mismo dia, mismo amount $100 — par tipico Altru
  Order+Payment.

  Referencias:
  - PR: https://github.com/Veevarts/MigrationToolETL/pull/102
  - Branch: task/donation-refund-fund-assignments-support-IM-375
  - Issue: https://veevart.atlassian.net/browse/IM-375
  - QA Sub-task: https://veevart.atlassian.net/browse/IM-731
  - Side-by-side pre/post: attachments/tr-040-tc-25/pre-post-diff/

type: integration
priority: medium
status: active

preconditions:
  - "Profile `tucson` en safesql configurado (bastion + keychain)"
  - "Permisos SELECT sobre FINANCIALTRANSACTION, FINANCIALTRANSACTIONLINEITEM, REVENUESPLIT_EXT, RECURRINGGIFTINSTALLMENT, RECURRINGGIFTINSTALLMENTPAYMENT, CREDITPAYMENT en Tucson"
  - "Branch `task/donation-refund-fund-assignments-support-IM-375` checkeada para referencia del derivador"
  - "sf CLI auth contra veevartd (tucsonbotanical--trainings.sandbox.my.salesforce.com) para Scenario 4 funcional"
  - "Bulk API 2.0 enabled en sandbox; Opportunity con vnfp__Implementation_External_ID__c como external ID; Auctifera__Fund_Donation_Assignment__c createable"

format: gherkin
scenarios:
  - title: "Cardinalidad invariante: donation_transaction.sql emite el mismo numero de Opps pre/post"
    tags:
      - data-review
      - cardinality-invariance
      - behavioral-diff
      - tucson
    given:
      - "el TransactionAgg CTE ya existia pre-fix con GROUP BY el.FinancialTransactionID — pre-fix YA emitia 1 row per donation-eligible FT (no per line item)"
      - "post-fix conserva el mismo TransactionAgg + el mismo FROM final — la unica diferencia es la EXPRESION emitida para Implementation_External_ID__c (de ta.FT.ID a COALESCE(rgi, ta.FT.ID))"
    when:
      - "QA cuenta donation-eligible FTs distintos en Tucson aplicando los filtros exactos del query patched (TYPECODE NOT IN 1/2/20; line type Standard/Reversal; APPLICATION en Donation/Recurring/Planned/Matching)"
    then:
      - "prefix_donation_opp_count = postfix_donation_opp_count = 55,317 — la cardinalidad NO cambia con el fix"
      - "el cambio del PR es de VALOR (RGI cuando exista) no de CARDINALIDAD; mi narrativa anterior de 'colapso 58,488 a 55,317' fue incorrecta — 58,488 son line items elegibles, no Opportunities"
      - "opps_with_changed_external_id = 2,087 (3.77%) — son los FTs con recurring installment 1:1 que ahora se identifican por RGI.ID en vez de FT.ID"

  - title: "Refund Opp link redirige: pre-fix source_dli.FT.ID a post-fix rli.OriginalPaymentTransactionId"
    tags:
      - data-review
      - refund-relink
      - behavioral-diff
      - core-bug
    given:
      - "el PR cambia fund_assingments_donation_refunds.sql vnfp__Opportunity__c desde `source_dli.FINANCIALTRANSACTIONID` (FT que contiene la source line item refundeada — tipicamente un Order) a `COALESCE(rgi, rli.OriginalPaymentTransactionId)` (FT del payment canonico via CREDITPAYMENT)"
      - "el patron Altru tipico es Order FT -> Payment FT -> Refund FT; los 3 son FTs distintos linkeados via CREDITPAYMENT.REVENUEID = payment FT.ID y CREDITPAYMENT.CREDITID = refund FT.ID"
    when:
      - "QA computa ambos candidatos de Opp key (pre-fix source_dli.FT.ID y post-fix rli.OriginalPaymentTransactionId) para cada donation refund line en Tucson y mide divergencia"
    then:
      - "total_donation_refund_lines = 188 — el universo de refund lines elegible para donation"
      - "keys_diverge_prefix_neq_postfix = 188 (100%) — TODOS los refund lines tienen Opp keys distintos pre vs post"
      - "keys_align_prefix_eq_postfix = 0 — no hay coincidencias falsas (caso degenerado Order=Payment seria 0; en Altru siempre son FTs separados)"
      - "no_credit_payment_link = 0 — los 188 refunds tienen un CREDITPAYMENT que los apunta al payment original (el camino post-fix es siempre alcanzable)"
      - "conclusion: el fix re-linka el 100% de los donation refunds del universo Tucson; sin el fix, los 188 refunds en Salesforce apuntarian al Opportunity equivocado"

  - title: "RGI adoption en donation Opps: 2,087 FTs cambian external_id de FT.ID a RGI.ID"
    tags:
      - data-review
      - rgi-adoption
      - external-id-change
    given:
      - "el COALESCE prefiere RecurringInstallmentID cuando InstallmentByPayment lo materializa (COUNT(DISTINCT rgi.ID)=1 per payment)"
      - "para los 2,087 FTs en este bucket, el Salesforce Opportunity external_id cambia de FT.ID a RGI.ID — Implementation_External_ID__c cambia en el output CSV"
    when:
      - "QA particiona el universo donation-eligible Tucson aplicando InstallmentByPayment y comparando casos con RGI vs sin RGI"
    then:
      - "opps_now_keyed_by_rgi = 2,087 (3.77%) — recurring gift installments con mapping 1:1 al payment"
      - "opps_keyed_by_ft_unchanged = 53,230 (96.23%) — donations standard sin RGI; comportamiento idempotente con pre-fix (FT.ID fallback)"
      - "suma 2,087 + 53,230 = 55,317 = donation-eligible FT total — particion exacta"
      - "cross-query alignment: las 3 queries (donation_transaction, fund_assignment_donations, fund_assingments_donation_refunds) usan el MISMO formula y la MISMA InstallmentByPayment CTE; cualquier vnfp__Opportunity__c emitido por fund assignments o refunds es un Implementation_External_ID__c valido de donation_transaction por construccion"

  - title: "Functional upsert: refund FDA attached al Payment Opp post-fix, no al Order Opp (sandbox veevartd)"
    tags:
      - functional
      - sandbox-upsert
      - visual-evidence
      - veevartd
      - refund-relink
    given:
      - "anchor seleccionado: par tipico Altru Order+Payment+Refund en Tucson. Order rev-10449528 (ft 85CE4CAC, $100, 2023-12-31) + Payment rev-10449527 (ft AC19A145, $100, 2023-12-31, mismo constituyente). Refund line 26124232 (source line F82834FF en Order rev-10449528, payment rev-10449527 via CREDITPAYMENT, $100)"
      - "pre-fix: refund FDA tendria vnfp__Opportunity__c = source_dli.FT.ID = ft 85CE4CAC (Order Opp rev-10449528) — INCORRECTO semanticamente porque el refund aplica al payment, no al order"
      - "post-fix: refund FDA tiene vnfp__Opportunity__c = rli.OriginalPaymentTransactionId = ft AC19A145 (Payment Opp rev-10449527) — CORRECTO"
    when:
      - "QA upserta ambos Opportunities al sandbox veevartd via Bulk API 2.0 (Order Opp + Payment Opp)"
      - "QA inserta 1 FDA Sold por cada Opp ($100 cada uno, Status='Sold', Action_Type=null) representando el donation original que cada FT genero"
      - "QA inserta 1 FDA Refunded ($100, Action_Type='Refunded', Status='Refunded') linkeado SOLO al Payment Opp (post-fix correct attachment)"
      - "QA abre ambas Opportunities en la UI Lightning para comparar Fund Donation Assignments related lists"
    then:
      - "ambas Opps son creadas en sandbox con Stage='Closed Won', Amount=$100, mismo constituyente, mismo dia — par Altru Order+Payment tipico"
      - "Order Opp (rev-10449528) tiene 1 FDA Sold ($100) en su related list, NO tiene FDA Refunded — esto refleja el comportamiento post-fix correcto (el refund NO debe atribuirse al order)"
      - "Payment Opp (rev-10449527) tiene 2 FDAs: 1 Sold ($100) + 1 Refunded ($100, Action_Type='Refunded') — refund correctamente attachable al payment via la post-fix link"
      - "comparacion visual: abrir las 2 URLs lado a lado prueba que el fix re-direccionia el refund FDA del Order Opp (donde pre-fix lo ponia) al Payment Opp (donde post-fix lo pone, correcto)"
      - "reconciliacion contable: el Payment Opp ahora muestra Amount $100 con $100 Refunded = $0 net (refund completo), accionable desde reportes; pre-fix la atribucion incorrecta al Order distorsionaba balances"


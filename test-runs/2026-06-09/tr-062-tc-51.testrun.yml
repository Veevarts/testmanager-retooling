        actual: |
          HALLAZGO DE DISEÑO (no defect): la skill arrancó con un router SOURCE-FIRST de 3 pasos (Source/Customer → Mode → Submit), NO con el "4-mode router" (Continue/Start/Discovery/Audit) que vimos en una invocación anterior. La skill detecta safesql profiles instalados localmente y los ofrece como entry points contextuales. Las 4 opciones presentadas fueron:
          1. Tucson (Altru) — safesql profile `tucson`, target sandbox `veevartd` (admin.veevart@tucsonbotanical.org.trainings). Most-used.
          2. Illinois (Altru) — safesql profile `illinois_2`, target `illinois-trainings` (adminveevart@ilhmec.org.trainings).
          3. Aspen (Altru) — safesql profile `aspen`. No matching target connected yet.
          4. Maloof (eTapestry) — IM-874 QA work, routes to `sources/etapestry.md`, no safesql (CSV export package).
          Plus opción 5 "Type something" para entrada libre. Esto es UX SUPERIOR — context-aware shortcuts en lugar de menú abstracto.
        phase: then
        text: "el menú contiene exactamente estas 4 opciones: (1) Continue <cliente in-flight si aplica>, (2) Start a new migration, (3) Discovery / mapping only, (4) Audit / report existing"

    notes: |
      PASS con hallazgo de diseño positivo: la skill implementa un router CONTEXT-AWARE source-first. Detecta safesql profiles locales y mapea cada source a su target org real. Identifica correctamente Maloof como eTapestry/IM-874 sin confundirlo con Altru.

      Diferencia respecto a TC-51 v3:
      - TC-51 v3 describe router como "4 modos abstractos" (Continue/Start/Discovery/Audit) seguido por intake de 4 pasos (Source/Scope/Access/Submit)
      - Implementación real: router source-first con 4 customers + opción libre, seguido por intake de 3 pasos (Source/Customer → Mode → Submit)


  -> Evidence: attachments/tr-049-tc-31/behavioral-output/ac1-dry-run-with-dupes.txt
  -> Status: PASS.

  AC2 "Multi-month range -> one API call per month/batch, never multi-month"
  -> PR lines: generateMonthlyPeriods() linea 152 deriva 1 periodo por mes.
     planWorkItems() linea 257 crea 1 work item por (period, batch).
     buildManualRunRequest() linea 325 emite payload con un solo periodStart
     y periodEnd (no range multi-mes).
  -> Coverage: Scenario 2 step 2 (behavioral).
  -> Evidence: dry-run output muestra '3 periods (2026-05 -> 2026-03,
     newest-first)' con 3 monthly periods separados.
  -> Status: PASS.

  AC3 "Throttle settings respected: batch size, max in-flight, delay"
  -> PR lines: --org-batch-size default 10, --delay-between-runs default
     5_000ms, --poll-interval-ms default 30_000ms. Sequential by default
     (max in-flight = 1). executeWorkItems() linea 434.
  -> Coverage: Scenario 3 (unit tests cubren sequential wait behavior).
  -> Status: PASS por unit test.

  AC4 "Successful API response -> records period, batch, executionArn,
       status en progress file"
  -> PR lines: progressRecordFromWorkItem() linea 312. writeProgress()
     linea 291. upsertProgressRecord() linea 305.
  -> Coverage: Scenario 3 (unit test 'builds manual-runs request...').
  -> Status: PASS por unit test.

  AC5 "Resume file con completed batches -> skip completed, continue
       pending/failed"
  -> PR lines: isSucceededRecord() linea 301. resume filter en
     executeWorkItems() (skip si progressMap[id] es SUCCEEDED).
  -> Coverage: Scenario 3 (unit test 'skips succeeded resume records and
     executes pending records only').
  -> Status: PASS por unit test.
  -> Observacion: el dry-run NO visualiza el skip count. Mejorar UX en
     follow-up.

  AC6 "API key never printed/persisted; env var only"
  -> PR lines: normalizeConfig() linea 68 rechaza --api-key/--x-api-key/
     --manual-extraction-api-key con error explicito. progress JSON nunca
     guarda el secret.
  -> Coverage: Scenario 2 step 3 (behavioral ejecutado local).
  -> Evidence: attachments/tr-049-tc-31/behavioral-output/ac6-no-api-key-leak.txt
  -> Status: PASS.

  AC7 "Invalid period args -> fail-fast con error claro BEFORE API call"
  -> PR lines: normalizeConfig() valida start/end/order/source antes de
     resolveOrgIds + buildPlan. parseIsoDateOnly() linea 130 valida
     formato ISO.
  -> Coverage: Scenario 2 step 2 (behavioral con 5 invalid-arg cases).
  -> Evidence: attachments/tr-049-tc-31/behavioral-output/ac7-invalid-args.txt
  -> Status: PASS.


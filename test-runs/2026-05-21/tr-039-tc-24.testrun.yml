  - testCaseId: 24e73b7a-2373-4b9e-b202-0ce2fbb992ba
    testCaseKey: TC-24
    testCaseTitle: Altru in-kind gift transactions emit the IN_KIND_GIFT Opportunity record type
    testCaseFilePath: test-cases/IM-767/IM-767-TC-24-altru-in-kind-gift-record-type.testcase.yml
    scenarioTitle: "Row-grain invariance: multi-line in-kind FTs emiten 1 row via CTE DISTINCT + MAX"
    scenarioIndex: 2
    status: passed
    executedAt: "2026-05-21T17:10:48.000Z"
    stepResults:
      - order: 1
        status: passed
        actual: >-
          Riesgo identificado en el diseno del PR (design.md): 'Incorrect row grain could duplicate donation
          Opportunities'. El CSV ya tiene contrato 1 row per FT; si el CTE multiplicara rows por line in-kind, romperia
          el invariant downstream.
        phase: given
        text: >-
          el riesgo principal del PR es que el CTE GiftInKindTransactions multiplique rows si una FT tiene multiples
          lines y el join no agrega correctamente
        attachments: []
      - order: 2
        status: passed
        actual: >-
          Mitigacion explicita en el PR (proposal + design): 'The in-kind signal is deduped before EligibleLines and
          aggregated with MAX(...) in TransactionAgg'. Codigo: GiftInKindTransactions usa SELECT DISTINCT REVENUEID;
          TransactionAgg usa MAX(el.HasGiftInKindPaymentDetail). Cualquier multi-line FT con al menos una line in-kind
          queda flaggeada con flag=1 en exactamente 1 row de salida.
        phase: given
        text: >-
          el PR mitiga via DISTINCT en GiftInKindTransactions + MAX(el.HasGiftInKindPaymentDetail) en TransactionAgg —
          un FT con cualquier line in-kind queda flaggeada con 1 row, no N rows
        attachments: []
      - order: 3
        status: passed
        actual: >-
          Ejecutado: R7 del query con CTE InKindFTLineCounts que cuenta lineas eligibles bajo cada in-kind FT. Permite
          identificar multi-line cases y medir el potencial multiplicador si el CTE no agregara correctamente.
        phase: when
        text: >-
          QA cuenta lineas eligibles bajo cada in-kind FT para detectar multi-line cases y verifica que la agregacion no
          expande el output
        attachments: []
      - order: 4
        status: passed
        actual: >-
          Observado en R7: in_kind_fts_with_eligible_lines=1,539 (match R4);
          total_eligible_lines_under_in_kind_fts=1,550. Delta 1,550-1,539=11 lineas adicionales en los multi-line FTs.
        phase: then
        text: 1,539 in-kind FTs cubren 1,550 eligible lines totales (delta de 11 lineas extras en multi-line FTs)
        attachments: []
      - order: 5
        status: passed
        actual: >-
          Observado en R7: single_line_fts=1,533. Estos no tienen riesgo de multiplicacion (1 line -> 1 row natural).
          Cubren el 99.6% de los in-kind FTs (1,533/1,539).
        phase: then
        text: 1,533 son single-line FTs (1 line == 1 row, no riesgo)
        attachments: []
      - order: 6
        status: passed
        actual: >-
          Observado en R7: multi_line_fts=6, max_lines_per_ft=6. Hay 6 in-kind FTs con multiples eligible lines, el peor
          caso con 6 lineas. Si el CTE no agregara, esos 6 FTs producirian hasta 36 rows en lugar de 6 — un 6x balloon.
          La mitigacion DISTINCT+MAX previene esto explicitamente.
        phase: then
        text: 6 son multi-line FTs (2-6 lines cada uno; max 6 lines/FT)
        attachments: []
      - order: 7
        status: passed
        actual: >-
          Calculo de impacto sin mitigacion: 1,533 single * 1 line + 1,550 lines total = 1,533 single + (1,550 - 1,533)
          = 1,533 + 17 lines de los 6 multi-line FTs. Si el output fuera line-grain, serian 1,533 + 17 = 1,550 rows. Con
          el CTE DISTINCT + MAX, son 1,533 + 6 = 1,539 rows (FT-grain). Diferencia +11 rows extras que se evitan = lo
          que confirma el R7 delta.
        phase: then
        text: >-
          si el CTE NO usara DISTINCT + MAX, el output del CASE multiplicaria a 1,550 in-kind rows en lugar de 1,539 —
          el CTE GARANTIZA 1 row por FT por construccion (DISTINCT + agregacion a nivel FT)
        attachments: []
      - order: 8
        status: passed
        actual: >-
          El donation_transaction.sql pre-fix emitia 55,317 rows (1 per donation-eligible FT). El PR 112 patched emite
          los mismos 55,317 rows pero con RecordTypeId discriminado (1,539 in-kind / 53,778 standard). Row count
          IDENTICO pre/post — el cambio es de columna, no de cardinalidad. POS purchase / opportunity linkage invariants
          downstream NO afectados.
        phase: then
        text: >-
          row grain del output donation_transaction = N FTs (no N lines), igual pre/post-fix; el cambio del PR no
          introduce duplicacion
        attachments: []
    notes: |
      Row grain invariance probada estructural y empiricamente:
        - Estructural: SELECT DISTINCT en GiftInKindTransactions + MAX
          en TransactionAgg garantizan 1 flag value por FT.
        - Empirico: 1,550 lines vs 1,539 FTs en Tucson; sin agregacion
          habria balloon a 1,550 rows; con agregacion son 1,539 (+11 lines
          extras absorbidas).

      El acceptance criterion del ticket "no duplicate Opportunity external
      IDs or break existing POS purchase / opportunity linkage invariants"
      queda cubierto por construccion: el row grain del output donation
      transaction sigue siendo N FTs, identico pre/post-fix.
    attachments: []
    defects: []

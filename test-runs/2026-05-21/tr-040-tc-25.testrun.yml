        text: "QA particiona el universo donation-eligible Tucson segun cual rama del COALESCE se aplica"
        attachments: []
      - order: 4
        status: passed
        actual: "Observado en R2: keys_from_recurring_installment=2,087. Son los FTs donde InstallmentByPayment encontro exactamente 1 RGI asociado al PAYMENTID. Representan recurring gift installments: el donor configuro un gift recurrente y este payment es 1 de los N installments del schedule."
        phase: then
        text: "2,087 FTs (3.77%) usan RecurringInstallmentID como key — son los recurring gift installments con 1:1 mapping a su payment"
        attachments: []

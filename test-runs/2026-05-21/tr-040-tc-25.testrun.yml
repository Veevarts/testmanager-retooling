scopeFit: |
  Scope-fit mapping (strict review flow): cada acceptance criterion del ticket
  IM-375 mapeado a las lineas del PR 102 que lo implementan y a la evidencia QA
  que lo cubre.

  AC1: "Each payment/recurring installment produces only one Opportunity record,
       regardless of how many donation line items it has."
  -> PR lines: donation_transaction.sql lineas 109-122 (TransactionAgg CTE con
     GROUP BY el.FinancialTransactionID — YA EXISTIA pre-fix). Lines 124-130
     (Implementation_External_ID__c con COALESCE).
  -> Coverage: este AC ya estaba satisfecho pre-fix. El PR solo cambia el
     VALOR del external_id para 2,087 RGI cases (Scenario 3).
  -> Evidence: Scenario 1 (cardinality invariance 55,317 = 55,317).

  AC2: "Opportunity Amount equals the sum of its underlying donation line items
       (or installment amount when applicable)."
  -> PR lines: donation_transaction.sql linea 167
     (COALESCE(rgi.InstallmentAmount, ta.Amount)).
  -> Coverage: Amount cambia para los 2,087 RGI FTs — usa InstallmentAmount
     scheduled en vez de SUM(lines).
  -> Evidence: Scenario 3 + behavioral diff B4 (2,087 RGI adoption).
  -> Gap: no validamos empiricamente que InstallmentAmount == SUM(lines) en
     casos felices; potencial regression si schedule != actual (e.g. partial
     payments). Documented as open risk.

  AC3: "All fund-assignment and refund outputs reference the new Opportunity
       key; no outputs use line-item IDs as Opportunity IDs."
  -> PR lines: fund_assignment_donations.sql lineas 18-29 (new RecurringInstallments
     CTE) + 124-127 (COALESCE en vnfp__Opportunity__c) + 137-138 (LEFT JOIN).
     fund_assingments_donation_refunds.sql lineas 29-40 (CTE) + 84-87
     (COALESCE) + 101-102 (LEFT JOIN). El cambio criticO en refunds:
     source_dli.FT.ID -> rli.OriginalPaymentTransactionId.
  -> Coverage: Scenario 2 (refund re-link 100% divergence) + Scenario 3 (RGI
     adoption) + Scenario 4 (functional refund attached al Payment Opp).
  -> Evidence: behavioral diff B2 + B3 + B5 + functional Scenario 4.

  AC4: "No regression for single-line payments; outputs remain unchanged in
       count and values."
  -> PR lines: el COALESCE fallback preserva FT.ID para non-RGI FTs (96.23%
     del universo). Para non-recurring single-line, el output es identico al
     pre-fix.
  -> Coverage: Scenario 1 (cardinality invariance) + Scenario 3 (53,230 FTs
     unchanged).
  -> Evidence: behavioral diff B1 + B4.
  -> Gap: no comparamos byte-by-byte el CSV output pre/post para FTs sin RGI;
     confianza basada en formula symmetric (COALESCE(NULL, X) = X). Riesgo
     residual bajo.

  AC5: "Query regression suite proves new mapping does not create duplicate
       Opportunity external IDs or break existing POS purchase / opportunity
       linkage invariants."
  -> PR lines: query-regression/donation-opportunity-query.spec.ts (+28 lines),
     fund-assignment-donation-refunds-query-fixture.ts (+140), .integration.spec.ts
     (+251), .spec.ts (+34), fund-assignment-donations-query.spec.ts (+6/-6),
     query-chain.integration.spec.ts (+22/-9), query-chain.live.spec.ts (+2/-2).
  -> Coverage: NO ejecutado en este QA (responsabilidad del PR review code-side,
     no del data review). PR menciona "npm test -- --runInBand query-regression
     passed; 13 suites passed".
  -> Evidence: PR body confirmation. Out of scope para este TR (data review).

touchRadius: |
  Touch radius check (strict review flow): archivos modificados por PR 102 + archivos
  no modificados pero que consumen los mismos outputs.

  Modificados (validados por este QA o regression tests del PR):
  - src/data-migration/infrastructure/destination/sql-server/queries/
    - opportunity-donation/donation_transaction.sql (+5/-2)
    - fund-assignment/fund_assignment_donations.sql (+18/-1)
    - fund-assignment/fund_assingments_donation_refunds.sql (+18/-1)
  - src/data-migration/infrastructure/destination/sql-server/query-regression/
    - donation-opportunity-query.spec.ts (+28)
    - fund-assignment-donation-refunds-query-fixture.ts (+140 nuevo)
    - fund-assignment-donation-refunds-query.integration.spec.ts (+251 nuevo)
    - fund-assignment-donation-refunds-query.spec.ts (+34 nuevo)
    - fund-assignment-donations-query.spec.ts (+6/-6)
    - query-chain.integration.spec.ts (+22/-9)
    - query-chain.live.spec.ts (+2/-2)
  - docs/altru-model-context.md (+3/-2)
  - README.md (+1/-0)

  No modificados pero potencialmente afectados (consumen outputs de las 3
  queries modificadas):
  - opportunity-donation/donation_pledges.sql — Pledge opportunities. NO toca
    el RGI key (pledges no son installments), pero PR menciona "pledge in-kind
    behavior remains out of scope" (referencia a IM-767, no este PR). Sin
    cambio en este PR; consumers downstream verifican via query-chain tests.
  - fund-assignment/fund_assignment_pledges.sql — Pledge fund assignments. No
    consume directamente los donation Opp keys (pledges tienen su propio key
    space). Sin cambio en este PR.
  - membership-related queries (membership_transactions.sql, fund_assignment_
    memberships.sql) — distinto universo (filtros Application=Membership);
    sin interseccion con el cambio.
  - query-chain.integration.spec.ts modifico filtros para "scope donation fund
    assignments by POS purchase instead of raw transaction id assumptions" — el
    PR es consciente del touch radius cross-query y lo defiende con tests.

  Riesgos detectados en el touch radius:
  - Si un downstream consumer de Salesforce (Apex trigger, flow, formula field)
    esperaba que vnfp__Opportunity__c en fund_assignments siempre fuera FT.ID
    en formato GUID, podria romperse cuando reciba RGI.ID (formato distinto?
    ambos son GUIDs en Altru, asi que estructuralmente compatibles). Riesgo
    bajo pero no validado en este QA — requiere review del trigger code en
    el target Salesforce org.
  - Si un report en Salesforce sumaba refund FDAs por Opportunity, el delta
    post-fix puede mover refunds entre Opportunities (de Order Opps a Payment
    Opps). Esto es exactamente lo que el PR pretende corregir; los numeros
    cambian por design, no por regression.

  Conclusion: touch radius bien delimitado por el PR. Tests automatizados
  cubren el critical path interno; este QA cubre el data-side validation
  contra Tucson + funcional sandbox.


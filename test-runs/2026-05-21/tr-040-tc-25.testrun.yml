    stepResults:
      - order: 1
        status: passed
        actual: "Logica del COALESCE confirmada en el diff: COALESCE(CAST(rgi.RecurringInstallmentID AS VARCHAR(36)), CAST(ta.FinancialTransactionID AS VARCHAR(36))) AS Implementation_External_ID__c. Cuando RGI esta presente toma RGI; sino toma FT."
        phase: given
        text: "el derivador COALESCE prefiere RecurringInstallmentID cuando exista (caso recurring gift); cae a FT.ID en el resto"
        attachments: []
      - order: 2
        status: passed
        actual: "InstallmentByPayment CTE (compartida entre las 3 queries del PR): SELECT rgp.PAYMENTID, CASE WHEN COUNT(DISTINCT rgi.ID)=1 THEN MIN(rgi.ID) ELSE NULL END AS RecurringInstallmentID FROM RECURRINGGIFTINSTALLMENT rgi LEFT JOIN RECURRINGGIFTINSTALLMENTPAYMENT rgp ON rgi.ID = rgp.RECURRINGGIFTINSTALLMENTID GROUP BY rgp.PAYMENTID. Si un payment cubre multiples RGIs distintos, el key cae a NULL y el COALESCE usa FT.ID. Eso evita ambiguedad."
        phase: given
        text: "RecurringInstallmentID se materializa desde RECURRINGGIFTINSTALLMENT joineado via RECURRINGGIFTINSTALLMENTPAYMENT, solo cuando COUNT(DISTINCT rgi.ID)=1 por payment (NULL si comparten)"
        attachments: []
      - order: 3
        status: passed
        actual: "Ejecutado en R2 del query: particiona el universo donation-eligible Tucson aplicando InstallmentByPayment al FT y contando keys con rgi.RecurringInstallmentID IS NOT NULL vs IS NULL."

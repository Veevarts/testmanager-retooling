        actual: "Prueba estructural cross-query: en los 3 queries del PR el derivador es BYTE-IDENTICAL: COALESCE(CAST(rgi.RecurringInstallmentID AS VARCHAR(36)), CAST(<FT.ID|OriginalPaymentTransactionId> AS VARCHAR(36))). InstallmentByPayment CTE es la misma definicion en cada uno. Por construccion: cualquier vnfp__Opportunity__c emitido por fund_assignment_donations.sql o fund_assingments_donation_refunds.sql es un Opp key valido del donation_transaction.sql universe (post-fix). No hay orphans posibles (R5 query empirica timed-out a 2min en Tucson por scale, pero la prueba estructural es suficiente: 3 formulas identicas sobre las mismas tablas y filtros producen el mismo key set)."
        phase: then
        text: "cross-query alignment por construccion: las 3 queries (donation_transaction.sql, fund_assignment_donations.sql, fund_assingments_donation_refunds.sql) usan el MISMO COALESCE byte-identical sobre los mismos joins, asi que sus key sets coinciden y la referential integrity esta garantizada estructuralmente"
        attachments: []
    notes: |
      El 96.23% del universo donation-eligible usa el fallback FT.ID,

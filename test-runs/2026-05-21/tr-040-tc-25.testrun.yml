        status: passed
        actual: "Observado en R2: keys_from_financial_transaction=53,230. Bucket grande que incluye: (a) donations standard no-recurring; (b) FTs donde InstallmentByPayment devolvio NULL (multi-RGI sharing); (c) FTs sin row en RECURRINGGIFTINSTALLMENTPAYMENT. Para todos estos, el COALESCE cae al fallback FT.ID — comportamiento idempotente con pre-fix para single-line FTs."
        phase: then
        text: "53,230 FTs (96.23%) usan FinancialTransactionID como key — incluye donations regulares, payments multi-installment-shared, y casos sin RGI"
        attachments: []
      - order: 6
        status: passed
        actual: "Suma: 2,087 + 53,230 = 55,317 = distinct_ft_total. Particion exacta: cada FT cae en EXACTAMENTE una rama del COALESCE (mutuamente exclusivas via LEFT JOIN + IS NULL check). No hay FT en ambas ramas ni FT sin rama."
        phase: then
        text: "suma: 2,087 + 53,230 = 55,317 = donation-eligible FT total — particion exacta sin gaps ni overlap"
        attachments: []
      - order: 7

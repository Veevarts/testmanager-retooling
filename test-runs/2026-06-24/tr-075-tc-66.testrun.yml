    notes: >-
      DEFECT MEDIUM — matcher false-match con stop-words. Prompt runtime "Create a report for membership renewal risk"
      matcheó answer-only-analytics (score 6) en vez de report-planning-and-creation. Root cause:
      VeevartMCPGuidanceMatcher hace substring matching naïve — el matchTerm "create report" no se encuentra dentro de
      "create a report" porque hay una "a" en medio. 3 variantes naturales del lenguaje rompen el matcher: "Create a
      report...", "Build a report...", "Create the report...". NO bloquea ship (safety gates siguen protegiendo writes),
      pero degrada UX (Claude entra a loop de search en vez de planear el reporte). Opciones de fix: (A) expandir
      matchTerms con variantes incluyendo stop-words, (B) tokenizar el matcher para ignorar a/the/an. Defect documentado
      en comment al PR Veevarts/VeevartMCPContext#9.
    attachments: []
    defects: []

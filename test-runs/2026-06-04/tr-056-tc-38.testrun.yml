scopeFit: |
  Scope-fit del PR 122 vs los AC del IM-812:

  AC 1 - "CSV con 7,314 IDs Illinois Rental Resource -> todos con
         Auctifera__Resource__c no vacio tras el fix"
  -> PR lines: rental_resource.sql linea 30-35 extiende COALESCE para
     TYPECODE 8/9/10/11 agregando `iisr.VOLUNTEERTYPEID` como 4a rama.
     Linea 136 agrega `LEFT JOIN ITINERARYITEMSTAFFRESOURCE iisr
     ON iisr.ID = soiistaff.ITINERARYITEMSTAFFRESOURCEID`. Sin esa
     tabla joineada, `iisr.VOLUNTEERTYPEID` no existe.
  -> Coverage: Scenario 1 (scope-fit) + Scenario 2 (source agg) +
     Scenario 6 (functional UI).
  -> Status: PASS por scope-fit. Scenario 2 BLOCKED (bastion DNS).
     Scenario 6 NOT-RUN (post-load pending).

  AC 2 - "Valor generado para `Auctifera__Resource__c` es un
         `VOLUNTEERTYPE.ID` emitido por resource_service.sql"
  -> PR lines: la 4a rama del COALESCE proyecta `iisr.VOLUNTEERTYPEID`.
     `resource_service.sql` (no tocado por el PR) ya emite filas con
     External_ID__c = VOLUNTEERTYPE.ID en su rama VOLUNTEERTYPE. PR
     asume estabilidad de resource_service.sql.
  -> Coverage: Scenario 3 (set-difference vs resource_service.sql).
  -> Status: PASS por declaracion del PR (SHA c6442be9efd3). Scenario 3
     BLOCKED (bastion DNS).

  AC 3 - "Row count y external ID grain quedan iguales tras el fix"
  -> PR lines: el cambio es agregar UN LEFT JOIN; no toca la lista
     SELECT, no toca el filtro WHERE, no toca AggregatedTicketRentalResources.
     Si ITINERARYITEMSTAFFRESOURCE.ID es PK (esperado), el LEFT JOIN
     produce 0 o 1 fila por link, no multiplica.
  -> Coverage: Scenario 1 (scope-fit) + Scenario 4 (grain check).
  -> Status: PASS por scope-fit. Scenario 4 BLOCKED (bastion DNS).

  AC 4 - "Audit por TYPECODE (7, 8, 9, 10, 11) -> facility tiene
         location, resource-backed tiene resource, sin huecos"
  -> PR lines: solo TYPECODE 11 se afecta por el fix; los demas
     TYPECODE quedan exactamente igual.
  -> Coverage: Scenario 5 (audit por TYPECODE).
  -> Status: PASS por scope-fit. Scenario 5 BLOCKED (bastion DNS).


scopeFit: |
  Scope-fit del PR 123 vs los AC implicitos de IM-811:

  AC 1 - "El refund de Lookup ID 31830 (-$64, 2017-06-22) debe
         migrarse a Salesforce"
  -> PR lines: fund_assignments_membership_refunds.sql elimina
     `AND COALESCE(membership_so.ID, addon_so.ID, original_so.ID,
                   payment_so.ID, refund_so.ID) IS NOT NULL`
     del WHERE. Conserva el COALESCE en el SELECT (linea 141) para
     poblar vnfp__Opportunity_POS_Purchase__c cuando exista SO.
  -> Coverage: Scenario 1 (scope-fit) + Scenario 2 (source agg) +
     Scenario 3 (detail) + Scenario 6 (functional UI post-load).
  -> Status: PASS por scope-fit y por source aggregate (-$64 en
     fila 1 confirmado en illinois_2). Scenario 6 NOT-RUN (post-load
     pending).

  AC 2 - "No alterar refunds membership SO-backed pre-existentes"
  -> PR lines: el COALESCE de SO en el SELECT queda intacto. La
     resolucion de oportunidad (rgi/mt/ma/direct/order/cimf) sigue
     igual. Solo se elimina la condicion de inclusion `IS NOT NULL`.
  -> Coverage: Scenario 2 (pre_fix_rows_so_backed = 6 / -$380 sin
     cambio) + Scenario 4 (gates IM-561/IM-562 vigentes).
  -> Status: PASS.

  AC 3 - "Recuperar todos los refunds de membresia non-POS en el
         rango 2017-2019"
  -> PR lines: el filtro `BETWEEN '2017-01-01' AND '2019-12-31'`
     en la query agregada confirma 2 filas con SO=null. Ambas
     resuelven via la rama cimf (CreditItemMembershipFallback).
  -> Coverage: Scenario 2 + Scenario 3.
  -> Status: PASS.

  AC 4 - "Garantizar que el cambio no abre la puerta a falsos
         positivos (ticket refunds, orphans)"
  -> PR lines: las lineas 209-215 (gate IM-562 line-level evidence)
     no se tocan. La linea 185 (opportunity-resolution gate)
     tampoco. El spec estatico flipea 1 sola assertion; los otros
     15 tests + la suite integration siguen verdes (declarado por
     el PR; no se reejecuta localmente — Docker MSSQL fuera del
     scope de esta corrida QA).
  -> Coverage: Scenario 4.
  -> Status: PASS por scope-fit + declaracion del PR.


    boundary tests + eligibility tests.
  - AC1 (widget loads sin redirect), AC5 (CORS), AC6 (no admin cookie cross-origin), AC7
    (NFPFundraising cross-test) requieren runtime/deployed env — BLOCKED.

  ## Security regression
  Sin diff sospechoso. npm audit pre-existente.


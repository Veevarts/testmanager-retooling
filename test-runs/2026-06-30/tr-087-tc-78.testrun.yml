     parametrizado (necesario para test isolation). db/path.ts + db/runMigrations.ts encapsulan
     la lógica.
  2) Añade tests a apiBoundary.test.ts que LOCKAN el contrato "public widget stays open":
     active-only filter, response submission con admin cookie, inactive lookup admin-only.

  ## Coverage
  - 39/39 server tests PASS.

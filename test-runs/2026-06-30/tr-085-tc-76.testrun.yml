notes: |
  ## Classification
  Backend pipeline (Express + Node 22, TS, ESM). Mostly auto-executable: unit tests + static security scans.

  ## Solution understood
  PR #18 implementa OIDC contra Cognito Hosted UI:
  - lib/auth.ts (407 líneas): HmacSHA256-signed httpOnly cookie, state nonce CSRF protection,
    JWKS verification con kid + RS256, admin allowlist por email_verified OR group membership,
    safeReturnTo regex anti-open-redirect, constant-time signature compare, AUTH_COOKIE_SECRET
    enforced >=32 chars, sesión TTL 8h sin extender más allá del exp del Cognito id_token.
  - routes/auth.ts (69 líneas): 4 endpoints — /login, /callback, /logout, /me.
  - server/index.ts: monta /api/auth router.
  PR #20 agrega frontend:
  - client/src/pages/LoginPage.tsx: chequea /api/auth/me, redirige a /api/auth/login con
    returnTo encoded; mismo guard returnTo regex que el backend.
  - client/src/components/AdminLayout.tsx: añade botón Log out + redirige a /login en 401.

  ## Coverage
  - 39/39 unit tests PASS en server (post-merge state). AC1-AC5 cubiertos por 18 tests dedicados.
  - LoginPage.tsx + AdminLayout.tsx: code review (no UI test, low risk: lógica delgada).

  ## Security regression
  - SQL injection grep: 0 hits en diff.
  - Secrets grep: solo placeholders (`replace-with-at-least-32-random-characters`, ejemplos en docs).
  - PII logging: 0 hits.
  - npm audit: 2 high pre-existentes (drizzle-orm SQL identifier escape; path-to-regexp ReDoS).
    Ninguno introducido por este PR — flag como upgrade futuro, NO blocker para IM-961.

  ## OWASP Top 10
  Ver attachments/tr-085-tc-76/owasp-top10-scan.txt. 0 Applicable+FAIL.
  A06 INFO (deps pre-existentes).

  ## Runtime caveat
  Los 5 escenarios prueban behavior HTTP/cookie via unit tests. La validación e2e en browser
  contra un Cognito User Pool real requiere deployed env (per IM-964 deployment checklist).
  No es blocker para code-review; queda explícito en este TR.

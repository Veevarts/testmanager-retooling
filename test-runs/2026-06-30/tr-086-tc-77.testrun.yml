notes: |
  ## Classification
  Backend pipeline (Express router refactor).

  ## Solution understood
  PR #19 refactoriza features.ts, surveys.ts, responses.ts en pares Public/Admin router. Mount
  order en server/index.ts:
    app.use("/api/features", featuresPublicRouter)
    app.use("/api/surveys", surveysPublicRouter)
    app.use("/api/responses", responsesPublicRouter)
    app.use("/api/admin", requireAdminAuth)              ← gate
    app.use("/api/admin/features", featuresAdminRouter)
    app.use("/api/admin/surveys", surveysAdminRouter)
    app.use("/api/admin/responses", responsesAdminRouter)
    app.use("/api/admin/settings", settingsRouter)
  Public routers NO usan requireAdminAuth; admin routers heredan el middleware por el orden del
  mount. Active-only filter en public routes implementado en el router (preview=1 y active=false
  no permiten ver inactive).

  ## Coverage
  - 39/39 server tests PASS. 8 dedicados al boundary (apiBoundary.test.ts).
  - 1 nuevo test inválido en PR #19: AC1 route map verificado por revisión de código (no unit test).

  ## Security regression
  - No string-concat SQL.
  - No secret en diff.
  - npm audit pre-existente — 2 high (no introducidos por este PR).

  ## OWASP Top 10
  Ver attachments/tr-086-tc-77/owasp-top10-scan.txt. 0 Applicable+FAIL. A06 INFO.

  ## Risk High mitigation
  La historia advierte "if over-protect, widget breaks; if under-protect, admin exposed".
  apiBoundary.test.ts cubre AMBAS direcciones con tests dedicados → mitigación adecuada.

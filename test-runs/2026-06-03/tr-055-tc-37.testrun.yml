scopeFit: |
  Scope-fit del PR 121 vs los AC implicitos de IM-809:

  AC 1 - "Migrar descuentos de orden Shop a Veevart de forma que los
         totales del Client Purchase / POS_Purchase coincidan con Altru"
  -> PR lines: pos_discount_only_shop.sql linea 64 emite 1 row por
     SALESORDER con `total_discount > 0`. Linkea a Purchase__r y
     POS_Purchase__r via Implementation_External_ID__c.
  -> Coverage: Scenario 1 (scope-fit) + Scenario 4 (sandbox PASS).
  -> Status: PASS por scope-fit + sandbox PR. Pendiente confirmacion
     post-load IHM (Scenario 5, NOT-RUN).

  AC 2 - "Filtrar solo merchandise (excluir tickets/memberships)"
  -> PR lines: `INNER JOIN SALESORDERITEMMERCHANDISE soim ON soim.ID = soi.ID`
     (linea 47). Garantiza que solo se procesan items de mercancia.
  -> Coverage: Scenario 2 (cross-profile tucson) + Scenario 6 (regression
     edge cases).
  -> Evidence: tucson = $24 merch incluido, $1.52M no-merch excluido
     (per PR; nuestro agregado confirma $24 / 2 ordenes).
  -> Status: PASS.

  AC 3 - "Evitar doble descuento (Sale Item no debe netear si el package
         distribuye el descuento via POS_Discount)"
  -> PR lines: sale_item.sql linea 66 cambia
     `COALESCE(us.amount_paid_after_discount, soi.TOTAL, 0)` (net)
     a `COALESCE(soi.TOTAL, 0)` (gross), con comentario explicativo.
  -> Coverage: Scenario 1 (scope-fit) + Scenario 4 (sandbox 16.20/17.86
     numeros validan que descuento se aplica 1 vez no 2).
  -> Status: PASS por sandbox PR. Recomendacion follow-up: unit test
     que valide Item_Price gross con POS_Discount presente.

  AC 4 - "Source: cuantificar el problema en IHM"
  -> PR declara: 10,330 ordenes / $65,025 (illinois_2), SALESORDER
     12520367 -> 18 / 1.80 / -1.80.
  -> Coverage: Scenario 3 (behavioral source).
  -> Evidence: attachments/tr-055-tc-37/safesql/illinois_2-agg.json
     (orders_with_discount=10330, sum_total_discount=65025,
      sum_gross_subtotal=395365.58, min=0.04, max=382).
  -> Status: PASS por match exacto con la declaracion del PR
     (10,330 / $65,025 reproducidos desde safesql illinois_2).

  AC 5 - "Cross-profile sanity (8 source DBs)"
  -> PR declara funcionamiento en 8 DBs.
  -> Coverage: Scenario 2 (safesql tucson agregado).
  -> Evidence: attachments/tr-055-tc-37/safesql/tucson-agg.json
     (orders_with_discount=2, sum_total_discount=24, sum_gross_subtotal=110)
  -> Status: PASS (tucson match exacto con declaracion del PR).

touchRadius: |
  Touch radius del PR 121 (Veevarts/MigrationToolETL):

  Codigo nuevo (production):
  - queries/shop/pos_discount_only_shop.sql (+84). Query nuevo standalone.
    Sin dependencias sobre otros queries shop. 4 CTEs + SELECT final con
    WHERE total_discount > 0 + filtro de fechas opcional.
  - application/pipelines/pos-discount-shop.pipeline.ts (+87). Nueva
    NestJS pipeline siguiendo patron de los otros shop pipelines.
  - domain/model/pos-discount-shop-record.entity.ts (+50). Entity DDD con
    8 props (Implementation_External_ID, Purchase_ext_id, POS_Purchase_ext_id,
    Value, Discount_Type, Discount_Value, Discount_Amount, Discount_Source).
  - domain/specifications/pos-discount-shop.specification.ts (+18).
    Specification + factory siguiendo el patron de los otros shop specs.
  - infrastructure/destination/sql-server/extractors/pos-discount-shop.extractor.ts (+117).
    Extractor MSSQL con stream.
  - infrastructure/destination/sql-server/mappers/pos-discount-shop.mapper.ts (+44).
    Mapper SQL row -> entity.
  - infrastructure/destination/sql-server/query-regression/shop-discount-query.spec.ts (+62).
    Suite de regresion del query nuevo.

  Modificados:
  - queries/shop/sale_item.sql (+5/-1). UNA linea de codigo cambiada:
    `Item_Price__c` cambia de COALESCE(us.amount_paid_after_discount,
    soi.TOTAL, 0) a COALESCE(soi.TOTAL, 0). Mas 4 lineas de comentario
    explicativo. Sin tocar las otras columnas (Discount_Amount, Price_Without_Tax,
    rollups del SaleItem).
  - domain/enums/migration-object.enum.ts (+1). Nuevo enum value
    POS_DISCOUNT_SHOP.
  - data-migration.module.ts (+5). Wiring en 4 puntos del module (provider,
    factory, destructuring, exports).
  - infrastructure/destination/sql-server/registry/extractor.registry.ts (+2).
    Registro del nuevo extractor.

  No tocados pero criticamente relacionados (NO REGRESION ESPERADA pero
  validar):
  - queries/shop/client_purchase.sql: NO modificado. Sus rollups Total/Total2
    los recalcula Salesforce desde Sale Items, no desde la SQL source.
  - queries/shop/sales_order_only_shop.sql: NO modificado. Mismo motivo.
  - Triggers Auctifera (POSDiscountTriggerHandler, ClientPurchaseTriggerHandler,
    SaleItem trigger): NO tocados; el comportamiento del package se asume
    estable (assumption explicito en PR description).

  Sin acoplamiento con queries no-shop. Touch radius CLEAN para el scope
  Shop. El cambio `sale_item.sql` afecta a TODAS las ordenes Shop, no solo
  las con descuento, pero el comportamiento gross == net cuando no hay
  descuento (no regresion logica esperada).

  FLAG IMPORTANTE: el cambio sale_item.sql aplica gross global. En ordenes
  sin descuento Item_Price = soi.TOTAL = soi.TOTAL/qty (mismo valor que
  antes con COALESCE(amount_paid_after_discount, soi.TOTAL)). En ordenes
  con descuento Item_Price cambia (sube). Spot-check post-load recomendado
  para no-discount orders (Scenario 6 cubre regression).


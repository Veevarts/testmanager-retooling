    Solution: fund_assignment_memberships.sql Auctifera__Posted_Date__c changed from rmft.FinancialTransactionDate to
    COALESCE(rgi.InstallmentDate, rmft.FinancialTransactionDate) so recurring membership FAs emit at installment grain.
startedAt: "2026-06-12T16:00:00.000Z"
completedAt: "2026-06-12T17:15:00.000Z"
notes: |
  ## Solution understood
  fund_assignment_memberships.sql cambia 1 línea en la proyección de Auctifera__Posted_Date__c:
    - pre-fix: CAST(rmft.FinancialTransactionDate AS DATE)
    - post-fix: CAST(COALESCE(rgi.InstallmentDate, rmft.FinancialTransactionDate) AS DATE)
  Cada FA de recurring membership ahora emite la fecha del installment correspondiente; si el recurring no tiene RGI,
  cae al fallback de la fecha del FT root (preserva comportamiento previo). Refund FAs viven en sibling queries
  (fund_assignment_donations.sql / fund_assignment_payments.sql) que NO cambiaron — refunds mantienen su fecha original.

  ## Validation summary
  - Unit tests: 14/14 PASS en branch del PR (incluye guard nuevo del IM-904)
  - Tucson: baseline 102524 rows vs post-fix 102524 rows (set integrity intacto)
  - Tucson: 102 rows con posted_date distinta — match exacto vs PR declarado 102
  - Tucson: 102/102 FORWARD (0 BACKWARD)
  - Canonical Peter Fletcher rev-10282478: 2023 installment movido de 2022-07-16 a 2023-07-16 (esperado)
  - High Desert / MOAD: SKIPPED (auditoría cross-customer opcional — la fix es SQL único sin ramas per-customer; Tucson valida el comportamiento sobre Altru)
  - OWASP: 1/10 Applicable (A03 Injection) → PASS; 9/10 N/A con justificación

title: >-
  Run TC-59 — IM-906 PR #130 (mutual exclusion para active matching-gift claims entre donations/payments FA queries) — 5/5
  PASS · Tucson (Altru) 231 claim FAs removidos de donations · canonical rev-10669731 2 FAs → 1 FA · sin defectos
status: completed
environment:
  name: >-
    Local clone of Veevarts/MigrationToolETL on branch

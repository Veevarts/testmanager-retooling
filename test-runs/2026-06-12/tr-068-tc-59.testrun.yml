    safesql tucson OK (tucson_db_3 @ ec2-100-56-250-103).
  url: "https://github.com/Veevarts/MigrationToolETL/pull/130"
  buildVersion: >-
    Classification: SQL-only (1 SQL file modified: fund_assignment_donations.sql + 2 jest specs + openspec docs).
    Solution: agrega un NOT EXISTS clause sobre REVENUEMATCHINGGIFT.ISACTIVE = 1 al EligibleLines CTE de la donations FA
    query, excluyendo active matching-gift claim root transactions y delegando su emisión a payments FA query.
startedAt: "2026-06-12T18:00:00.000Z"
completedAt: "2026-06-12T19:30:00.000Z"
notes: |
  ## Solution understood
  fund_assignment_donations.sql agrega 1 nuevo bloque NOT EXISTS al CTE EligibleLines (líneas 51-56):
    AND NOT EXISTS (
      SELECT 1 FROM REVENUEMATCHINGGIFT rmg_claim
      WHERE rmg_claim.ID = ft.ID AND rmg_claim.ISACTIVE = 1
    )
  Esto excluye los active matching-gift claim ROOT transactions de la donations FA query, garantizando que cada claim
  Opportunity sea emitido por exactamente UNA query (payments). Pre-fix había duplicación: la misma claim Opp
  recibía 1 FA de donations + 1 FA de payments. Post-fix: 0 de donations + 1 de payments = 1 total.

  ## Validation summary
  - Unit tests: 8/8 PASS en matching-gift-query.spec.ts (incluye guard nuevo IM-906 del exclude)
  - Tucson donations FA: baseline 57,070 rows vs post-fix 56,839 rows (231 active claim FAs removidos)
  - Tucson set integrity: 0 keys nuevas en post-fix; 0 cambios de campo en las 56,839 non-claim donations que quedan
  - Canonical rev-10669731 (FT.ID 8C335D60-BB46-45E1-AEEE-9DE1BEC9A0C7): pre-fix 2 FAs (1 donations + 1 payments) →
    post-fix 1 FA (0 donations + 1 payments). Mutual exclusion confirmada.
  - Sibling queries (payments, memberships): byte-idénticas entre branches → 0 regresión posible
  - OWASP: 1/10 Applicable (A03 Injection) → PASS; 9/10 N/A con justificación

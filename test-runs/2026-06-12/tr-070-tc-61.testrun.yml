notes: |
  ## Solution understood
  donation_transaction.sql + donation_pledges.sql expanden el CASE de RecordTypeId para emitir tokens placeholder
  ({{MATCHING_GIFT_RECORD_TYPE_ID}}, {{STOCK_GIFT_...}}, {{PROPERTY_GIFT_...}}, {{PLANNED_GIFT_...}}, {{PLEDGE_...}}).
  Los CTEs ActiveMatchingGiftClaims + StockGift + PropertyGift + GiftInKind aportan flags por transaction; el CASE evalúa
  en orden: Matching > In-Kind > Stock > Property > Planned > Donation default. Los extractores
  (donation-transaction.extractor.ts + donation-pledges.extractor.ts) leen 6 env vars con getRequiredEnv (fail-fast con
  nombre exacto del env var faltante) y aplican replaceAll por cada token. env-variables.enum.ts agrega las nuevas keys.
  Major Gift, Grant, Sponsorship NO shipped — el cross-profile source diagnostic no confirmó reglas deterministas.

  ## Validation summary
  - Unit tests: 8/8 PASS en donation-record-type-query.spec.ts (incluye 1 spec por slot + 1 documenting env vars)
  - Tucson donation_transaction: 53,855 rows estables · 230 Matching + 47 Stock + 1,282 In-Kind activados; Property y Planned 0 (Tucson sin source)
  - Tucson donation_pledges: 684 rows estables · 676 PLEDGE default (separado del Donation default genérico) + 5 Pledge In-Kind + 3 Pledge Stock; Property pledges 0
  - Cross-type collisions en Tucson: 0 (precedencia validada por orden del CASE + unit tests)
  - Fail-fast: estático en getRequiredEnv → throws con nombre del env var; aplica a las 6 keys
  - Major Gift / Grant / Sponsorship NOT shipped — flag en Riesgos del bundle; no half-shipped tokens en SQL ni en enum
  - OWASP: 2/10 Applicable (A03 Injection, A05 Misconfig) → ambos PASS; 8/10 N/A

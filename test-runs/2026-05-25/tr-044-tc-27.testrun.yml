scopeFit: |
  Scope-fit (focal): este TR ejecuta SOLO el Scenario 5 (nuevo en TC-27 v2),
  la validacion funcional de AC1 en sandbox real.

  Los Scenarios 1-4 (data-review) ya estan PASS en TR-043 (commit a36d6df,
  2026-05-25). Este TR no los re-ejecuta; los referencia como pre-requisite.

  AC1 ("Donation and Membership creation flows can retrieve required POS
  records without Opportunity trigger") quedo respaldado en TR-043 por
  construccion del COALESCE byte-identical en las 3 queries. TR-044 lo prueba
  funcionalmente: insertando POS + Opportunity en veevartd via bulk API (sin
  ningun trigger custom involucrado) y verificando via SOQL que el lookup
  vnfp__POS_Purchase__c quedo resuelto unicamente por el match de External Id.

  Este TR cierra la unica brecha del flow estricto que no se podia validar a
  nivel de SQL puro: la confirmacion de que Salesforce, dado el output del
  extractor refactorizado, materializa correctamente la relacion downstream
  sin necesidad del Opportunity trigger que el epic IM-70 esta desactivando.

touchRadius: |
  Touch radius (sandbox load):

  Objetos tocados en veevartd:
  - Auctifera__POS_Purchase__c: 1 record nuevo (External Id
    IM87-TR044-ADF8D4E7-...). Prefijo IM87-TR044- aplicado para aislar el
    record de prueba y permitir cleanup posterior.
  - Opportunity: 1 record nuevo (External Id IM87-TR044-5B44681D-...).
    RecordType auto-resuelto a Donation por NPSP convention en sandbox.

  Side effects observados:
  - Opportunity.Name se auto-genero como "$15500 Donation 05/25/2026" por
    convention NPSP (no por trigger del PR — este auto-naming pre-existe).
  - Opportunity.vnfp__POS_Purchase__c quedo poblado con el Id Salesforce del
    POS via External Id resolution (sin trigger, sin manual lookup).

  No tocados / no afectados:
  - Auctifera__Fund_Donation_Assignment__c (FDA): no inserted. La cadena de
    dependencias para FDA (Designation/Fund lookup) requiere upstream master
    data que esta fuera del scope minimo de esta validacion funcional. La
    alineacion FDA <-> POS quedo verificada a nivel SQL en TR-043 Scenario 4
    (mismo COALESCE byte-identical) y en TR-044 Scenario 5 step Q3.
  - Sin triggers custom ejecutados. El unico trigger/flow que tocaria estos
    records seria el Opportunity auto-naming flow (parte de NPSP) — esperado
    y no relacionado con el PR.

  Cleanup recomendado post-merge / post-review:
    DELETE FROM Auctifera__POS_Purchase__c WHERE Auctifera__Implementation_External_ID__c LIKE 'IM87-TR044-%';
    DELETE FROM Opportunity WHERE vnfp__Implementation_External_ID__c LIKE 'IM87-TR044-%';


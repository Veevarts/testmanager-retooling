      ====================================================================
      Como visualizar la evidencia en Lightning
      ====================================================================
      1. Abrir cada URL de Opportunity en navegador (usuario admin veevartd).
      2. En la pagina de detail, ubicar el campo "POS Purchase" (vnfp__POS_Purchase__c).
         Salesforce muestra el nombre del POS como hyperlink — clicar abre el record relacionado.
      3. En la pagina del POS, ver los 3 totals (Total, Subtotal, Subtotal before discount)
         poblados con el amount de la transaccion. Confirma que el CSV emitido por el
         extractor refactorizado se materializo correctamente sin trigger.

      Alcance deliberadamente acotado: POS + Opportunity unicamente. FDA
      (Auctifera__Fund_Donation_Assignment__c) no se cargo en sandbox por
      complejidad de dependencias upstream (Designation/Fund master data),
      pero la alineacion FDA <-> POS quedo verificada a nivel SQL en
      TR-043 Scenario 4 y en TR-044 step Q3 (mismo COALESCE byte-identical).

      Limitaciones honestas:
      - El test no demuestra que el Opportunity trigger este EFECTIVAMENTE
        OFF en veevartd; demuestra que el linkage Opportunity -> POS no
        requiere trigger porque se resuelve por External Id matching durante
        el bulk upsert. Si el trigger estuviera activo en veevartd, este
        test no lo detectaria (el resultado seria el mismo). La validacion
        de "trigger off" debe hacerla el dev team via Setup verification.
      - Payment-backed-only path no validable funcionalmente porque Tucson
        tiene 0 casos hoy (TR-043 Scenario 3). Sin sintetizar data en
        sandbox, no hay manera de probar ese path en escenario funcional.


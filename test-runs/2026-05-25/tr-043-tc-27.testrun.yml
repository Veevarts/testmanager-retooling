scopeFit: |
  Scope-fit mapping (strict flow): cada acceptance criterion de IM-87 mapeado a las
  lineas del PR 94 y a la evidencia QA. PR 94 total: 14 archivos, +643/-158 lineas,
  9 commits desde 2026-04-21.

  AC1: "Donation and Membership creation flows can retrieve required POS records
       without Opportunity trigger."
  -> PR lines: refactor de los 3 POS queries (sales_order_only_donation/membership/
     pledge.sql) para emitir un row per transaction-aggregated FT con resolucion
     COALESCE(revenue_so, payment_so). Donation chain queries (donation_transaction.sql
     + fund_assignment_donations.sql) adoptan el MISMO COALESCE para que sus POS
     references resuelvan al output del POS query sin necesidad de que el trigger
     populate vnfp__POS_Purchase__c.
  -> Coverage: Scenarios 1 + 3 + 4 (side-by-side + payment-backed fallback +
     cross-query alignment).
  -> Evidence: 6 SQL files pre/post + behavioral diff Tucson.

  AC2: "Query output includes required keys/fields for downstream record creation."
  -> PR lines: pos-purchase-csv-descriptor.builder.ts agrega 3 totals fields
     (Auctifera__Subtotal_before_discount__c, Auctifera__Subtotal__c,
     Auctifera__Total__c) al CSV de donation y membership.
  -> Coverage: Scenario 4 step 7 (totals fields citados como satisfaccion de AC2).
  -> Evidence: PR body confirms los 3 fields aparecen en CSV; verificado en diff.

  AC3: "No regressions for existing POS purchase extraction scenarios."
  -> PR lines: la cardinalidad post-fix (19,772 rows en Tucson) es superset del
     universo pre-fix (15,946 rows), no subset. Ningun row pre-fix queda fuera
     post-fix; los +3,826 adicionales vienen de reversal-aware logic + cambio de
     grain line-to-transaction que pre-fix omitia silenciosamente.
  -> Coverage: Scenarios 2 + 4 step 8 (delta analysis + regression assessment).
  -> Evidence: behavioral diff Tucson + Scope-fit reasoning.
  -> Gap: no validamos byte-by-byte que los 15,946 IDs pre-fix sean exactamente un
     subset de los 19,772 post-fix. Confianza por construccion: la nueva query es
     mas inclusiva (Reversal type + payment-backed path + zero-net filter), no
     excluye nada que pre-fix incluia. Riesgo residual: BAJO.

  AC4: "Validation evidence (sample records + expected/actual results) is documented."
  -> PR lines: query-regression specs nuevos/expandidos (pos-purchase-donation/
     membership/pledge-query.spec.ts + query-chain.integration.spec.ts +
     sql-server-query-fixture.ts).
  -> Coverage: documentacion completa en este TR-043 con counts + sample rows.
  -> Evidence: safesql JSON output con counts pre/post + sample empty (no
     payment-backed-only anchors en Tucson).
  -> PR body confirma `npm run test:queries` + `npm run lint:check` + `npm run build`
     passed en local; `npm run test:queries:docker` no ejecuto en PR env por falta
     de container runtime (gap aceptado per PR body).

touchRadius: |
  Touch radius check (strict flow): archivos modificados por PR 94 + busqueda
  exhaustiva de consumers cross-query.

  Modificados (verificados en este QA):
  - Production code (6 SQL + 1 TS):
    - queries/pos-purchase/sales_order_only_donation.sql (+107/-75)
    - queries/pos-purchase/sales_order_only_membership.sql (+99/-48)
    - queries/pos-purchase/sales_order_only_pledge.sql (+34/-6)
    - queries/opportunity-donation/donation_transaction.sql (+19/-8)
    - queries/opportunity-donation/donation_pledges.sql (+1/-1)
    - queries/fund-assignment/fund_assignment_donations.sql (+15/-4)
    - application/pipelines/pos-purchase-csv-descriptor.builder.ts (+12/-0)
  - Tests (7 specs nuevos/expandidos):
    - donation-pledges-query.spec.ts (+18)
    - pos-purchase-csv-descriptor-query.spec.ts (+45)
    - pos-purchase-donation-query.spec.ts (+33/-5)
    - pos-purchase-membership-query.spec.ts (+39)
    - pos-purchase-pledge-query.spec.ts (+31)
    - query-chain.integration.spec.ts (+147/-7)
    - sql-server-query-fixture.ts (+43/-4)

  Cross-query contracts establecidos (alignment estructural):
  - sales_order_only_donation.sql → emite vnfp__POS_Purchase__c via
    COALESCE(revenue_so.ID, payment_so.ID)
  - donation_transaction.sql → emite vnfp__POS_Purchase__c via la MISMA formula
  - fund_assignment_donations.sql → emite vnfp__Opportunity_POS_Purchase__c via
    la MISMA formula
  Las 3 queries usan la MISMA CTE SalesOrdersByPayment con definicion byte-identical.
  Por construccion los Ids referenciados downstream existen en el POS output.

  No modificados pero potencialmente afectados:
  - opportunity-membership/membership_transactions.sql: dominio Membership. No
    referencia el donation TransactionAgg ni el donation SalesOrdersByPayment. PR
    body indica que el cambio fue solo en sales_order_only_membership.sql (POS)
    y no en el opportunity-membership query. Sin riesgo cross-dominio.
  - opportunity-donation/donation_pledges.sql: +1/-1 alignment. Cambio minimo.
  - fund-assignment/fund_assingments_donation_refunds.sql: NO tocado por este PR.
    Sus contratos con opportunity-donation/donation_transaction.sql vienen de
    IM-375 (PR 102 ya mergeado) y siguen siendo consistentes — donation
    transaction Opp key (COALESCE(rgi, FT.ID)) es independiente del POS reference
    (COALESCE(revenue_so, payment_so)). Sin colision.
  - Otros queries del pipeline (charge-item, exhibition-*, museum-offer, etc.):
    distintos dominios, no comparten codigo ni keys con la cadena donation/
    membership/pledge POS. Sin riesgo.

  Riesgos detectados:
  - Si el Salesforce loader esperaba SIEMPRE un POS row con
    Implementation_External_ID__c = so.ID (forma pre-fix), ahora puede recibir
    Ids derivados de COALESCE — pero en la practica el COALESCE devuelve un
    so.ID real (solo cambia que so puede venir de payment_so en vez de revenue_so).
    Sin riesgo de formato.
  - Si algun consumer downstream agregaba sobre la cardinalidad del POS query
    (e.g. "COUNT(POS) per donor"), los counts cambian de 15,946 a 19,772 en
    Tucson. Esperado por el refactor de transaction-grain, no es regression.
    Hay que comunicar a los reporters/analistas del cliente.

  Conclusion: touch radius bien delimitado en la cadena donation/membership/pledge
  POS. Cross-query contracts garantizados por construccion del COALESCE compartido.


environment:
  buildVersion: "Veevarts/MigrationToolETL@76463bb · classification SQL-only (6 SQL queries + 6 extractor.ts wiring + 2 regression specs + openspec docs). Strategy: safesql baseline + spot verification on 3 reachable profiles (aspen, illinois_2, tucson); dev unit tests on PR branch; static SQL anti-join analysis; cross-profile coverage for everson/high_desert/kidstream/moad/muhammed2 inherited from dev's PR-body smoke evidence (profiles not reachable from QA machine)."
  notes: |
    ## Solution understood

    PR #135 agrega un grafo completo de "direct registrant ticketing" para capturar
    pre-registration/walk-in event registrants de Altru que actualmente se pierden
    porque las queries existentes dependen de sale-order rows. La fix construye
    6 SQL files paralelos a los existentes (sales_order, ticketing, museum-offer
    parent/child, ticket_item, attendance) que emiten un grafo deterministic por
    REGISTRANT.ID eligible, con 5 anti-joins encadenados:

    1. NOT EXISTS REGISTRANTREGISTRATION (no child registration row)
    2. NOT EXISTS SALESORDERITEMEVENTREGISTRATION.REGISTRANTID (no formal event-reg link)
    3. NOT EXISTS SALESORDERITEMTICKETREGISTRANT.REGISTRANTID (no formal ticket link)
    4. NOT EXISTS current_attendance_key (no overlap EVENTID+CONSTITUENTID en attendance)
    5. NOT EXISTS SALESORDER → SALESORDERITEM → SALESORDERITEMTICKET (conservative
       same-event/same-constituent ticket candidate, sin requerir REGISTRANT.ID link)

    Adicionalmente: `r.CONSTITUENTID IS NOT NULL`, `r.WILLNOTATTEND = 0`,
    `r.ISCANCELLED = 0`. Por cada registrant eligible se emiten los 6 rows del grafo
    con external IDs deterministic (sales_order/ticketing/offer-parent/offer/ticket-item/
    attendance) — reusa el EVENTPRICE existente solo si hay exactamente 1, si no
    genera un fallback offer parent/child por evento y registration type
    (preregistration / walkin).

    Side-effects esperados: los 6 extractors ahora streamean la query original +
    la nueva direct registrant query para el mismo target object; las queries
    existentes ticket/event-registration sale-order-backed quedan intactas (PR body
    declara explícitamente: "Existing ticketing query files remain in place; this
    appends additional one-object query files").

    ## QA verification summary

    Dev tests: 32 suites passed · 253 tests passed · 0 failed (incluye los 2 specs
    nuevos `attendance-direct-registrant-query.spec.ts` y
    `attendance-event-extractor-query-files.spec.ts`).

    Live safesql verification (3 perfiles reachable: aspen, illinois_2, tucson):
    - Aspen total: 296 rows / 9 events — coincide EXACTO con el PR body
    - Aspen History 101 (event canonical fixture): 5 direct registrant rows, todos
      eligible — coincide EXACTO con el PR body
    - Illinois: 17,267 rows — coincide EXACTO con el PR body
    - Tucson: 738 rows vs PR 727 (drift +1.5%, live data desde SHA c436ff7261cc)
    - Spot-check evreg-10005535: 1 row, todos los predicados de elegibilidad PASS
    - Grain stability: 0 duplicated REGISTRANT.ID rows
    - Aspen CONSTITUENTID NULL: 906/284 vs PR 869/275 (drift live)
    - Aspen WILLNOTATTEND conservative-excluded delta: 117 vs PR 85 (drift live)

    Static anti-join confirmation: los 5 NOT EXISTS predicates aparecen en los 6
    SQL files; `WILLNOTATTEND = 0` y `CONSTITUENTID IS NOT NULL` están presentes
    en `attendance_direct_registrant.sql`.

    Security: 0 findings reales (los 2 hits de SQL injection grep son T-SQL output
    string concat sobre compile-time literals, no user input).
    OWASP Top 10: 1 Applicable (A03 Injection) + PASS · 9 N/A · 0 FAIL.

    ## Riesgos abiertos del bundle reescalados

    - R1 (Media) muhammed2 confirmado timeout — cobertura cross-profile parcial
      (5 de 8 perfiles totales; 4 profiles directos QA + Aspen).
    - R2 (Media) anonymous attendee strategy para CONSTITUENTID NULL — confirmado
      live data: 906 rows en Aspen. Follow-up ticket recomendado.
    - R3 (Baja) target SF object shape — el PR emite a 6 targets concretos del
      grafo Veevart (POS Purchase / Ticketing / Offer parent+child / Ticket Item /
      Attendance) con external IDs deterministic. R3 ya resuelto en el PR.
    - R4 (Baja) delta agreed vs conservative — live data drift mostró 117 rows
      en Aspen (no 85). El comportamiento es coherente con la regla; flagged
      para que dev review confirme.
    - R5 (Baja) — el PR sí toca los 6 extractors. Los regression specs cubren la
      wiring (attendance-event-extractor-query-files.spec passed).

  scopeRestrictions:
    - "Profiles everson, high_desert, kidstream, moad no reachable from local safesql — cross-profile verification para esos 4 profiles relies on dev's smoke evidence in PR body (Everson 1,386 / Kidstream 61 / MOAD 576 full integrity PASS, High Desert lighter count 70,999 PASS)."

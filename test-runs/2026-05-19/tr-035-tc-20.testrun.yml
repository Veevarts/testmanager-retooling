      ## Playbook paso a paso para Scenario 4

      ### Preparacion (una sola vez)

      1. Clonar MigrationToolETL y posicionarse en la rama del PR:
         ```bash
         git clone git@github.com:Veevarts/MigrationToolETL.git
         cd MigrationToolETL
         git checkout story/attributes-query-IM-696
         npm install
         ```

      2. Confirmar que `tucsonbotanical--veevartd` esta autenticado con `sf` CLI.
         Si no lo esta:
         ```bash
         sf org login web --instance-url https://test.salesforce.com --alias veevartd
         # Usa el username SA del sandbox tucsonbotanical--veevartd
         sf org list --json | jq '.result.nonScratchOrgs[] | select(.alias=="veevartd")'
         ```

      3. Verificar que `Constituent_Attribute__c` existe en el sandbox y tiene los 15 fields:
         ```bash
         sf sobject describe --sobject Constituent_Attribute__c --target-org veevartd | jq '.fields[] | .name'
         ```
         Esperar al menos estos campos: Implementation_External_ID__c, Contact__c,
         Household_Organization__c, Attribute_Name__c, Attribute_Group__c, Data_Type__c,
         Value_Text__c, Value_Boolean__c, Value_Date__c, Value_Number__c, Comment__c,
         Start_Date__c, End_Date__c, Source_Category_ID__c, Source_Code_Table__c.

      ### Paso 1 - Generar el CSV desde Tucson

      4. Configurar variables de entorno con las credenciales del MS SQL tunnel (mismas
         que usa safesql). Ejemplo (no copiar passwords al transcript):
         ```bash
         export DB_HOST=localhost
         export DB_PORT=41433
         export DB_NAME=tucson_db_1
         export DB_USER=SA
         export DB_PASS=$(security find-generic-password -s safesql-tucson -a SA -w)
         ```
         (Si la pipeline usa otra forma de configurar la conexion, ajustar.)

      5. Abrir el tunnel SSH al bastion en otra terminal:
         ```bash
         ssh -L 41433:ec2-44-193-204-43.compute-1.amazonaws.com:1433 \
             -i ~/Downloads/veev-ue1-prod-bastion-ssh-key \
             ec2-user@bastion.internal.veevartapp.com
         ```

      6. Correr el extractor de constituent-attribute:
         ```bash
         npm run extract -- --object constituent-attribute
         # o el comando equivalente del PR — revisar README o package.json scripts
         ```
         Output esperado: archivo `constituent_attributes_<timestamp>.csv` con ~62,647
         filas + header. Tiempo aproximado: < 1 min.

      7. Validar el CSV antes de upsert:
         ```bash
         wc -l constituent_attributes_*.csv   # Esperado: 62,648 (header + 62,647 rows)
         head -1 constituent_attributes_*.csv  # Esperado: 15 columnas, incluyendo Implementation_External_ID__c
         awk -F',' 'NR>1 {print NF}' constituent_attributes_*.csv | sort -u
         # Esperado: 15 (todas las rows tienen 15 columnas)
         ```

         **Evidencia a capturar:** el `wc -l` output, el `head -1` output, y el `awk`
         count. Guardar en `attachments/tr-035-tc-20/s4-csv-validation.txt`.

      ### Paso 2 - Upsert al sandbox via Bulk API

      8. Hacer upsert sobre Implementation_External_ID__c:
         ```bash
         sf data import bulk \
             --sobject Constituent_Attribute__c \
             --file constituent_attributes_<ts>.csv \
             --external-id Implementation_External_ID__c \
             --target-org veevartd \
             --wait 30
         ```
         Output esperado: `Job ID: 750dz...`, `Processed: 62647`, `Failed: 0`.

         **Evidencia a capturar:** screenshot del output del comando + Job ID.

      9. Confirmar el total via SOQL:
         ```bash
         sf data query \
             --query "SELECT COUNT(Id) FROM Constituent_Attribute__c" \
             --target-org veevartd
         ```
         Esperado: 62647.

      10. Confirmar routing en el sandbox:
          ```bash
          sf data query --target-org veevartd --query "
            SELECT
              COUNT_DISTINCT(Id) FILTER (WHERE Contact__c != null AND Household_Organization__c = null) AS contact_only,
              COUNT_DISTINCT(Id) FILTER (WHERE Contact__c = null AND Household_Organization__c != null) AS household_only,
              COUNT_DISTINCT(Id) FILTER (WHERE Contact__c != null AND Household_Organization__c != null) AS both,
              COUNT_DISTINCT(Id) FILTER (WHERE Contact__c = null AND Household_Organization__c = null) AS neither
            FROM Constituent_Attribute__c"
          ```
          (Nota: SOQL no soporta FILTER, usar queries separados o subqueries.)

          Esperado: contact_only ≈ 23,301, household_only ≈ 205, both ≈ 39,141, neither = 0.

      ### Paso 3 - Re-run para idempotency

      11. Correr el mismo upsert otra vez:
          ```bash
          sf data import bulk \
              --sobject Constituent_Attribute__c \
              --file constituent_attributes_<ts>.csv \
              --external-id Implementation_External_ID__c \
              --target-org veevartd \
              --wait 30
          ```
          Output esperado: `Processed: 62647`, `Failed: 0`, `Created: 0`, `Updated: 0`
          o similar (Bulk API API v2 reporta los counts diferente; el punto clave es
          que ningun record nuevo se creo y que solo se updateo rows con campos
          modificados).

      12. Confirmar count sigue igual:
          ```bash
          sf data query --query "SELECT COUNT(Id) FROM Constituent_Attribute__c" --target-org veevartd
          ```
          Esperado: 62647 (sin cambios).

      ### Cuando termines

      - Captura: outputs de los comandos, Job IDs, screenshots de los resultados SOQL.
      - Adjunta los archivos a `attachments/tr-035-tc-20/` (e.g., s4-csv-validation.txt,
        s4-upsert-job1.txt, s4-soql-count.txt, s4-upsert-job2-idempotent.txt).
      Hallazgo: el sandbox trainings no tiene la migracion completa de Constituents.
      Solo 27 Contacts + 15 Accounts con Auctifera__Implementation_External_ID__c
      poblado. Para validar el upsert end-to-end sin esperar la migracion completa,
      filtramos el CSV a los 163 attributes cuyo lookup matchea data ya presente.
      El contrato del upsert (Bulk API + lookup-by-external-id + typed slot
      persistence + idempotency) queda validado sobre dataset real.

      Para validar el full 62,647-row contract, hay que correr la migracion completa
      de Constituents primero en este sandbox o usar el sandbox veevartd
      (al cual no tenemos acceso esta vez).

      Hallazgo secundario: Bulk API 2.0 hace update siempre en cada upsert, no diff
      field-by-field. LastModifiedDate cambia en cada re-run aunque los valores
      sean identicos. Esto es comportamiento documentado de Salesforce, no un bug.

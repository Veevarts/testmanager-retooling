      Hallazgo importante: el routing NO es xor. 39,141 de los 62,647 rows (62%) tienen
      tanto Contact__c como Household_Organization__c populados. Esto es por diseño:
      cuando el constituent es un individuo con household, Contact__c apunta al individuo
      y Household_Organization__c apunta al household. Los downstream reports en Salesforce
      deben tener esto en cuenta para evitar contar duplicado.

      Otro hallazgo: Value_Text__c se popula siempre como representational string,
      incluso para Yes/No (con "Yes"/"No"), Date (ISO string) y Number (stringified).

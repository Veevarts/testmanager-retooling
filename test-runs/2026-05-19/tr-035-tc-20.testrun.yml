      ## Playbook paso a paso para Scenario 5

      Prerequisito: Scenario 4 PASS (los 62,647 records cargados en el sandbox).

      ### Paso 1 - Elegir un Constituent representativo

      1. Buscar un Constituent en Tucson que tenga al menos un attribute en cada
         DATATYPECODE (Text, Number, Date, Code Table, Yes/No). Usar safesql:
         ```sql
         SET NOCOUNT ON;

         WITH cat_active AS (
             SELECT DISTINCT ac.ID AS catid, ac.DATATYPECODE
             FROM ATTRIBUTECATEGORY ac
             JOIN TABLECATALOG tc ON tc.ID = ac.TABLECATALOGID
             JOIN INFORMATION_SCHEMA.TABLES it ON it.TABLE_NAME = tc.TABLENAME
             JOIN INFORMATION_SCHEMA.COLUMNS ic ON ic.TABLE_NAME = tc.TABLENAME AND ic.COLUMN_NAME = 'CONSTITUENTID'
             WHERE ac.FLAGGEDFORDELETE = 0 AND ac.FLAGGEDFOREXTENSIONREMOVAL = 0
         )
         -- Aqui hacer un cross-tabulation por constituent + datatype y buscar
         -- aquellos con 5 distinct datatypes. Manual; los nombres de tablas
         -- ATTRIBUTE<UUID> hay que descubrirlos desde cat_active.
         ```
         Mas pragmatico: en lugar de hacer el cross-tabulation desde la fuente,
         hacerlo en Salesforce despues de la carga (paso 2 abajo).

      2. **Alternativa mas rapida** (recomendada): query Salesforce despues del
         upsert (Scenario 4 ya hecho):
         ```bash
         sf data query --target-org veevartd --query "
           SELECT
             Contact__c,
             COUNT_DISTINCT(Data_Type__c) datatypes
           FROM Constituent_Attribute__c
           WHERE Contact__c != null
           GROUP BY Contact__c
           HAVING COUNT_DISTINCT(Data_Type__c) >= 5
           ORDER BY datatypes DESC
           LIMIT 5"
         ```
         (Si SOQL no soporta HAVING COUNT_DISTINCT, hacer en multiple steps o
         consultar directamente con Tooling API / SOQL Builder.)

      3. Tomar el primer Contact__c que tenga 5 distinct Data_Type__c. Anotar:
         - Contact__c ID en Salesforce (15-18 char)
         - Su LOOKUPID en Altru (via SOQL: `SELECT LookUp_ID__c FROM Contact WHERE Id = '...'`)

         **Evidencia a capturar:** screenshot del SOQL output con el Contact__c
         elegido.

      ### Paso 2 - Inspeccionar la related list en Salesforce

      4. Abrir Salesforce en el browser con la URL:
         ```
         https://tucsonbotanical--veevartd.sandbox.lightning.force.com/lightning/r/Contact/<contact-id>/view
         ```
         (Ajustar el subdomain si es distinto.)

      5. Bajar a la related list `Constituent_Attribute__c` (puede tener label
         "Constituent Attributes" o similar).

         **Evidencia a capturar:** screenshot completo de la related list mostrando
         las filas. Adjuntar como `s5-related-list-screenshot.png`.

      6. Para cada row visible, anotar:
         - Attribute_Name__c
         - Data_Type__c
         - Value_Text__c (siempre populado)
         - Value_Boolean__c / Value_Date__c / Value_Number__c (segun aplique)

      ### Paso 3 - Cross-check contra Altru

      7. Obtener la lista de attributes que tiene este constituent en Altru. Usar
         safesql con un wrapper similar al de Scenario 2 pero filtrado por el
         CONSTITUENTID especifico:
         ```sql
         -- Pegar el wrapper de s2-s3-contract-and-resilience.sql.
         -- En vez de "SELECT * FROM #out" al final, hacer:
         SELECT
             Attribute_Name__c,
             Attribute_Group__c,
             Data_Type__c,
             Value_Text__c,
             Value_Boolean__c,
             Value_Date__c,
             Value_Number__c
         FROM #out
         WHERE Implementation_External_ID__c IS NOT NULL
           -- Replace con el UUID del CONSTITUENT que matches al Contact elegido:
           -- AND constituent_id = '<altru-constituent-uuid>'
         ORDER BY Data_Type__c, Attribute_Name__c;
         ```
         (Nota: hay que joinear contra CONSTITUENT.LOOKUPID = '<lookupid>' para
         filtrar.)

         **Evidencia a capturar:** safesql JSON output. Adjuntar como
         `s5-altru-attributes.json`.

      8. Comparar fila por fila:
         - Mismo Attribute_Name__c presente en ambos lados?
         - Mismo Data_Type__c?
         - Mismo valor en el slot tipado correspondiente?
         - Mismo Value_Text__c representational?

         Si todo matchea -> Scenario 5 PASS.
         Si hay discrepancia -> documentar como finding (cualquier row presente
         en Altru pero ausente en Salesforce, o viceversa, o con valor distinto).


        attachments: []
      - order: 6
        status: passed
        actual: "Confirmado algebraico: rso_new (HAVING ABS(SUM)>=ABS(MAX)) es subconjunto estricto de rso_old (DISTINCT del base). Identico para rmta_new ⊆ rmta_old y rmtb_new ⊆ rmtb_old. Old emite Closed Lost (any refund), new emite Closed Lost solo si pasa HAVING. Por lo tanto: si X en old AND X NOT IN new -> X salio del estado Closed Lost (paso a Won). Si X NOT IN old -> X no entraba al Lost antes -> no puede entrar al Lost ahora (no esta en new tampoco). Won->Lost regression imposible por construccion."
        phase: then
        text: "El gate es monotonic: ningun StageName que era Closed Won con la regla vieja se vuelve Closed Lost con la nueva (verificable como rso_new ⊆ rso_old; lo mismo para rmta y rmtb)"

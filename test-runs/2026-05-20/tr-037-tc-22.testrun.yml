      parcial, la Opportunity queda Closed Won (no Closed Lost). Anchor del
      sandbox: NUKP3 ($5,275 original / $5,000 refund) reproduce el bug y
      muestra el fix funcionando.

      Estructura modelada para replicar prod Tucson:
        - Opportunity con Stage = output del gate (Closed Won para parcial,
          Closed Lost para completo).
        - 1 npe01__OppPayment__c (Payment original, monto positivo).
        - 2 Auctifera__Fund_Donation_Assignment__c por Opp: 1 FDA Sold
          (Donated_Amount = original, Status = Sold, Action_Type = null) + 1
          FDA Refunded (Donated_Amount = refund, Status = Refunded,
          Action_Type = Refunded, linkeada al Technical_Payment).

      El refund vive a nivel Fund Donation Assignments — convencion real de
      prod Tucson observada en 006Vz00000VRedbIAD (REV-10680447), no en
      negative-amount Payment como NPSP genericamente.


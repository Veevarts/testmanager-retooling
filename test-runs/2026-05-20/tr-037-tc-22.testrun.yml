        - 9 Closed Won (parcial): 4 rso + 2 rmta + 3 rmtb — antes del PR
          quedaban en Closed Lost; con el fix pasan correctamente a Closed Won.
        - 3 Closed Lost (completo): 1 rso + 1 rmta + 1 rmtb — siguen en
          Closed Lost porque ABS(SUM refund) >= ABS(MAX original).

      Idempotencia confirmada: re-run del CSV original produce mismo count
      (45 total con external ID) + mismos valores + ningun record nuevo.

      Anchor del ticket: REV-10680447 NO esta en este sample upsert (su
      mt_id Branch B no se resolvio con join cim.ID=li.ID porque cim usa

        status: passed
        actual: >-
          Por construccion de los CTEs base (rso_base, rmta_old, rmtb_old via rm_ranked): todos requieren INNER JOIN a
          FINANCIALTRANSACTION TYPE='Refund'. Cualquier MT/SO sin refund link no aparece en ningun bucket. PR 111 no
          toca el StageName de esos rows — mantienen el StageName previo del CASE upstream (Pledge -> Closed Won, etc.).
        phase: then
        text: >-
          Bucket C (sin link de refund): no entra al join LEFT en ningun lado del gate, por lo que no esta en ninguno de
          los 845 — comportamiento sin cambio, fuera del scope del PR
        attachments: []
      - order: 6
        status: passed
        actual: >-
          Confirmado algebraico: rso_new (HAVING ABS(SUM)>=ABS(MAX)) es subconjunto estricto de rso_old (DISTINCT del
          base). Identico para rmta_new ⊆ rmta_old y rmtb_new ⊆ rmtb_old. Old emite Closed Lost (any refund), new emite
          Closed Lost solo si pasa HAVING. Por lo tanto: si X en old AND X NOT IN new -> X salio del estado Closed Lost
          (paso a Won). Si X NOT IN old -> X no entraba al Lost antes -> no puede entrar al Lost ahora (no esta en new
          tampoco). Won->Lost regression imposible por construccion.
        phase: then
        text: >-
          El gate es monotonic: ningun StageName que era Closed Won con la regla vieja se vuelve Closed Lost con la
          nueva (verificable como rso_new ⊆ rso_old; lo mismo para rmta y rmtb)
        attachments: []

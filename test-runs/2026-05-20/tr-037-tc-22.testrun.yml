        - Bucket C (sin refund): fuera del gate por construccion del JOIN.

      Monotonicidad probada algebraicamente: new ⊆ old para los 3 paths,
      asi que cero Won->Lost regressions. Esto es el invariant mas importante
      del fix — garantiza que no hay efectos secundarios sobre StageNames
      que no deberian cambiar.


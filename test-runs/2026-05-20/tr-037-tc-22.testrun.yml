        - Amount = original_amount (SalesOrder.AMOUNT o
          FINANCIALTRANSACTIONLINEITEM.TRANSACTIONAMOUNT segun bucket).
        - vnfp__Refunded_Amount__c (label 'Refunded Value') = total refund
          asociado al case en Tucson.
        - Description = bloque multi-line que documenta el calculo del gate
          y el comportamiento pre/post-fix.
        - Payments related list (npe01__OppPayment__c) con 1 record por Opp:
          Payment original con Amount positivo y Type='Payment (original)'.
        - Fund Donation Assignments related list (Auctifera__Fund_Donation_Assignment__c)
          con 2 records por Opp: 1 FDA original (Status='Sold',
          Accounting_Status='Posted', Action_Type=null, Donated_Amount=original)
          + 1 FDA refund (Status='Refunded', Accounting_Status='Refunded',
          Action_Type='Refunded', Donated_Amount=refund). Ambas linkeadas
          al mismo Technical Payment.

      Esto resuelve los tres feedbacks consecutivos:
        - "no veo el refund parcial generado" -> Amount + Refunded Value en
          Details muestran la diferencia (e.g. $5,275 vs $5,000 -> partial).
        - "no veo el record del refund solo veo el record de la oportunidad
          y del pago" -> primer intento: Payments related list con record
          negativo (modelo NPSP signed amount).
        - "el payment no tiene el refund, el refund se registra a nivel de
          Fund Donation Assignments" -> correccion del modelo: refund Payments
          eliminados, refunds ahora en Fund Donation Assignments con
          Action_Type='Refunded'. Esta es la convencion REAL de prod Tucson.

      Para los 9 Closed Won (parciales): FDA Sold original > FDA Refunded,
      el museo retiene la diferencia.
      Para los 3 Closed Lost (completos): FDA Sold == FDA Refunded, todo
      devuelto.


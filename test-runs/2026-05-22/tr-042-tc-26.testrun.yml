scopeFit: |
  Scope-fit mapping (strict flow): cada acceptance criterion del ticket IM-782 mapeado
  a las lineas del PR 115 y a la evidencia QA que lo cubre. PR 115 total: 6 archivos,
  +3/-40 lineas.

  AC1: "Only one exhibition capacity SQL query exists in the repo (under
       exhibition-time-and-capacities/)."
  -> PR lines: deletion completa del archivo
     `queries/exhibition-capacity/exhibition_capacity.sql` (-20 lineas).
  -> Coverage: Scenario 1 step 2 (post-fix repo structure verification).
  -> Evidence: pre-post-diff/ attachments con ambos archivos pre-fix + el
     unico archivo post-fix.

  AC2: "ExhibitionCapacityFilters exposes only fromDate and toDate."
  -> PR lines: linea 5 de `exhibition-capacity.specification.ts` eliminada
     (`programId?: string`).
  -> Coverage: Scenario 1 step 3 (spec.ts diff inspection).
  -> Evidence: full PR diff inline.

  AC3: "The extractor binds only the date-related query parameters."
  -> PR lines: lineas 95-100 de `exhibition-capacity.extractor.ts` modificadas
     (destructure programId removido + 2 bindings hasProgramIdFilter/programIdFilter
     eliminados de mergeFilters return).
  -> Coverage: Scenario 1 step 4 (extractor.ts diff inspection).
  -> Evidence: full PR diff inline.

  AC4: "npx tsc --noEmit reports no new TypeScript errors attributable to this change."
  -> PR lines: la consistencia entre spec.ts (interface) y extractor.ts (consumidor)
     es garantia por construccion — TypeScript fallaria si quedaran referencias.
  -> Coverage: NO ejecutado en este QA (responsabilidad del PR CI code-side).
  -> Gap: no run local; confianza en el CI del PR que pasa green.

touchRadius: |
  Touch radius check (strict flow): archivos modificados por PR 115 + busqueda
  exhaustiva de consumers no modificados.

  Modificados (verificados en este QA):
  - src/data-migration/infrastructure/destination/sql-server/queries/
    - exhibition-time-and-capacities/exhibition_capacity.sql (-1 linea)
    - exhibition-capacity/exhibition_capacity.sql (-20 lineas, archivo eliminado)
  - src/data-migration/infrastructure/destination/sql-server/extractors/
    - exhibition-capacity.extractor.ts (+1/-3)
  - src/data-migration/domain/specifications/
    - exhibition-capacity.specification.ts (+0/-1)
  - docs/altru-source-data-model-context.json (+1/-8)
  - docs/altru-source-validation-context.json (+1/-7)

  Busqueda exhaustiva post-fix (gh search code):
  - `hasProgramIdFilter` query: las unicas referencias son a los archivos que el
    PR mismo elimina (queries/sql/exhibition-* + queries/sql-server/exhibition-capacity/).
    Despues del merge esos paths dejan de existir y el termino desaparece del codigo.
  - `programId` query: referencias en otros dominios (museum-offer-*, ticket-item,
    membership-program, exhibition-and-event) son PROGRAMID en SQL o programId
    fields de otros entities — sin acoplamiento con ExhibitionCapacityFilters.
  - `exhibition_capacity.sql` query: post-fix solo apunta a la copia activa
    (`exhibition-time-and-capacities/`) + extractor.ts + 1 doc; el archivo
    huerfano no es referenciado.

  Pipeline consumers downstream:
  - `ExhibitionCapacityPipeline.buildExtractionParams` (citado en ticket
    description): solo propaga `fromDate` y `toDate` desde PipelineContext. No
    referenciaba programId.
  - Sin Apex triggers / Flows / Reports downstream conocidos que dependan del
    field programId del extractor (este filter nunca tuvo path front-end
    activo, asi que no hay nada downstream que romper).

  Riesgos detectados en el touch radius:
  - El bug pattern del predicate eliminado era el MISMO de IM-770 (mezcla
    uniqueidentifier + nvarchar): si por alguna razon alguien hubiera intentado
    setear programId con un string en lugar de un GUID, se habria gatillado un
    `Conversion failed when converting from a character string to uniqueidentifier`.
    El cleanup elimina ese tiempo latente. Beneficio secundario del PR.

  Conclusion: touch radius minimo y bien contenido. Sin riesgo de regresion en
  otros dominios.


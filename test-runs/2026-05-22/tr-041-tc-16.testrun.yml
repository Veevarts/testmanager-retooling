scopeFit: |
  Scope-fit mapping (strict flow): cada acceptance criterion del ticket IM-707 mapeado
  a las lineas del PR 104 que lo implementan y a la evidencia QA que lo cubre. PR 104
  total: 17 archivos, +1307/-1.

  AC1: "PR 104 produces correct npsp__Partial_Soft_Credit__c and
       npsp__Account_Soft_Credit__c records in Salesforce, with proper grain
       (one PSC per REVENUERECOGNITION.ID) and proper routing
       (PSC for Contact recipients, ASC for Organization recipients)."
  -> PR lines: soft_credit_recognition.sql (51 lines, single SELECT con joins a
     REVENUERECOGNITION + REVENUESPLIT_EXT + FINANCIALTRANSACTION + CONSTITUENT
     recognized + CONSTITUENT donor + REVENUERECOGNITIONTYPECODE).
     soft-credit-recognition.mapper.ts (101 lines, routea PSC vs ASC en base a
     Recognized_Is_Organization__c). soft-credit-recognition.pipeline.ts (127 lineas).
  -> Coverage: Scenarios 1, 2, 3 (PSC/ASC re-validados PASS contra current PR state).
  -> Evidence: SOQL post-load en attachments/tr-041-tc-16/soql-evidence/.

  AC2: "NPSP rollups on recognized Contacts and Accounts reflect the loaded soft
       credit data end-to-end (Soft Credit Total, Number of Soft Credits, Last
       Soft Credit Date)."
  -> PR lines: ninguna (NPSP rollups son feature del NPSP package, no del PR; el
     PR solo carga los PSCs/ASCs y el batch de rollup los suma).
  -> Coverage parcial: Scenario 4. Contact-level rollups verificados; los 4 de los 6
     recipients matchean. Los 2 recipients multi_psc que reciben 2 PSCs muestran
     rollup deduplicado por (Opp, Contact) — comportamiento NPSP default, NO bug del PR.
  -> Evidence: SOQL contact-rollups.csv.
  -> Gap CRITICO: Account-level rollups NO EXISTEN en veevartd (no fields *Soft_Credit*
     en Account object). Las 2 expectaciones a nivel Account en S4 (multi_mixed RecAcc
     $50000 y single_asc RecAcc $150) NO son verificables sin configuracion adicional.
     Tampoco es responsabilidad del PR 104 (es NPSP/SF org setup).

  Verdict: PR 104 cumple AC1 completamente. AC2 cumple parcialmente — el PR carga la
  data correctamente, los rollups Contact-level funcionan via NPSP default behavior;
  las expectaciones multi-PSC-per-Contact en el TC v4 son INCORRECTAS (asumian sum por
  PSC, pero NPSP deduplica por (Opp, Contact)). Account-level out of scope para el PR.

touchRadius: |
  Touch radius check (strict flow): archivos modificados por PR 104 + impacto sobre
  el resto del pipeline ETL.

  Modificados/nuevos por PR 104 (17 archivos, +1307/-1):
  - SQL: queries/soft-credit/soft_credit_recognition.sql (51 lineas, archivo NUEVO)
  - Domain: model/soft-credit-recognition-record.entity.ts + .spec.ts (+147 lineas)
  - Specifications: soft-credit-recognition.specification.ts (+22)
  - Infrastructure: extractors/soft-credit-recognition.extractor.ts (+109);
    mappers/soft-credit-recognition.mapper.ts + .spec.ts (+144)
  - Pipeline: application/pipelines/soft-credit-recognition.pipeline.ts + .spec.ts (+275)
  - Wiring: data-migration.module.ts (+5), migration-object.enum.ts (+1),
    registry/extractor.registry.ts (+2)
  - Tests: query-regression/soft-credit-recognition-* (+542 lineas, 3 archivos)
  - Docs: README.md + altru-model-context.md (+5 lineas)
  - Build: package.json (+5)

  Cambios POST-TR-028 (3 commits non-merge):
  - 65df2cb7 2026-05-19: SQL CAST cleanup (uniqueidentifier columns emitidas sin
    VARCHAR(36) wrapping, igual que IM-770 pattern). +9/-9 en SQL. Impact: ninguno
    en S1-S3 — re-verified PASS.
  - 8a9e8b5b 2026-05-19: solo tests (docker uuid assertions). +45/-33 solo en
    .integration.spec.ts. Impact: cero en QA data review.
  - 371e33b0 2026-05-22: SQL date filter precision (`<= @filterDateTo` -> `< DATEADD(DAY,
    1, @filterDateTo)`); mapper null handling defensive. +2/-2 SQL + +1/-1 mapper.
    Impact: solo en queries con date filter activo; los TRs no usaron filter, sin impacto.

  No modificados por el PR pero potencialmente afectados:
  - donation_transaction.sql, fund_assignment_donations.sql, fund_assingments_donation_refunds.sql
    -> sin interseccion con soft_credit_recognition.sql. Distintos universos (REVENUERECOGNITION
    vs FINANCIALTRANSACTIONLINEITEM). Sin riesgo cross-query.
  - membership_transactions.sql, fund_assignment_memberships.sql -> mismo argumento, distintos
    objects target. Sin riesgo.
  - extractor.registry.ts -> agregada UNA entrada nueva sin renombrar/borrar las anteriores.
    Idempotente para los otros migration objects.

  Riesgos del touch radius:
  - Si un downstream consumer (Salesforce trigger/flow/report) asumia que los Constituent IDs
    venian como VARCHAR(36), podria romperse al recibir el GUID raw del driver mssql tras el
    CAST cleanup. Mitigacion: el mapper.ts ya estaba diseñado para stringify (mismo patron de
    IM-770), asi que el CSV emite el GUID en formato 8-4-4-4-12 lowercase como antes.
  - Si el operador habia configurado un rollup batch con scope distinto al default NPSP,
    los rollups multi-PSC-per-Contact podrian diferir de lo que aqui validamos. No es bug
    del PR — es config-side.

  Conclusion: touch radius muy contenido (1 nuevo file SQL + nueva wiring DI sin tocar
  paths existentes). El PR puede mergearse sin riesgo para los otros queries.

postTR028Diff: |
  Diff de los cambios SQL/mapper desde TR-028 ejecutado el 2026-05-14:

  COMMIT 65df2cb7 (May 19) - "cover remaining review findings":
    SQL: removed CAST(... AS VARCHAR(36)) from 6 output columns + ORDER BY.
    Outputs now flow as uniqueidentifier raw; downstream mapper.ts stringifies.
    Reason: review feedback to align with IM-770 pattern (let the driver handle GUID).
    Impact on TR-028 scenarios: ZERO empirico — values in CSV identicos.

  COMMIT 8a9e8b5b (May 19) - "normalize docker uuid assertions":
    Only .integration.spec.ts changes. No production code or query impact.

  COMMIT 371e33b0 (May 22) - "remaining PR review feedback":
    SQL: date filter precision improvement (datetime-safe; uses DATEADD(DAY,1,...)
         instead of <= for the upper bound).
    Mapper: returns null instead of String(value) when date parse fails.
    Impact: filter change only affects queries with explicit date range (the TRs
    haven't used filter; default --useDateFrom=0 paths unaffected).

  Re-validation against TR-028 PASSED scenarios:
  - Scenario 1 (multi_psc 5 PSC rows): PASS post-commits — exact match on amounts.
  - Scenario 2 (multi_mixed PSC + ASC): PASS post-commits.
  - Scenario 3 (single_asc ASC + restricted picklist fix): PASS post-commits.

  Conclusion: los 3 commits SQL/mapper post-TR-028 NO rompen ningun scenario
  previamente validado. PR sigue siendo correcto.


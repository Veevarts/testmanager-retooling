           - xqfN0 = $10,000 + $5,000 = $15,000 / 2 PSCs (TC dijo 10000+3000)
           - xqfMz = $3,000 + $1,000 = $4,000 / 2 PSCs (TC dijo 5000)
         Las "then" clauses del TC describen una distribucion equivocada.

      2. Pero ademas, NPSP rollups por DEFAULT deduplican por (Opp, Contact)
         pair: cuando un Contact tiene 2 PSCs en la misma Opp, el rollup
         cuenta SOLO 1 SC y el Total muestra el ultimo PSC.amount, no la suma.
         Eso explica xqfN0=$10K/1 SC y xqfMz=$1K/1 SC.

         Para que NPSP sume los 2 PSCs, hay que activar Customizable Rollups en
         NPSP setup y reconfigurar el rollup definition. No activado en veevartd.

      3. Steps 8-9: campos Account-level *Soft_Credit* no existen en el schema
         de Account del veevartd. Tampoco son responsabilidad del PR 104 (NPSP
         feature). BLOCKED en lugar de FAIL.


      del dataset. Los rollups que NPSP calcula reflejan esa data segun el
      comportamiento NPSP default. El TC v4 tiene expectativas incorrectas en
      S4 que necesitan refactor — pero esa correccion del TC no bloquea el merge
      del PR.

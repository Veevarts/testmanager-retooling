scopeFit: |
  Scope-fit mapping (strict flow): cada AC de IM-791 mapeado a las lineas
  del PR 118 y a la evidencia QA. PR 118 total: 7 archivos, +148/-15 lineas,
  4 commits desde merge-base acf73eb.

  AC1: "ticketing_only_program.sql no longer references @useStatus,
       @hasStatusFilter, or @statusFilter."
  -> PR lines: -3 lineas en ticketing_only_program.sql (DECLARE +
     condition WHERE) + cambios de date filters a HARDCODE 0/NULL.
  -> Coverage: Scenario 1 step 1 (side-by-side).
  -> Evidence: diff pre/post archivo, attachments/tr-046-tc-29/pre-post-diff/.
  -> Status: PASS.

  AC2: "TicketingProgramExtractor.mergeFilters no longer emits
       hasStatusFilter / statusFilter bind params."
  -> PR lines: -2 lineas en ticketing-program.extractor.ts (destructure +
     bindings).
  -> Coverage: Scenario 1 step 4 (side-by-side).
  -> Evidence: diff pre/post archivo.
  -> Status: PASS.

  AC3: "Existing ticketing-program tests pass; ticketing_only_event.sql and
       its extractor are unchanged."
  -> PR lines: ticketing_only_event.sql -2 lineas + ticketing-event.extractor.ts
     -2 lineas. AC3 dice que event queda UNCHANGED pero el PR sí lo limpia.
  -> Coverage: Scenario 1 step 2 + step 4 (side-by-side) + Scenario 3 (touch
     radius / scope-fit observation).
  -> Status: VIOLADO. El scope creep es coherente (mismo principio aplicado
     a ambos) pero contradice el AC declarado. Recomendable actualizar la
     descripcion del ticket para reflejar el scope expandido (event +
     program ambos).

  AC4: "An Implementation Executive can run ticketing_only_program.sql
       against a source DB with only the date-filter parameters (which
       themselves are already hardcoded to off in this file)."
  -> PR lines: ticketing_only_program.sql DECLAREs de date filters cambian
     a HARDCODE (IIF(0=1,1,0), CAST(NULL AS DATE)).
  -> Coverage: Scenario 1 step 1 (side-by-side documenta el hardcode).
  -> Evidence: post-ticketing_only_program.sql no requiere bind params
     externos. Un IE puede correrlo via safesql sin declarar params.
  -> Status: PASS — IE no necesita supplyear params.
  -> Nota: ticketing_only_event.sql sigue requiriendo bind params de date,
     creando inconsistencia program vs event que vale flaggear.

touchRadius: |
  Touch radius check (strict flow): archivos modificados por PR 118 +
  busqueda exhaustiva de consumers cross-codebase.

  Modificados (verificados en este QA):
  - Production code (5 archivos):
    - src/data-migration/domain/specifications/ticketing-filters.type.ts (-1)
    - src/data-migration/.../extractors/ticketing-event.extractor.ts (+1/-3)
    - src/data-migration/.../extractors/ticketing-program.extractor.ts (+1/-3)
    - src/data-migration/.../queries/ticketing/ticketing_only_event.sql (-2)
    - src/data-migration/.../queries/ticketing/ticketing_only_program.sql (+4/-6)
  - Tests (2 specs nuevos):
    - ticketing-event-query.spec.ts (+80)
    - ticketing-program-query.spec.ts (+62)

  Cross-codebase search:
  - `hasStatusFilter` / `statusFilter`: 4 archivos cada uno (todos los que
    el PR mismo modifica/limpia). Search index stale, desaparecen post-merge.
  - `TicketingFilters`: 3 archivos (type + 2 specs). Las specs solo importan
    como tipo, ninguna consume `.status` directamente.

  No modificados pero potencialmente afectados:
  - TicketingProgramPipeline / TicketingEventPipeline: solo propagan
    fromDate/toDate desde PipelineContext. Sin acoplamiento con status.
  - Otros queries del pipeline (museum-offer, exhibition, pos-purchase,
    etc.): distintos dominios, sin shared params con ticketing.

  Inconsistencia tecnica nueva (no riesgo bloqueante pero debe documentarse):
  - `ticketing_only_program.sql` post-fix: date filters HARDCODED a 0/NULL.
    El extractor sigue enviando `hasDateFilterFrom`, `hasDateFilterTo`,
    `dateFilterFrom`, `dateFilterTo` como bindings. SQL las ignora.
    Resultado: bindings dead enviadas pero nunca consumidas en program.
  - `ticketing_only_event.sql` post-fix: date filters mantienen bind params
    activos.
  - Inconsistencia: program y event difieren en como manejan date filters.
    Decisiones validas:
      A) Restaurar bind params en program.sql (alinear con event).
      B) Hardcodear tambien event.sql y remover bindings de ambos
         extractors.
      C) Aceptar la inconsistencia como costo del cleanup conservador.
    No bloquea el merge pero conviene decidir antes del cutover.

  Conclusion: touch radius bien delimitado en la cadena ticketing.
  Sin acoplamiento con otros dominios. Cleanup es safe a nivel de regresion.


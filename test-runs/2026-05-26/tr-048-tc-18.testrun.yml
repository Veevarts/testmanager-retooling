startedAt: '2026-05-26T22:00:00.000Z'
scopeFit: "Scope-fit: TR-048 ejecuta TC-18 (UAT framing, 20 scenarios) bajo el camino COMPLETO definido por IM-732. La version\
  \ 0.25.0.1 del paquete Veevart MCP Context expone todos los tools relevantes (VeevartMCPAnalyticsTool, VeevartMCPSOQLTool,\
  \ VeevartMCPListContextTopicsTool, VeevartMCPSearchContextTool, VeevartMCPOrgCapabilitiesTool, VeevartMCPInstalledPackagesTool,\
  \ VeevartMCPReportRecipesTool, VeevartMCPReportTypesTool, VeevartMCPCreateReportTool, VeevartMCPPromptTemplatesTool, plus\
  \ Get Veevart MCP Context) como @InvocableMethod, desbloqueando los 20 scenarios.\n\nCobertura del plan UAT documentado\
  \ en IM-732 (Jira):\n  - Connect & identity: scenarios 1, 2\n  - Setup validation prompts (descubrimiento): scenarios 3,\
  \ 4\n  - Analytics answer tests: scenarios 5, 6, 7\n  - Report planning: scenario 8\n  - Saved report tests (primary + additional\
  \ + chart repair): scenarios 9, 10, 11\n  - Ticketing/exhibition geography (Basquiat): scenario 12\n  - Guided action tests:\
  \ scenario 13\n  - UX regression (cancel, recall, multi-chat, draft): scenarios 14, 15\n  - Browser & service worker resilience:\
  \ scenarios 16, 17\n  - Negative - sin falso exito: scenario 18\n  - Safety guarantees: scenario 19\n  - Release readiness\
  \ end-to-end: scenario 20\n\nCriterios de salida (per IM-732):\n  - 20 escenarios UAT ejecutados al menos una vez\n  - Escenarios\
  \ 1, 2, 9 y 18 pasan sin observaciones bloqueantes\n  - Al menos un escenario de falla controlada (e.g. 18) produce blocker\
  \ accionable, sin link inventado ni claim de exito falso\n  - Toda creacion exitosa de reporte abre el reporte en Salesforce\
  \ y devuelve el link en chat\n  - El agente nunca crea/edita/borra registros de negocio fuera de reportes; no expone tokens\
  \ ni PII; no usa tools fuera de Veevart\n  - Evidencia por test: version browser/extension, URL org, permission sets, prompt,\
  \ screenshots, URL reporte, logs sanitizados"
touchRadius: "Touch radius del UAT:\n\nOrg Salesforce: Veevart CSM production. Cambios potenciales esperados:\n  - Reportes\
  \ nuevos creados por el agente en la carpeta default (scenarios 9, 10): membership revenue by month, won opportunities ultimos\
  \ 90 dias, donor reactivation prospects, members by 5-digit zip.\n  - Posible modificacion de chart en reporte existente\
  \ (scenario 11).\n  - El agente NO debe crear/editar/borrar Opportunities, Contacts, Accounts, Memberships ni ningun registro\
  \ de negocio (Scenario 19 lo valida explicitamente como safety guarantee).\n\nBrowser: extension Veevart Insights Agent\
  \ BETA v0.1.0 cargada en Chrome (ID gbdahpbgkpiknfedifhipffadcgblcaj). Side panel sobre https://*.force.com/*. Acceso a\
  \ historial de navegacion. Sin modificacion de DOM de Salesforce.\n\nCleanup post-UAT: los reportes creados en la carpeta\
  \ default se pueden borrar manualmente o conservar como evidencia (ver screenshots adjuntados a scenarios 9, 10, 11)."

scopeFit: |
  Scope-fit mapping: cada AC de IM-766 mapeado al scenario de TC-28 y a la
  evidencia ejecutada en staging + verificacion en veevart-prod.

  AC de IM-766 covered:

  AC1 "Despues de ExtractRawSourceRows, el state input sigue siendo un objeto
       con el workflow context y los resultados de extraccion (bajo
       $.extractionResults)."
  -> Scenario 1: el StateMachine completa SUCCEEDED para 154 cuentas en
     ambos periodos sin States.ReferencePathConflict.
  -> Evidence: execution arn en execution history + ausencia de Catch
     handler disparado en el dia de la corrida.

  AC2 "Si ComputeMetricFacts falla o expira, el workflow registra la falla
       via RecordWorkflowFailure sin States.ReferencePathConflict."
  -> Scenario 3: BLOCKED -- requiere fixture controlado de falla en
     ComputeMetricFacts. Pendiente coordinacion con Dev. AC respaldado
     por construccion (Catch handler escribe $.workflowError, no
     reemplaza el state context), pero no validado dinamicamente en
     esta corrida.

  AC3 "Con extraction results compactos, ComputeMetricFacts aun calcula los
       facts para el periodo y scope solicitado."
  -> Scenario 1: 149/154 (2026-01), 149/154 (2026-02 r1), 150/154
     (2026-02 r2) cuentas terminaron con Marketing_Metrics__c persistido.
  -> Evidence: comparador SOQL contra Marketing_Metrics__c.LastModifiedDate
     + Metric_Period_Key__c. Las 4 cuentas residuales son baseline ajeno
     al fix.

  AC4 "Manual run con cientos de persisted runs procesa sin spread grandes
       ni payloads ASL gigantes."
  -> Scenario 1: 154 cuentas en una sola execution. La falla original del
     2026-05-20 (47 orgs / 517 persisted runs) reproducia
     States.ReferencePathConflict + RangeError; post-fix las 3 corridas QA
     terminaron SUCCEEDED sin ningun error de state-shape ni stack overflow.

  AC5 "Errores reales de computo NO quedan enmascarados por error de
       state-shape."
  -> Scenario 3: BLOCKED. Mismo gap que AC2.

  AC6 "Definicion del state machine valida ASL al deploy."
  -> Cubierto en el CD pipeline (deploy completo en staging confirma ASL
     valida). No re-validado en este TR.

  Gap declarado: AC2 + AC5 dependen del Scenario 3 (error-handling con
  fixture forzado). El user planea coordinar la fixture con Dev como
  follow-up. Resto de los AC quedan satisfechos con la evidencia de esta
  corrida.


  - Lambdas tocadas: StartExecution (entry), ExtractRawSourceRows
    (Map iterator), ComputeMetricFacts, PublishMarketingMetrics,
    RecordWorkflowFailure (no disparada en las 3 runs SUCCEEDED).
  - CloudWatch log group: /aws/lambda/veev-ue1-prod-veevart-ana-
    ComputeMetricFactsFuncti-GV38HlBm4zb0 (sin errores en las 3 runs).

  Salesforce veevart-prod (00D60000000KdOJEA0):
  - Objeto tocado: Marketing_Metrics__c. 149-150 records modificados por
    corrida (LastModifiedBy = Jose Daniel Angarita, Metric_Period_Key__c
    en {2026-01, 2026-02}).
  - Objeto consultado read-only: Account (154 records via Org_ID_18__c +
    Org_ID__c).

  Comparator local:
  - tmp/marketing-metrics-comparator/ (consolidated.mjs script).
  - Input: tmp/accounts-by-orgid-full.csv (154 Org_ID_18__c + Account.Id +
    lightning_url).
  - Output: tmp/accounts-modified-today.csv (2026-01) +
    tmp/accounts-modified-today-2026-02.csv.

  No tocados:
  - Pipeline mensual scheduled (cron) -- el fix no cambia el trigger,
    solo el state-shape de la Map.
  - Endpoints de read API (/analytics/metrics, etc.) -- ajeno al fix.
  - Otros KPIs/objetos en veevart-prod ajenos a Marketing_Metrics__c.

